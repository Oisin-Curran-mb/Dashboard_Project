    --semantic-color-light-mode-icon-action-mono-pressed:            var(--primitive-color-cool-neutral-0);

    --semantic-layout-units-contextual-button-padding-large-horizontal:     var(--primitive-unit-unit-14);

  /* ── Spinner animation ── */
  @keyframes pw-btn-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }

  @media (prefers-reduced-motion: reduce) {
    .pw-btn-spinner { animation: none !important; }
  }

    font-variation-settings: "FILL" 0, "wght" 300, "GRAD" 0, "opsz" 20;
    font-size: inherit;
    line-height: 1;
    display: inline-block;
    vertical-align: middle;
    letter-spacing: normal;
    word-wrap: normal;
    white-space: nowrap;
    direction: ltr;
  }

  body { font-family: "Red Hat Text", sans-serif; background: #f7f8fc; color: #02060d; }
  .demo-shell  { max-width: 1100px; margin: 0 auto; padding: 48px 32px 80px; }
  .demo-title  { font-size: 22px; font-weight: 600; line-height: 28px; margin-bottom: 4px; }
  .demo-sub    { font-size: 13px; color: #7880a0; margin-bottom: 40px; }

<div class="demo-shell">
  <div id="root"></div>
</div>

<script type="text/babel">
const { useState, useEffect } = React;

// ─── TOKENS (same constants as button.jsx, inlined for CDN compatibility) ────
const SC = (p) => `var(--semantic-color-light-mode-${p})`;
const SL = (p) => `var(--semantic-layout-units-${p})`;
const ST = (p) => `var(--semantic-type-desktop-${p})`;

const FILL = {
  Fill: {
    Primary:   { base: SC("fill-action-primary-base"),              hover: SC("fill-action-primary-hover"),              pressed: SC("fill-action-primary-pressed"),              disabled: SC("fill-action-primary-disabled") },
    Secondary: { base: SC("fill-action-secondaryinverse-base"),     hover: SC("fill-action-secondaryinverse-hover"),     pressed: SC("fill-action-secondaryinverse-pressed"),     disabled: SC("fill-action-secondaryinverse-disabled") },
    Tertiary:  { base: SC("fill-action-tertiary-base"),             hover: SC("fill-action-tertiary-hover"),             pressed: SC("fill-action-tertiary-pressed"),             disabled: SC("fill-action-tertiary-disabled") },
    Negative:  { base: SC("fill-action-negative-base"),             hover: SC("fill-action-negative-hover"),             pressed: SC("fill-action-negative-pressed"),             disabled: SC("fill-action-negative-disabled") },
  },
  Outlined: {
    Primary:   { base: "transparent",                               hover: SC("fill-action-primaryinverse-hover"),       pressed: SC("fill-action-primaryinverse-pressed"),       disabled: "transparent" },
    Secondary: { base: "transparent",                               hover: SC("fill-action-secondaryinverse-hover"),     pressed: SC("fill-action-secondaryinverse-pressed"),     disabled: "transparent" },
    Tertiary:  { base: "transparent",                               hover: SC("fill-action-tertiary-inverse-hover"),     pressed: SC("fill-action-tertiary-inverse-pressed"),     disabled: "transparent" },
    Negative:  { base: "transparent",                               hover: SC("fill-action-negativeinverse-hover"),      pressed: SC("fill-action-negativeinverse-pressed"),      disabled: "transparent" },
  },
  Naked: {
    Primary:   { base: "transparent",                               hover: SC("fill-action-primaryinverse-hover"),       pressed: SC("fill-action-primaryinverse-pressed"),       disabled: "transparent" },
    Secondary: { base: "transparent",                               hover: SC("fill-action-secondaryinverse-hover"),     pressed: SC("fill-action-secondaryinverse-pressed"),     disabled: "transparent" },
    Tertiary:  { base: "transparent",                               hover: SC("fill-action-tertiary-inverse-hover"),     pressed: SC("fill-action-tertiary-inverse-pressed"),     disabled: "transparent" },
    Negative:  { base: "transparent",                               hover: SC("fill-action-negativeinverse-hover"),      pressed: SC("fill-action-negativeinverse-pressed"),      disabled: "transparent" },
  },
};
const TEXT = {
  Fill: {
    Primary:   { base: SC("text-action-primaryinverse-base"), hover: SC("text-action-primaryinverse-hover"), pressed: SC("text-action-primaryinverse-pressed"), disabled: SC("text-action-primaryinverse-disabled") },
    Secondary: { base: SC("text-action-secondary-base"),      hover: SC("text-action-secondary-hover"),      pressed: SC("text-action-secondary-pressed"),      disabled: SC("text-action-secondary-disabled") },
    Tertiary:  { base: SC("text-action-tertiary-base"),       hover: SC("text-action-tertiary-hover"),       pressed: SC("text-action-tertiary-pressed"),       disabled: SC("text-action-tertiary-disabled") },
    Negative:  { base: SC("text-action-mono-base"),           hover: SC("text-action-mono-hover"),           pressed: SC("text-action-mono-pressed"),           disabled: SC("text-action-mono-disabled") },
  },
  Outlined: {
    Primary:   { base: SC("text-action-primary-base"),   hover: SC("text-action-primary-hover"),   pressed: SC("text-action-primary-pressed"),   disabled: SC("text-action-primary-disabled") },
    Secondary: { base: SC("text-action-secondary-base"), hover: SC("text-action-secondary-hover"), pressed: SC("text-action-secondary-pressed"), disabled: SC("text-action-secondary-disabled") },
    Tertiary:  { base: SC("text-action-tertiary-base"),  hover: SC("text-action-tertiary-hover"),  pressed: SC("text-action-tertiary-pressed"),  disabled: SC("text-action-tertiary-disabled") },
    Negative:  { base: SC("text-action-negative-base"),  hover: SC("text-action-negative-hover"),  pressed: SC("text-action-negative-pressed"),  disabled: SC("text-action-negative-disabled") },
  },
};
TEXT.Naked = TEXT.Outlined;

const ICON_T = {
  Fill: {
    Primary:   { base: SC("icon-action-primaryinverse-base"), hover: SC("icon-action-primaryinverse-hover"), pressed: SC("icon-action-primaryinverse-pressed"), disabled: SC("icon-action-primaryinverse-disabled") },
    Secondary: { base: SC("icon-action-secondary-base"),      hover: SC("icon-action-secondary-hover"),      pressed: SC("icon-action-secondary-pressed"),      disabled: SC("icon-action-secondary-disabled") },
    Tertiary:  { base: SC("icon-action-tertiary-base"),       hover: SC("icon-action-tertiary-hover"),       pressed: SC("icon-action-tertiary-pressed"),       disabled: SC("icon-action-tertiary-disabled") },
    Negative:  { base: SC("icon-action-mono-base"),           hover: SC("icon-action-mono-hover"),           pressed: SC("icon-action-mono-pressed"),           disabled: SC("icon-action-mono-disabled") },
  },
  Outlined: {
    Primary:   { base: SC("icon-action-primary-base"),   hover: SC("icon-action-primary-hover"),   pressed: SC("icon-action-primary-pressed"),   disabled: SC("icon-action-primary-disabled") },
    Secondary: { base: SC("icon-action-secondary-base"), hover: SC("icon-action-secondary-hover"), pressed: SC("icon-action-secondary-pressed"), disabled: SC("icon-action-secondary-disabled") },
    Tertiary:  { base: SC("icon-action-tertiary-base"),  hover: SC("icon-action-tertiary-hover"),  pressed: SC("icon-action-tertiary-pressed"),  disabled: SC("icon-action-tertiary-disabled") },
    Negative:  { base: SC("icon-action-negative-base"),  hover: SC("icon-action-negative-hover"),  pressed: SC("icon-action-negative-pressed"),  disabled: SC("icon-action-negative-disabled") },
  },
};
ICON_T.Naked = ICON_T.Outlined;

const STROKE = {
  Primary:   { base: SC("stroke-action-primary-base"),                 hover: SC("stroke-action-primary-hover"),                 pressed: SC("stroke-action-primary-pressed"),                 disabled: SC("stroke-action-primary-disabled") },
  Secondary: { base: SC("stroke-action-secondary-base"),               hover: SC("stroke-action-secondary-hover"),               pressed: SC("stroke-action-secondary-pressed"),               disabled: SC("stroke-action-secondary-disabled") },
  Tertiary:  { base: SC("stroke-action-tertiary-base"),                hover: SC("stroke-action-tertiary-hover"),                pressed: SC("stroke-action-tertiary-pressed"),                disabled: SC("stroke-action-tertiary-disabled") },
  Negative:  { base: SC("stroke-action-negative-base"),                hover: SC("stroke-action-negative-hover"),                pressed: SC("stroke-action-negative-pressed"),                disabled: SC("stroke-action-negative-disabled") },
};

const FOCUS_RING = `0 0 0 6px #ffffff, 0 0 0 8px ${SC("stroke-contextual-focusring-base")}`;

const SIZES = {
  L: { padH: SL("contextual-button-padding-large-horizontal"),  padV: SL("contextual-button-padding-large-vertical"),  iconWrap: 26, iconInner: 18, fontSize: ST("label-button-l-fontsize"),    fontFamily: ST("label-button-l-fontfamily"),    fontWeight: ST("label-button-l-fontweight"),    lineHeight: ST("label-button-l-lineheight"),    letterSpacing: ST("label-button-l-letterspacing") },
  M: { padH: SL("contextual-button-padding-medium-horizontal"), padV: SL("contextual-button-padding-medium-vertical"), iconWrap: 24, iconInner: 16, fontSize: ST("label-button-base-fontsize"), fontFamily: ST("label-button-base-fontfamily"), fontWeight: ST("label-button-base-fontweight"), lineHeight: ST("label-button-base-lineheight"), letterSpacing: ST("label-button-base-letterspacing") },
  S: { padH: SL("contextual-button-padding-small-horizontal"),  padV: SL("contextual-button-padding-small-vertical"),  iconWrap: 20, iconInner: 14, fontSize: ST("label-button-s-fontsize"),    fontFamily: ST("label-button-s-fontfamily"),    fontWeight: ST("label-button-s-fontweight"),    lineHeight: ST("label-button-s-lineheight"),    letterSpacing: ST("label-button-s-letterspacing") },
  XS:{ padH: SL("contextual-button-padding-xsmall-horizontal"), padV: SL("contextual-button-padding-xsmall-vertical"), iconWrap: 16, iconInner: 12, fontSize: ST("label-button-xs-fontsize"),   fontFamily: ST("label-button-xs-fontfamily"),   fontWeight: ST("label-button-xs-fontweight"),   lineHeight: ST("label-button-xs-lineheight"),   letterSpacing: ST("label-button-xs-letterspacing") },
};

const T = {
  radius: SL("contextual-button-radius-radius"),
  border: SL("contextual-button-border-width-base-base"),
  gap:    SL("contextual-button-gap-horizontal"),
  touch:  { pad: 6, min: 48 },
  focusShadow: FOCUS_RING,
};

// ─── SPINNER ──────────────────────────────────────────────────────────────────
const SPOKES = [
  { d: "M6 1V3",             o: 1.00 },
  { d: "M8.1 3.9L9.55 2.45", o: 0.87 },
  { d: "M9 6H11",            o: 0.75 },
  { d: "M8.1 8.1L9.55 9.55", o: 0.62 },
  { d: "M6 9V11",            o: 0.50 },
  { d: "M2.45 9.55L3.9 8.1", o: 0.37 },
  { d: "M1 6H3",             o: 0.25 },
  { d: "M2.45 2.45L3.9 3.9", o: 0.12 },
];
function BtnSpinner({ size = 20 }) {
  return (
    <svg className="pw-btn-spinner" width={size} height={size} viewBox="0 0 12 12" aria-hidden="true"
      style={{ animation: "pw-btn-spin var(--motion-duration-loop-fast) var(--motion-easing-linear) infinite", flexShrink: 0, display: "block" }}>
      {SPOKES.map((s, i) => (
        <path key={i} d={s.d} stroke="currentColor" strokeWidth="1" strokeLinecap="round" fill="none" opacity={s.o} />
      ))}
    </svg>
  );
}

// ─── BUTTON COMPONENT ─────────────────────────────────────────────────────────
function Button({ buttonStyle = "Fill", size = "M", type = "Primary", text = "Button",
                  leadingIcon = null, trailingIcon = null,
                  showLeadingIcon = false, showTrailingIcon = false, showText = true,
                  loading = false, disabled = false, onClick, ariaLabel, className = "" }) {
  const [hovered, setHovered] = useState(false);
  const [pressed, setPressed] = useState(false);
  const [focused, setFocused] = useState(false);

  const isDisabled = disabled || loading;
  const stateKey   = isDisabled ? "disabled" : pressed ? "pressed" : hovered ? "hover" : "base";

  const fillT  = FILL[buttonStyle]?.[type]  || FILL.Fill.Primary;
  const textT  = TEXT[buttonStyle]?.[type]  || TEXT.Fill.Primary;
  const iconT  = ICON_T[buttonStyle]?.[type] || ICON_T.Fill.Primary;
  const strokeT = STROKE[type] || STROKE.Primary;
  const sz     = SIZES[size] || SIZES.M;

  const bgColor    = fillT[stateKey];
  const textColor  = textT[stateKey];
  const iconColor  = iconT[stateKey];
  const strokeColor = strokeT[stateKey];
  const hasStroke  = buttonStyle === "Outlined";

  const outerS = {
    display: "inline-flex", alignItems: "center", justifyContent: "center",
    padding: T.touch.pad, minHeight: T.touch.min, minWidth: T.touch.min,
    background: "transparent", border: "none", borderRadius: T.radius,
    cursor: isDisabled ? "not-allowed" : "pointer", outline: "none",
  };
  const innerS = {
    display: "inline-flex", alignItems: "center", justifyContent: "center",
    paddingLeft: sz.padH, paddingRight: sz.padH,
    paddingTop: sz.padV, paddingBottom: sz.padV,
    borderRadius: T.radius,
    backgroundColor: bgColor,
    border: hasStroke ? `${T.border} solid ${strokeColor}` : "none",
    gap: T.gap, flex: "1 0 0", minWidth: 0, color: iconColor,
    boxShadow: focused && !isDisabled ? T.focusShadow : "none",
    transition: "background-color var(--motion-duration-2) var(--motion-easing-standard), border-color var(--motion-duration-2) var(--motion-easing-standard), box-shadow var(--motion-duration-2) var(--motion-easing-standard), color var(--motion-duration-2) var(--motion-easing-standard)",
  };
  const labelS = {
    fontFamily: sz.fontFamily, fontWeight: sz.fontWeight, fontSize: sz.fontSize,
    lineHeight: sz.lineHeight, letterSpacing: sz.letterSpacing,
    color: textColor, whiteSpace: "nowrap", userSelect: "none",
    transition: "color var(--motion-duration-2) var(--motion-easing-standard)",
  };
  const iconWrapS = {
    display: "inline-flex", alignItems: "center", justifyContent: "center",
    width: sz.iconWrap, height: sz.iconWrap, flexShrink: 0,
    fontSize: sz.iconInner, color: iconColor, transition: "color var(--motion-duration-2) var(--motion-easing-standard)",
  };

  return (
    <button type="button" onClick={!isDisabled ? onClick : undefined}
      disabled={isDisabled} aria-label={ariaLabel || (showText ? undefined : text)}
      aria-busy={loading || undefined}
      onMouseEnter={() => !isDisabled && setHovered(true)}
      onMouseLeave={() => { setHovered(false); setPressed(false); }}
      onMouseDown={() => !isDisabled && setPressed(true)}
      onMouseUp={() => setPressed(false)}
      onFocus={() => setFocused(true)}
      onBlur={() => { setFocused(false); setPressed(false); }}
      className={className} style={outerS}>
      <span style={innerS}>
        {loading ? (
          <BtnSpinner size={Math.round(sz.iconInner * 1.2)} />
        ) : (
          <>
            {showLeadingIcon && (
              <span className="material-symbols-rounded" style={iconWrapS} aria-hidden="true">
                {leadingIcon || "add"}
              </span>
            )}
            {showText && <span style={labelS}>{text}</span>}
            {showTrailingIcon && (
              <span className="material-symbols-rounded" style={iconWrapS} aria-hidden="true">
                {trailingIcon || "arrow_forward"}
              </span>
            )}
          </>
        )}
      </span>
    </button>
  );
}

// ─── DEMO APP ─────────────────────────────────────────────────────────────────
const TYPES = ["Primary", "Secondary", "Tertiary", "Negative"];
const STYLES = ["Fill", "Outlined", "Naked"];
const SIZES_LIST = ["L", "M", "S", "XS"];

function DemoRow({ label, children }) {
  return (
    <div className="demo-row">
      <span className="demo-row-label">{label}</span>
      {children}
    </div>
  );
}

function App() {
  return (
    <div className="demo-shell">
      <h1 className="demo-title">Button</h1>
      <p className="demo-sub">Pathway Design System · Figma node 40003293:93741 · All states interactive</p>

      {STYLES.map(style => (
        <div key={style} className="demo-section">
          <div className="demo-section-label">{style}</div>
          {TYPES.map(type => (
            <DemoRow key={type} label={type}>
              {/* Default */}
              <Button buttonStyle={style} type={type} size="M" text="Button" />
              {/* With leading icon */}
              <Button buttonStyle={style} type={type} size="M" text="Button" showLeadingIcon leadingIcon="add" />
              {/* Trailing icon only */}
              <Button buttonStyle={style} type={type} size="M" text="Button" showTrailingIcon trailingIcon="arrow_forward" />
              {/* Disabled */}
              <Button buttonStyle={style} type={type} size="M" text="Disabled" disabled />
              {/* Loading */}
              <Button buttonStyle={style} type={type} size="M" loading />
            </DemoRow>
          ))}
          <div style={{ borderTop: "1px solid #edf0f9", margin: "16px 0 16px" }} />
          {/* Size comparison */}
          <DemoRow label="Sizes">
            {SIZES_LIST.map(sz => (
              <Button key={sz} buttonStyle={style} type="Primary" size={sz} text={sz} />
            ))}
          </DemoRow>
        </div>
      ))}

      {/* Icon-only buttons */}
      <div className="demo-section">
        <div className="demo-section-label">Icon-only (touch target demonstrated)</div>
        <DemoRow label="Icon only">
          {TYPES.map(type => (
            <Button key={type} buttonStyle="Fill" type={type} size="M"
              showLeadingIcon leadingIcon="add" showText={false}
              ariaLabel={`Add (${type})`} />
          ))}
        </DemoRow>
        <DemoRow label="Naked icon">
          {TYPES.map(type => (
            <Button key={type} buttonStyle="Naked" type={type} size="M"
              showLeadingIcon leadingIcon="more_vert" showText={false}
              ariaLabel={`More options (${type})`} />
          ))}
        </DemoRow>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
