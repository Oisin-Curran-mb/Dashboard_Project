const USER_COLORS = ["#5b8def","#9c6dd8","#d96c6c","#4caf7d","#e08c2d","#2b9ec3","#c45d9e","#7cb342"];

// ── Abbreviation utilities ──────────────────────────────────────────────────
const SKIP_WORDS = new Set(["the","a","an","of","in","at","for","and","or","but"]);
const COMPOUND_SPLITS = {
  northpoint:["north","point"], crossroads:["cross","roads"],
  hillside:["hill","side"], cornerstone:["corner","stone"],
  newlife:["new","life"],
};
function abbreviateOrg(name) {
  if (!name) return "???";
  const sig = name.trim().split(/\s+/).filter(w => !SKIP_WORDS.has(w.toLowerCase()));
  if (!sig.length) return name.slice(0,3).toUpperCase();
  if (sig.length === 1) return sig[0].slice(0,3).toUpperCase();
  if (sig.length === 2) {
    const [w1, w2] = sig;
    if (COMPOUND_SPLITS[w1.toLowerCase()]) {
      const [p1,p2] = COMPOUND_SPLITS[w1.toLowerCase()];
      return (p1[0]+p2[0]+w2[0]).toUpperCase();
    }
    const after = w1.slice(1);
    const dist = after.match(/[xzq]/i);
    const sec = dist ? dist[0] : (w1[1]||w1[0]);
    return (w1[0]+sec+w2[0]).toUpperCase();
  }
  return (sig[0][0]+sig[1][0]+sig[2][0]).toUpperCase();
}
const DIR_CODES = {west:"WE",east:"EA",north:"NO",south:"SO",central:"CE",downtown:"DT",northeast:"NE",northwest:"NW",southeast:"SE",southwest:"SW"};
const DIRS = new Set(Object.keys(DIR_CODES));
const USPS = {alabama:"AL",alaska:"AK",arizona:"AZ",arkansas:"AR",california:"CA",colorado:"CO",connecticut:"CT",delaware:"DE",florida:"FL",georgia:"GA",hawaii:"HI",idaho:"ID",illinois:"IL",indiana:"IN",iowa:"IA",kansas:"KS",kentucky:"KY",louisiana:"LA",maine:"ME",maryland:"MD",massachusetts:"MA",michigan:"MI",minnesota:"MN",mississippi:"MS",missouri:"MO",montana:"MT",nebraska:"NE",nevada:"NV","new hampshire":"NH","new jersey":"NJ","new mexico":"NM","new york":"NY","north carolina":"NC","north dakota":"ND",ohio:"OH",oklahoma:"OK",oregon:"OR",pennsylvania:"PA","rhode island":"RI","south carolina":"SC","south dakota":"SD",tennessee:"TN",texas:"TX",utah:"UT",vermont:"VT",virginia:"VA",washington:"WA","west virginia":"WV",wisconsin:"WI",wyoming:"WY"};
function abbreviateCampus(name) {
  if (!name) return "";
  const lower = name.trim().toLowerCase();
  if (USPS[lower]) return USPS[lower];
  const words = name.trim().split(/\s+/);
  if (words.length === 1) { if (DIR_CODES[lower]) return DIR_CODES[lower]; return lower.slice(0,2).toUpperCase(); }
  if (words.length === 2) {
    const [a,b] = words.map(w=>w.toLowerCase());
    const aD=DIRS.has(a),bD=DIRS.has(b);
    if (aD||bD) { const pl=aD?b:a,di=aD?a:b; return (pl[0]+di[0]).toUpperCase(); }
    return (a[0]+b[0]).toUpperCase();
  }
  return lower.slice(0,2).toUpperCase();
}
function mobileLabel(orgName, campusName) {
  const o = abbreviateOrg(orgName), c = campusName ? abbreviateCampus(campusName) : "";
  return c ? `${o} | ${c}` : o;
}

// Logo image: object-fit cover — fills frame proportionally per Figma annotation.
function TriggerAvatar({ logoUrl, size, borderColor }) {

    <div style={{
      width:size, height:size,
      padding:"2px",   // xxxtight per Figma Container.Avatar
      display:"flex", alignItems:"center", justifyContent:"center",

        overflow:"hidden",

// OrgSwitcher component (spec §0)
// Props:
//   orgName  — full org name (desktop max 180px, mobile max 60px, both truncate with ellipsis)
//   orgType  — "protestant" (default) | "catholic". Gates cityName visibility.
//   cityName — city/diocese name. RENDERED ONLY when orgType === "catholic" (spec §0.1).
//              Even if a string is supplied, Protestant orgs render no city container.
//   logoUrl  — org logo URL; omit → church SVG placeholder (never initials)
function OrgSwitcher({ orgName="Organisation", orgType="protestant", cityName="", logoUrl, orgs=[], activeOrgId, onOrgSelect, open=false, onClick, disabled=false, mobile=false }) {
  const [pressed,  setPressed]  = useState(false);
  const [hovered,  setHovered]  = useState(false);

  const isActive = open || pressed;
  const fill   = isActive ? T.fillPressed  : hovered ? T.fillHover   : T.fillBase;
  const stroke = isActive ? T.strokePressed: hovered ? T.strokeHover : T.strokeBase;
  const text   = isActive ? T.textPressed  : hovered ? T.textHover   : T.textBase;
  const icon   = isActive ? T.iconPressed  : hovered ? T.iconHover   : T.iconBase;

  // Mobile shows the FULL orgName truncated by ellipsis at max-width:60.
  // NOT abbreviated. "Grace Community Church" → "Grace Comm…" via CSS truncation.
  const mobileText = orgName;
  // CityName.Catholic — Catholic orgs ONLY (spec §0.1). Protestant orgs never
  // render the city container, even if a cityName string is supplied.
  const showCityName = orgType === "catholic" && Boolean(cityName);
  // Avatar outer container size per Figma: desktop 24×24, mobile 20×20
  const AVATAR_SZ = mobile ? 20 : 24;

  return (
    // Outer wrapper (touch target) — desktop p:4 content-sized, mobile px:2 py:4 fixed w-108
    <div style={{
      minHeight:48, minWidth:48,
      ...(mobile ? { width:108 } : { maxWidth:316 }),
      ...(mobile ? { paddingLeft:"2px", paddingRight:"2px", paddingTop:"4px", paddingBottom:"4px" } : { padding:"4px" }),
      display:"flex", flexDirection:"column",
      alignItems:"flex-start", justifyContent:"center",
      position:"relative",
      boxSizing:"border-box",
    }}>
      {/* Container.Main (button): p:4px uniform, gap:2px between RowStart and RowEnd */}
      <button type="button" disabled={disabled}
        aria-haspopup="true" aria-expanded={open}
        aria-label={showCityName ? `Current organisation: ${orgName}, ${cityName}. Activate to switch.` : `Current organisation: ${orgName}. Activate to switch.`}
        onClick={onClick}
        onMouseEnter={() => !disabled && setHovered(true)}
        onMouseLeave={() => { setHovered(false); setPressed(false); }}
        onMouseDown={() => !disabled && setPressed(true)}
        onMouseUp={() => setPressed(false)}
        style={{
          display:"flex", alignItems:"center",
          height:36, maxHeight:36, minHeight:36,
          maxWidth: mobile ? 102 : 308,  // Container.Main: mobile 40006820:14758 max-w-102, desktop 40006817:14391 max-w-308
          borderRadius:"8px",
          border:`1px solid ${stroke}`,
          background: disabled ? T.fillBase : fill,
          opacity: disabled ? 0.5 : 1,
          cursor: disabled ? "not-allowed" : "pointer",
          padding:"4px",
          // Desktop has 2px gap between RowStart and RowEnd; mobile has NO gap
          // (Figma node 40006820:14758 vs 40006817:14391)
          ...(mobile ? {} : { gap:"2px" }),
          boxSizing:"border-box",
          outline:"none",
          transition:"background var(--motion-duration-2) var(--motion-easing-standard), border-color var(--motion-duration-2) var(--motion-easing-standard)",
        }}>

        {/* Container.RowStart
            Mobile (40006820:14759): gap 4px (xxtight), h 20, max-w 74 content-sized
            Desktop (40006817:14390): gap 4px (xxtight), h 24, content-sized */}
        <div style={{
          display:"flex", alignItems:"center", flexShrink:0, gap:"4px",
          ...(mobile ? { height:20, maxWidth:74 } : { height:24 }),
        }}>
          <TriggerAvatar logoUrl={logoUrl} size={AVATAR_SZ} borderColor={stroke} />

          {/* Desktop label: Container.OrgLabel (max-w 248)
              ├── Container.OrgName (max-w 170, CONTENT-SIZED — annotation:
              │    "Text Truncates if frame going beyond 170pt")
              └── Container.CityName.Catholic (max-w 72, Catholic orgs only) */}
          {!mobile && (
            <div style={{ display:"flex", alignItems:"center", height:"100%", maxWidth:248, flexShrink:0, minWidth:0 }}>
              <div style={{ display:"flex", alignItems:"center", height:"100%", maxWidth:180, flexShrink:1, minWidth:0 }}>
                <p style={{ ...T.typeS, color:text, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", margin:0, maxWidth:180 }}>{orgName}</p>
              </div>
              {/* CityName.Catholic — gated on orgType==="catholic" (spec §0.1).
                  paddingLeft:6 gives the pipe visual breathing room from OrgName;
                  leading whitespace inside <p> with overflow:hidden + nowrap is
                  unreliable across browsers, so we use container padding instead. */}
              {showCityName && (
                <div style={{ display:"flex", alignItems:"center", height:"100%", maxWidth:78, flexShrink:0, minWidth:0, paddingLeft:6 }}>
                  <p style={{ ...T.typeS, color:text, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", maxWidth:72, margin:0 }}>{`| ${cityName}`}</p>
                </div>
              )}
            </div>
          )}

          {/* Mobile label: Container.Label (Figma 40007067:13273) — fixed w-50,
              NO flex grow. Typography is Label/Button/S (14px) — same as desktop. */}
          {mobile && (
            <div style={{ display:"flex", alignItems:"center", height:"100%", width:50, flexShrink:0, minWidth:0 }}>
              <p style={{ ...T.typeS, color:text, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", margin:0, maxWidth:50 }}>{mobileText}</p>
            </div>
          )}
        </div>

        {/* Container.RowEnd: p:2px around Container.IconTrailing */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", padding:"2px", flexShrink:0 }}>
          {/* Container.IconTrailing: size 16×16 with 2px inner padding → 12×12 icon */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"center", width:16, height:16, padding:"2px", boxSizing:"border-box", transform: open ? "rotate(180deg)" : "none", transition:"transform var(--motion-duration-4) var(--motion-easing-standard)" }}>
            <Icon name="expand_more" size={12} style={{ color:icon }} />
          </div>
        </div>
      </button>

      {open && !disabled && <OrgPanel orgs={orgs} activeOrgId={activeOrgId} onOrgSelect={onOrgSelect} mobile={mobile} />}
    </div>
  );
}

                { label:"Base",              fill:"rgba(160,181,230,0.04)", stroke:"rgba(160,181,230,0.16)", desc:"Resting — fill.action.tertiary.base + stroke.action.tertiary.base" },
                { label:"Hover",             fill:"rgba(10,18,35,0.16)",    stroke:"rgba(160,181,230,0.20)", desc:"Cursor over — primaryinverse hover fill, tertiary hover stroke" },
                { label:"Pressed / Open",    fill:"rgba(255,255,255,0.08)", stroke:"rgba(160,181,230,0.30)", desc:"Mouse-down or panel open — chevron rotates 180°" },
                { label:"Disabled",          fill:"rgba(160,181,230,0.04)", stroke:"rgba(160,181,230,0.16)", desc:"Single-org users — base styling at 50% opacity, inert" },
              ].map(({ label, fill, stroke, desc }, idx, arr) => (
                <div key={label} style={{ display:"flex", alignItems:"center", gap:16, padding:"11px 0", borderBottom: idx < arr.length-1 ? "1px solid #f0f1f4" : "none" }}>
                  <div style={{ width:96, height:32, borderRadius:8, background:"#2d4889", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                    <div style={{ width:80, height:24, borderRadius:6, backgroundColor:fill, border:`1px solid ${stroke}`, opacity: label === "Disabled" ? 0.5 : 1 }} />
                  </div>
                  <div style={{ minWidth:0 }}>
                    <p style={{ fontWeight:600, fontSize:13, color:"#2a2d3a", margin:"0 0 2px", fontFamily:"'Red Hat Text', sans-serif" }}>{label}</p>
                    <p style={{ fontSize:12, color:"#666", margin:0, fontFamily:"'Red Hat Text', sans-serif" }}>{desc}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* ── CONSTRAINTS ─────────────────────────────────────────── */}
        <div className="demo-section">
          <div className="demo-section__label">Hard rules (spec §16)</div>
          <div className="demo-section__body">
            <ol style={{ margin:0, paddingLeft:22, fontFamily:"'Red Hat Text', sans-serif", fontSize:13, color:"#363636", lineHeight:"1.7" }}>
              <li><strong>CityName is Catholic-only.</strong> Protestant orgs render no city container, even if a <code style={{ fontFamily:"monospace", color:"#2d4889" }}>cityName</code> string is supplied.</li>
              <li><strong>No text initials in the placeholder.</strong> Always use the church SVG.</li>
              <li><strong><code style={{ fontFamily:"monospace", color:"#2d4889" }}>Container.OrgName</code> max-width is 180px</strong> — content-sized, not fixed. Short names shrink to fit; long names truncate with ellipsis.</li>
              <li><strong>Mobile root is fixed <code style={{ fontFamily:"monospace", color:"#2d4889" }}>width: 108px</code></strong>, label container is fixed 50px.</li>
              <li><strong>No raw hex or primitive token references</strong> in component code. Every colour resolves through a semantic token.</li>
              <li><strong>Mobile and desktop use the same <code style={{ fontFamily:"monospace", color:"#2d4889" }}>Label/Button/S</code> (14px)</strong> typography in v1.</li>
              <li><strong>Panel is placeholder.</strong> Treat panel code as non-normative until a future version specs it.</li>
            </ol>
          </div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
