*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Red Hat Text', sans-serif; background: #f0f2f5; min-height: 100vh; }

/* ── DEMO WRAPPER ────────────────────────────────────────────────────────────── */
.demo { padding: 40px 0; display: flex; flex-direction: column; gap: 48px; }
.demo__label {
  font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
  color: #606060; margin-bottom: 10px; padding: 0 32px;
}
.demo__frame {
  background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.06);
  overflow: hidden;
}
.demo__frame--mobile { max-width: 393px; margin-left: 32px; border-radius: 12px; }
.demo__page { height: 160px; background: #f6f7fa; display: flex; align-items: center;
  justify-content: center; font-size: 13px; color: #b5b5b5; }

/* ── TOPNAV SHELL ────────────────────────────────────────────────────────────── */
/* Figma: bg fill/static/brand/base #2d4889, max-h 56px desktop, px 16px, py 4px */
.topnav {
  background: var(--semantic-color-light-mode-fill-static-brand-base, #2d4889);
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-height: 56px;
  padding: 4px 16px;
  position: relative;
  overflow: visible;
  z-index: 100;
}
.topnav--tablet { max-height: 54px; padding: 4px 12px; }
.topnav--mobile { padding: 4px 8px; }

/* Slot.RowStart and Slot.RowEnd: gap 8px (tight) */
.topnav__start { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.topnav__end   { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

/* ── BASE INTERACTIVE WRAPPER ────────────────────────────────────────────────── */
/* 48x48 outer shell that all nav controls live inside */
.tn-ctrl {
  display: flex; align-items: center; justify-content: center;
  min-height: 48px; min-width: 48px;
  flex-shrink: 0;
  cursor: pointer;
}

/* ── MODULE SWITCHER ─────────────────────────────────────────────────────────── */
/* Figma: no fill/border in base, 36px inner height, p-4px, rounded-8px */
.tn-mod { position: relative; padding: 4px 2px; }
.tn-mod__inner {
  display: flex; align-items: center;
  max-height: 36px; min-height: 36px;
  padding: 4px;
  border-radius: 8px;
  background: transparent;
  border: 1px solid transparent;
  cursor: pointer;
  gap: 0;
  transition: background 120ms ease, border-color 120ms ease;
  font-family: 'Red Hat Text', sans-serif;
  color: var(--semantic-color-dark-mode-text-action-mono-base, #fbfbfb);
}
.tn-mod__inner:hover {
  background: var(--semantic-color-dark-mode-fill-action-primaryinverse-hover, rgba(10,18,35,0.16));
  border-color: var(--semantic-color-dark-mode-stroke-action-tertiary-hover, rgba(160,181,230,0.20));
}
.tn-mod__inner:active,
.tn-mod__inner[aria-expanded="true"] {
  background: var(--semantic-color-dark-mode-fill-action-primaryinverse-pressed, rgba(255,255,255,0.08));
  border-color: var(--semantic-color-dark-mode-stroke-action-tertiary-pressed, rgba(160,181,230,0.30));
}
.tn-mod__inner:focus-visible {
  outline: 2px solid rgba(160,181,230,0.7); outline-offset: 2px;
}
/* Container.RowStart */
.tn-mod__row-start {
  display: flex; align-items: center; gap: 4px;
  padding-right: 2px;
}
/* Container.IconLeading: 30x30 */
.tn-mod__icon-wrap {
  display: flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; flex-shrink: 0; padding: 1px;
}
.tn-mod__icon-inner {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 100%; padding: 2px;
}
.tn-mod__icon-inner svg { width: 100%; height: 100%; display: block; }
/* Container.Label */
.tn-mod__label {
  font-size: 14px; font-weight: 500; line-height: 20px;
  letter-spacing: 0.3px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  max-width: 160px;
  color: var(--semantic-color-dark-mode-text-action-mono-base, #fbfbfb);
}
/* Container.RowEnd: chevron */
.tn-mod__chev-wrap {
  display: flex; align-items: center; justify-content: center;
  width: 16px; height: 16px; flex-shrink: 0; padding: 2px;
}
.tn-mod__chev-wrap svg {
  width: 100%; height: 100%; display: block;
  transition: transform 180ms ease;
}
.tn-mod__inner[aria-expanded="true"] .tn-mod__chev-wrap svg {
  transform: rotate(180deg);
}

/* Module Dropdown: white bg, shadow */
.tn-mod__dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  width: 243px;
  background: #fff;
  border: 1px solid rgba(45,72,137,0.12);
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.06);
  padding: 4px;
  z-index: 300;
  animation: tnDropIn 140ms ease-out both;
}
.tn-mod__dropdown.is-open { display: block; }

.tn-mod__item {
  display: flex; align-items: center; gap: 10px; padding: 9px 10px;
  border-radius: 6px;
  color: #484848; font-size: 13px; font-weight: 400;
  background: transparent; border: none; width: 100%; text-align: left;
  font-family: 'Red Hat Text', sans-serif; cursor: pointer;
  transition: background 100ms ease, color 100ms ease;
}
.tn-mod__item:hover { background: #eef2fb; color: #252525; }
.tn-mod__item--active { background: #eef2fb; color: #252525; font-weight: 500; }
.tn-mod__item--active:hover { background: #e0e7f7; }
.tn-mod__item:focus-visible { outline: 2px solid rgba(45,72,137,0.3); outline-offset: -2px; }
.tn-mod__item-icon { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.7; }
.tn-mod__item--active .tn-mod__item-icon { opacity: 1; }

/* ── ORG SWITCHER ────────────────────────────────────────────────────────────── */
/* Figma: fill/action/tertiary/base, stroke/action/tertiary/base, 36px h, p-4px, rounded-8px */
/* max-w: 316px on desktop */
.tn-org { position: relative; padding: 4px; max-width: 316px; min-width: 48px; }
.tn-org__inner {
  display: flex; align-items: center; gap: 4px;
  min-height: 36px;
  padding: 4px;
  border-radius: 8px;
  background: var(--semantic-color-dark-mode-fill-action-tertiary-base, rgba(160,181,230,0.04));
  border: 1px solid var(--semantic-color-dark-mode-stroke-action-tertiary-base, rgba(160,181,230,0.16));
  cursor: pointer;
  font-family: 'Red Hat Text', sans-serif;
  color: var(--semantic-color-dark-mode-text-action-mono-base, #fbfbfb);
  transition: background 120ms ease, border-color 120ms ease;
}
.tn-org__inner:hover {
  background: var(--semantic-color-dark-mode-fill-action-primaryinverse-hover, rgba(10,18,35,0.16));
  border-color: var(--semantic-color-dark-mode-stroke-action-tertiary-hover, rgba(160,181,230,0.20));
}
.tn-org__inner:active,
.tn-org__inner[aria-expanded="true"] {
  background: var(--semantic-color-dark-mode-fill-action-primaryinverse-pressed, rgba(255,255,255,0.08));
  border-color: var(--semantic-color-dark-mode-stroke-action-tertiary-pressed, rgba(160,181,230,0.30));
}
.tn-org__inner:focus-visible { outline: 2px solid rgba(160,181,230,0.7); outline-offset: 2px; }

/* Container.RowStart */
.tn-org__row-start {
  display: flex; align-items: center; gap: 4px; height: 20px; padding: 0 2px;
}
/* Container.Avatar: 24x24 with border */
.tn-org__avatar-wrap {
  width: 24px; height: 24px; flex-shrink: 0; padding: 2px;
  display: flex; align-items: center; justify-content: center;
}
.tn-org__avatar {
  width: 100%; height: 100%;
  border-radius: 4px;
  border: 1px solid var(--semantic-color-dark-mode-stroke-action-tertiary-base, rgba(160,181,230,0.16));
  overflow: hidden;
  position: relative;
  background: rgba(45,72,137,0.3);
  display: flex; align-items: center; justify-content: center;
}
.tn-org__avatar img {
  /* Figma: h-[228.29%] left-[-47.05%] top-[-63.31%] w-[196.31%] */
  position: absolute;
  width: 196.31%; height: 228.29%;
  left: -47.05%; top: -63.31%;
  object-fit: cover;
}
/* Fallback when no image: show initials */
.tn-org__avatar-fallback {
  font-size: 7px; font-weight: 700; letter-spacing: .04em;
  color: var(--semantic-color-dark-mode-text-action-mono-base, #fbfbfb);
  line-height: 1;
}
/* Container.Label */
.tn-org__label {
  font-size: 14px; font-weight: 500; line-height: 20px; letter-spacing: 0.3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 248px; min-width: 0;
  color: var(--semantic-color-dark-mode-text-action-mono-base, #fbfbfb);
  padding-right: 4px;
}
/* Container.RowEnd: chevron */
.tn-org__chev-wrap {
  display: flex; align-items: center; justify-content: center;
  width: 16px; height: 16px; flex-shrink: 0; padding: 2px;
}
.tn-org__chev-wrap svg {
  width: 100%; height: 100%; display: block;
  transition: transform 180ms ease;
}
.tn-org__inner[aria-expanded="true"] .tn-org__chev-wrap svg {
  transform: rotate(180deg);
}

/* Org panel dropdown */
.tn-org__panel {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  width: 280px;
  background: #fff;
  border: 1px solid rgba(45,72,137,0.12);
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.06);
  padding: 8px;
  z-index: 300;
  animation: tnDropIn 140ms ease-out both;
}
.tn-org__panel.is-open { display: block; }
.tn-org__panel-title {
  font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase;
  color: #9797979; padding: 4px 8px 6px; color: #b5b5b5;
}
.tn-org__panel-item {
  display: flex; align-items: center; gap: 10px; padding: 8px;
  border-radius: 6px; cursor: pointer;
  transition: background 100ms ease;
}
.tn-org__panel-item:hover { background: #eef2fb; }
.tn-org__panel-item--active { background: #eef2fb; }
.tn-org__panel-av {
  width: 32px; height: 32px; border-radius: 4px; overflow: hidden; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: #2d4889; position: relative;
}
.tn-org__panel-av img { position: absolute; width: 80%; height: auto; }
.tn-org__panel-av-text { font-size: 9px; font-weight: 700; color: #fff; }
.tn-org__panel-names { min-width: 0; }
.tn-org__panel-name { font-size: 13px; font-weight: 500; color: #252525; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tn-org__panel-campus { font-size: 11px; color: #6b6b6b; margin-top: 1px; }

/* ── TOPNAV SEARCH (Collapsed — icon button) ──────────────────────────────────── */
/* Figma: 48x48 outer, 32px inner pill, fill primaryinverse/base, border #fbfbfb 0.75px */
.tn-search {
  display: flex; align-items: center; justify-content: center;
  min-height: 48px; min-width: 48px; flex-shrink: 0;
}
.tn-search__btn {
  display: flex; align-items: center; justify-content: center;
  height: 32px; width: 32px;
  background: var(--semantic-color-dark-mode-fill-action-primaryinverse-base, rgba(160,181,230,0.08));
  border: 0.75px solid var(--semantic-color-dark-mode-icon-action-mono-base, #fbfbfb);
  border-radius: 9999px;
  cursor: pointer;
  padding: 8px;
  transition: background 120ms ease, border-color 120ms ease;
  flex-shrink: 0;
}
.tn-search__btn:hover {
  background: var(--semantic-color-dark-mode-fill-action-primaryinverse-hover, rgba(10,18,35,0.16));
  border-color: rgba(255,255,255,0.9);
}
.tn-search__btn:active {
  background: var(--semantic-color-dark-mode-fill-action-primaryinverse-pressed, rgba(255,255,255,0.08));
}
.tn-search__btn:focus-visible { outline: 2px solid rgba(160,181,230,0.7); outline-offset: 2px; }
.tn-search__btn svg { width: 100%; height: 100%; display: block; }

/* ── ACTION ICONS ────────────────────────────────────────────────────────────── */
/* Figma: 48x48 outer, inner icon container p-8px rounded-8px, no bg in base */
.tn-actions { display: flex; align-items: center; }
.tn-action {
  display: flex; align-items: center; justify-content: center;
  min-height: 48px; min-width: 48px; padding: 6px; flex-shrink: 0;
}
.tn-action__btn {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 100%;
  padding: 8px; border-radius: 8px;
  background: transparent; border: none;
  cursor: pointer;
  transition: background 120ms ease;
}
.tn-action__btn:hover {
  background: var(--semantic-color-dark-mode-fill-action-primaryinverse-hover, rgba(10,18,35,0.16));
}
.tn-action__btn:active {
  background: var(--semantic-color-dark-mode-fill-action-primaryinverse-pressed, rgba(255,255,255,0.08));
}
.tn-action__btn:focus-visible { outline: 2px solid rgba(160,181,230,0.7); outline-offset: 2px; border-radius: 8px; }
.tn-action__icon { width: 100%; height: 100%; overflow: hidden; border-radius: 8px; position: relative; }
.tn-action__icon-shape {
  position: absolute;
  top: 8.33%; bottom: 0; left: 16.67%; right: 16.67%;
}
.tn-action__icon-shape svg { width: 100%; height: 100%; display: block; }

/* ── TOPNAV PROFILE ──────────────────────────────────────────────────────────── */
/* Figma: 48x48 outer, 32px avatar circle, fill/static/accent_amethyst/base */
.tn-profile {
  display: flex; align-items: center; justify-content: center;
  min-height: 48px; min-width: 48px; padding: 2px; flex-shrink: 0;
  position: relative;
}
.tn-profile__btn {
  display: flex; align-items: center; justify-content: center;
  width: 44px; height: 44px;
  background: transparent; border: none; border-radius: 50%;
  cursor: pointer; padding: 6px;
  transition: background 120ms ease;
}
.tn-profile__btn:hover {
  background: var(--semantic-color-dark-mode-fill-action-primaryinverse-hover, rgba(10,18,35,0.16));
}
.tn-profile__btn:active,
.tn-profile__btn[aria-expanded="true"] {
  background: var(--semantic-color-dark-mode-fill-action-primaryinverse-pressed, rgba(255,255,255,0.08));
}
.tn-profile__btn:focus-visible { outline: 2px solid rgba(160,181,230,0.7); outline-offset: 2px; border-radius: 50%; }
.tn-profile__avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--semantic-color-light-mode-fill-static-accent-amethyst-base, #dcd9ef);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 600; letter-spacing: 0.3px;
  color: var(--semantic-color-light-mode-text-static-accent-amethyst-contrast, #221e3f);
  line-height: 1;
  overflow: hidden; flex-shrink: 0;
}
.tn-profile__avatar img { width: 100%; height: 100%; object-fit: cover; }

/* Profile menu */
.tn-profile__menu {
  display: none; position: absolute;
  top: calc(100% + 4px); right: 0; width: 200px;
  background: #fff; border: 1px solid rgba(45,72,137,0.10);
  border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.06);
  padding: 4px; z-index: 300; animation: tnDropIn 140ms ease-out both;
}
.tn-profile__menu.is-open { display: block; }
.tn-profile__menu-header { padding: 10px 12px 8px; border-bottom: 1px solid rgba(0,0,0,0.06); margin-bottom: 4px; }
.tn-profile__menu-name { font-size: 13px; font-weight: 600; color: #252525; }
.tn-profile__menu-email { font-size: 11px; color: #6b6b6b; margin-top: 1px; }
.tn-profile__menu-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 10px;
  border-radius: 6px; font-family: 'Red Hat Text', sans-serif;
  font-size: 13px; color: #313131; background: transparent; border: none;
  width: 100%; text-align: left; cursor: pointer; transition: background 100ms ease;
}
.tn-profile__menu-item:hover { background: #eef2fb; }
.tn-profile__menu-item svg { width: 15px; height: 15px; flex-shrink: 0; color: #6b6b6b; }
.tn-profile__menu-item--danger { color: #c0392b; }
.tn-profile__menu-item--danger svg { color: #c0392b; }
.tn-profile__menu-item--danger:hover { background: #fff0ee; }

/* ── SIDENAV CONTROL (mobile) ────────────────────────────────────────────────── */
/* Figma: 48x48 container, inner icon p-6px rounded-8px */
.tn-sidenav-ctrl { display: none; }
.tn-sidenav-ctrl__btn {
  display: flex; align-items: center; justify-content: center;
  min-height: 48px; min-width: 48px; padding: 8px;
}
.tn-sidenav-ctrl__inner {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 100%; padding: 6px; border-radius: 8px;
  background: transparent; border: none; cursor: pointer;
  transition: background 120ms ease;
}
.tn-sidenav-ctrl__inner:hover {
  background: var(--semantic-color-dark-mode-fill-action-primaryinverse-hover, rgba(10,18,35,0.16));
}
.tn-sidenav-ctrl__icon { width: 100%; height: 100%; overflow: hidden; border-radius: 8px; position: relative; }
.tn-sidenav-ctrl__shape {
  position: absolute; bottom: 25%; left: 12.5%; right: 12.5%; top: 25%;
}
.tn-sidenav-ctrl__shape svg { width: 100%; height: 100%; display: block; }

/* ── SCRIM ───────────────────────────────────────────────────────────────────── */
.tn-scrim { display: none; position: fixed; inset: 0; z-index: 200; }
.tn-scrim.is-active { display: block; }

/* ── ANIMATIONS ──────────────────────────────────────────────────────────────── */
@keyframes tnDropIn {
  from { opacity: 0; transform: translateY(-4px) scale(0.99); }
  to   { opacity: 1; transform: translateY(0)    scale(1); }
}
@media (prefers-reduced-motion: reduce) {
  @keyframes tnDropIn { from { opacity: 0; } to { opacity: 1; } }
}

/* ── RESPONSIVE ──────────────────────────────────────────────────────────────── */
/* Mobile ≤767px: show sidenav control, hide module label */
@media (max-width: 767px) {
  .tn-sidenav-ctrl { display: flex; }
  .tn-mod__label { display: none; }
  .tn-org__label { max-width: 80px; }
}
/* Tablet 768–1023px */
@media (min-width: 768px) and (max-width: 1023px) {
  .tn-mod__label { max-width: 100px; }
  .tn-org__label { max-width: 160px; }
}

<script>
function closeAll() {
  document.querySelectorAll('[aria-expanded="true"]').forEach(btn => btn.setAttribute('aria-expanded','false'));
  document.querySelectorAll('.is-open').forEach(el => el.classList.remove('is-open'));
  document.getElementById('scrim').classList.remove('is-active');
}

function toggleDropdown(btnId, panelId) {
  const btn = document.getElementById(btnId);
  const panel = document.getElementById(panelId);
  const isOpen = btn.getAttribute('aria-expanded') === 'true';
  closeAll();
  if (!isOpen) {
    btn.setAttribute('aria-expanded','true');
    panel.classList.add('is-open');
    document.getElementById('scrim').classList.add('is-active');
    const first = panel.querySelector('button,[tabindex]');
    if (first) setTimeout(() => first.focus(), 50);
  }
}

function selectModule(el, name, iconId) {
  el.closest('ul').querySelectorAll('.tn-mod__item').forEach(i => {
    i.classList.remove('tn-mod__item--active');
    i.closest('[role="option"]').setAttribute('aria-selected','false');
  });
  el.classList.add('tn-mod__item--active');
  el.closest('[role="option"]').setAttribute('aria-selected','true');
  const lbl = document.getElementById('mod-label');
  if (lbl) lbl.textContent = name;
  closeAll();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const trigger = document.querySelector('[aria-expanded="true"]');
    closeAll();
    if (trigger) trigger.focus();
  }
});
</script>
