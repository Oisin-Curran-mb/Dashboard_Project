<!DOCTYPE html>
<html lang="en" data-pathway-prototype="true">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platform Shell — SideNav + TopNav (Prototype v5)</title>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; background: #fafafa; font-family: 'Red Hat Text', sans-serif; }

  /* ── Scrollbar (side-nav) ─────────────────────────────────────────────── */
  /* Spec: thin, unobtrusive at rest, clearer on hover/scroll. Blends with   */
  /* surface.nav.light.                                                       */
  /*   thumb (rest)  = rgba(17,17,17,0.08) — cool-neutral.220-8               */
  /*   thumb (hover) = rgba(17,17,17,0.18)                                    */
  /* 6px width, fully rounded. Firefox uses scrollbar-width: thin.            */
  /*                                                                          */
  /* Layout stability: `scrollbar-gutter: stable` reserves a 6px gutter       */
  /* whether or not the scrollbar is visible. This prevents nav items from    */
  /* reflowing when content becomes scrollable and prevents them from being   */
  /* overlapped/obscured by the scrollbar thumb.                              */
  .pds-sidenav-scroll {
    scrollbar-width: thin;
    scrollbar-color: rgba(17,17,17,0.08) transparent;
    scrollbar-gutter: stable;
  }
  .pds-sidenav-scroll::-webkit-scrollbar { width: 6px; }
  .pds-sidenav-scroll::-webkit-scrollbar-track { background: transparent; margin: 4px 0; }
  .pds-sidenav-scroll::-webkit-scrollbar-thumb {
    background: rgba(17,17,17,0.08);
    border-radius: 999px;
    transition: background 0.15s ease;
  }
  .pds-sidenav-scroll:hover::-webkit-scrollbar-thumb { background: rgba(17,17,17,0.18); }
  .pds-sidenav-scroll::-webkit-scrollbar-thumb:hover { background: rgba(17,17,17,0.32); }
  .pds-sidenav-scroll::-webkit-scrollbar-thumb:active { background: rgba(17,17,17,0.45); }

  /* Canvas scrollbar (unchanged, just included to match demo) */
  main::-webkit-scrollbar { width: 6px; }
  main::-webkit-scrollbar-thumb { background: rgba(17,17,17,0.08); border-radius: 999px; }

  .prototype-banner {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: #fff7e6; border-bottom: 1px solid #f5d98a;
    color: #7a5c10; font-family: 'Red Hat Text', sans-serif;
    font-size: 12px; line-height: 16px; padding: 8px 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .prototype-banner strong {
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
    font-size: 11px; background: #7a5c10; color: #fff7e6;
    padding: 2px 6px; border-radius: 3px;
  }

  @keyframes popoverIn {
    from { opacity: 0; transform: translateX(-4px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes popoverInCentered {
    from { opacity: 0; transform: translateX(-4px) translateY(-50%); }
    to   { opacity: 1; transform: translateX(0)    translateY(-50%); }
  }
  @media (prefers-reduced-motion: reduce) {
    @keyframes popoverIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes popoverInCentered {
      from { opacity: 0; transform: translateY(-50%); }
      to   { opacity: 1; transform: translateY(-50%); }
    }
  }

  /* TopNav hamburger — Option A: only shown at tablet + mobile breakpoints.  */
  /* At desktop (≥1024px), the sidenav has its own in-sidenav collapse toggle */
  /* (see v4), so the TopNav hamburger is redundant and is hidden.            */
  .topnav-hamburger { display: flex; }
  @media (min-width: 1024px) {
    .topnav-hamburger { display: none; }
  }

  /* Mock "What's new" floating bubble (demonstrates clearance requirement) */
  .mock-whats-new {
    position: fixed; bottom: 20px; left: 20px; z-index: 500;
    width: 56px; height: 56px; border-radius: 999px;
    background: linear-gradient(135deg, #3555a0 0%, #5072b8 100%);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(53,85,160,0.3), 0 1px 3px rgba(0,0,0,0.12);
    font-family: 'Red Hat Text', sans-serif; font-weight: 600;
    cursor: pointer;
  }
  .mock-whats-new::after {
    content: "NEW"; font-size: 10px; letter-spacing: 0.08em;
  }
</style>
</head>

<div class="prototype-banner">
  <strong>Prototype v5</strong>
  <span>Platform shell: TopNav + SideNav. Generated 2026-04-22 by pathway-component-prototype. Lives in <code>components-sandbox/sidenav/</code>.</span>
</div>
<div id="root"></div>
<div class="mock-whats-new" title="Mock 'What's New' floating bubble — demonstrates the bottom-clearance requirement"></div>

  ),
  chevDown: ({size=10, color}) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M3 5.5L8 10.5L13 5.5" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>

  chevUp: ({size=10, color}) => (

  ),
  // NEW v4: sidebar-toggle icon. Outlined rectangle with a vertical rule
  // showing the side-panel metaphor. When the sidebar is expanded the line
  // sits on the left (indicating "collapse toward that edge"); when collapsed
  // it sits on the right (indicating "expand from that edge").
  sidebarToggle: ({size=18, color, collapsed=false}) => (
    <svg width={size} height={size} viewBox="0 0 18 18" fill="none">
      <rect x="2.25" y="3.25" width="13.5" height="11.5" rx="2" stroke={color} strokeWidth="1.25"/>
      <line x1={collapsed ? "11" : "7"} y1="3.25" x2={collapsed ? "11" : "7"} y2="14.75" stroke={color} strokeWidth="1.25"/>

};
function IconImg({ name, size=14, color }) {
  const Ic = IC[name];
  return Ic ? <Ic size={size} color={color} /> : null;
}

// ─── IndicatorStripe ──────────────────────────────────────────────────────────
function IndicatorStripe({ visible }) {
  return (
    <div style={{ width: L.stripeW, alignSelf: "stretch", display: "flex",
      flexDirection: "column", alignItems: "flex-start",
      justifyContent: "center", padding: "4px 0", flexShrink: 0 }}>
      <div style={{ flex: "1 0 0", width: L.stripeW, minHeight: 1,
        borderRadius: "0 8px 8px 0",
        backgroundColor: visible ? T.indicator : "transparent",
        transition: "background-color 0.15s ease" }} />
    </div>
  );
}

// ─── CollapseToggle (NEW v4) ──────────────────────────────────────────────────
// Quiet icon button. Replaces the bottom-of-sidenav CollapseButton. Lives in
// the sidenav header so it does not scroll with content (§15.8 spec debt).
function CollapseToggle({ isSidebarCollapsed, onToggle }) {
  const [h, setH] = useState(false);
  const color = h ? T.icon.toggleHover : T.icon.toggleIdle;
  return (
    <button onClick={onToggle} type="button"
      aria-label={isSidebarCollapsed ? "Expand navigation" : "Collapse navigation"}
      onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{
        width: 28, height: 28, borderRadius: 6,
        border: "none", background: h ? T.fill.navHover : "transparent",
        cursor: "pointer", padding: 0,
        display: "flex", alignItems: "center", justifyContent: "center",
        transition: "background-color 0.15s ease",
        flexShrink: 0,
      }}>
      <IC.sidebarToggle size={18} color={color} collapsed={isSidebarCollapsed} />
    </button>
  );
}

// ─── SectionLabel (v4 typography) ─────────────────────────────────────────────
// 11pt / 500 (medium) / text.static.secondary.subtle (#6b6b6b)
// All-caps, non-interactive. Vanishes in rail, replaced by subtle divider.
// If `withToggle` is true, render the collapse toggle icon to the right of the
// label (reserved for the first section label — acts as the sidenav's header).
function SectionLabel({ label, isSidebarCollapsed, withToggle, onToggle }) {
  if (isSidebarCollapsed) {
    return (
      <div style={{
        height: 1, width: "100%",
        backgroundColor: T.fill.infoSubtle,
        marginTop: L.railDividerMarginV, marginBottom: L.railDividerMarginV,
      }} aria-hidden="true" />
    );
  }
  return (
    <div style={{
      display: "flex", alignItems: "center",
      paddingTop: L.sectionPadV, paddingBottom: L.sectionPadV,
      paddingLeft: L.sectionPadH, paddingRight: 4,
      marginTop: L.sectionMarginTop, marginBottom: L.sectionMarginBot,
      width: "100%", cursor: "default", userSelect: "none",
    }}>
      <span style={{
        // Typography: 11 / 500 (medium) / 16 / wide — atoms from primitive-type.*
        // No exact semantic match (label.dense.s has regular + semibold, not medium).
        // See spec-additions doc for the composition rationale.
        fontFamily: "'Red Hat Text',sans-serif",
        fontSize: 11, fontWeight: 500, lineHeight: "16px",
        letterSpacing: "0.1px",
        textTransform: "uppercase",
        color: T.text.sectionLabel,
        flex: 1, minWidth: 0,
        whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
      }}>{label}</span>
      {withToggle && (
        <CollapseToggle isSidebarCollapsed={false} onToggle={onToggle} />
      )}
    </div>
  );
}

// ─── RailHeader (NEW v4) ──────────────────────────────────────────────────────
// In rail state, the collapse toggle still needs a home. Place it at the top
// of the rail, centered, followed by the standard section-divider treatment.
function RailHeader({ onToggle }) {
  return (
    <>
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "center",
        height: 40, width: "100%",
      }}>
        <CollapseToggle isSidebarCollapsed={true} onToggle={onToggle} />
      </div>
      <div style={{
        height: 1, width: "100%",
        backgroundColor: T.fill.infoSubtle,
        marginBottom: 8,
      }} aria-hidden="true" />
    </>
  );
}

// ─── SideNavItem ──────────────────────────────────────────────────────────────
// Behavior unchanged from production. Typography: 14pt / 500 / 20.
function SideNavItem({ item, isActive, isTrail, isExpanded, isSidebarCollapsed,
  isChild, onClick, onToggle, popoverOpen, anchorRect, onPopoverEnter, onPopoverLeave, activeId }) {

  const [hovered, setHovered] = useState(false);
  const hasChildren = !!(item.children && item.children.length);
  const itemRef = useRef(null);

  const isExpandedGrouper = hasChildren && isExpanded && !isSidebarCollapsed;
  const isCollapsedActiveGrouper = isTrail && (!isExpanded || isSidebarCollapsed);
  const isCollapsedGrouper = isSidebarCollapsed && hasChildren;
  const showStripe = isCollapsedActiveGrouper || (isActive && !isCollapsedGrouper);

  const fillBg =
    (isActive || isCollapsedActiveGrouper) ? T.fill.navActive
    : isExpandedGrouper                    ? T.fill.navTrail
    : hovered                              ? T.fill.navHover
    :                                        T.fill.navBase;
  const textColor =
    (isActive || isCollapsedActiveGrouper || isExpandedGrouper) ? T.text.navActive
    : hovered ? T.text.navHover
    :           T.text.navBase;
  const iconColor =
    (isActive || isCollapsedActiveGrouper) ? T.icon.navActive
    : hovered                              ? T.icon.navHover
    :                                        T.icon.navBase;

  const handleClick = () => {
    if (hasChildren && !isSidebarCollapsed) onToggle(item.id);
    else onClick(item.id);
  };
  const ChevComp = isExpanded ? IC.chevUp : IC.chevDown;

  return (
    <div ref={itemRef} style={{ position: "relative" }}>
      <div role="button" tabIndex={0} aria-current={isActive ? "page" : undefined}
        aria-expanded={hasChildren && !isSidebarCollapsed ? isExpanded : undefined}
        onClick={handleClick} onKeyDown={e => (e.key === "Enter" || e.key === " ") && handleClick()}
        onMouseEnter={() => {
          setHovered(true);
          if (isSidebarCollapsed && onPopoverEnter) {
            const rect = itemRef.current ? itemRef.current.getBoundingClientRect() : null;
            onPopoverEnter(item.id, rect);
          }
        }}
        onMouseLeave={() => {
          setHovered(false);
          if (isSidebarCollapsed && onPopoverLeave) onPopoverLeave();
        }}
        style={{ display: "flex", alignItems: "center", minHeight: L.itemH, width: "100%",
          borderRadius: T.radius, backgroundColor: fillBg, cursor: "pointer",
          overflow: "hidden", transition: "background-color 0.15s ease", userSelect: "none" }}>
        <IndicatorStripe visible={showStripe} />
        {!isChild && item.icon && (
          <div style={{ width: L.iconWrap, height: L.iconWrap, display: "flex",
            alignItems: "center", justifyContent: "center", flexShrink: 0,
            marginLeft: L.rowPadH }}>
            <IconImg name={item.icon} size={L.iconInner} color={iconColor} />
          </div>
        )}
        <div style={{ flex: 1, minWidth: 0,
          paddingLeft:  isChild ? 32 : L.textPad,
          paddingRight: (!isChild && hasChildren) ? 0 : L.rowPadH,
          maxWidth: isSidebarCollapsed ? 0 : L.labelMaxWidth,
          opacity:  isSidebarCollapsed ? 0 : 1,
          overflow: "hidden",
          pointerEvents: isSidebarCollapsed ? "none" : "auto",
          transition: "max-width 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.18s ease" }}>
          <p style={{ fontFamily: "'Red Hat Text',sans-serif", fontWeight: 500,
            fontSize: 14, lineHeight: "20px", letterSpacing: "0.02px",
            color: textColor, margin: 0,
            whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
            transition: "color 0.15s ease" }}>
            {item.label}
          </p>
        </div>
        {!isChild && hasChildren && (
          <div style={{ width: 40, height: L.iconWrap, display: "flex",
            alignItems: "center", justifyContent: "center", flexShrink: 0,
            maxWidth: isSidebarCollapsed ? 0 : 40,
            opacity:  isSidebarCollapsed ? 0 : 1,
            overflow: "hidden",
            transition: "max-width 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.18s ease" }}>
            <ChevComp size={10} color={iconColor} />
          </div>
        )}
      </div>

      {isSidebarCollapsed && popoverOpen && anchorRect && (
        <div style={{ position: "fixed",
          left: anchorRect.right, top: anchorRect.top,
          width: 8, height: anchorRect.height, zIndex: 999 }}
          onMouseEnter={() => {
            const rect = itemRef.current ? itemRef.current.getBoundingClientRect() : anchorRect;
            onPopoverEnter && onPopoverEnter(item.id, rect);
          }} />
      )}
      {isSidebarCollapsed && hasChildren && popoverOpen && anchorRect && (
        <CollapsedPopover item={item} onClick={onClick} anchorRect={anchorRect}
          activeId={activeId}
          onMouseEnter={() => {
            const rect = itemRef.current ? itemRef.current.getBoundingClientRect() : anchorRect;
            onPopoverEnter && onPopoverEnter(item.id, rect);
          }}
          onMouseLeave={onPopoverLeave} />
      )}
      {isSidebarCollapsed && !hasChildren && popoverOpen && anchorRect && (
        <CollapsedTooltip label={item.label} anchorRect={anchorRect}
          onMouseEnter={() => {
            const rect = itemRef.current ? itemRef.current.getBoundingClientRect() : anchorRect;
            onPopoverEnter && onPopoverEnter(item.id, rect);
          }}
          onMouseLeave={onPopoverLeave} />
      )}
    </div>
  );
}

function CollapsedTooltip({ label, anchorRect, onMouseEnter, onMouseLeave }) {
  if (!anchorRect) return null;
  return ReactDOM.createPortal(
    <div onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}
      style={{ position: "fixed",
        left: anchorRect.right + 8,
        top:  anchorRect.top + anchorRect.height / 2,
        zIndex: 1000, backgroundColor: "#fff",
        border: "0.5px solid #f6f6f6", borderRadius: 8,
        boxShadow: "2px 2px 8px 0px rgba(0,0,0,0.03)",
        padding: "6px 8px", whiteSpace: "nowrap", pointerEvents: "auto",
        animation: "popoverInCentered 150ms cubic-bezier(0,0,0.2,1) forwards" }}>
      <span style={{ fontFamily: "'Red Hat Text',sans-serif", fontWeight: 400,
        fontSize: 14, lineHeight: "20px", letterSpacing: "0.02px",
        color: "#252525" }}>{label}</span>
    </div>,
    document.body
  );
}

function CollapsedPopover({ item, onClick, anchorRect, onMouseEnter, onMouseLeave, activeId }) {
  if (!anchorRect) return null;
  return ReactDOM.createPortal(
    <div onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}
      style={{ position: "fixed",
        left: anchorRect.right + 8, top: anchorRect.top,
        zIndex: 1000, backgroundColor: "#fff",
        border: "0.5px solid #ededed", borderRadius: 8,
        boxShadow: "2px 2px 8px 4px rgba(0,0,0,0.03)",
        padding: 6, minWidth: 200, pointerEvents: "auto",
        animation: "popoverIn 150ms cubic-bezier(0,0,0.2,1) forwards" }}>
      <div style={{ display: "flex", alignItems: "center", minHeight: 40,
        paddingRight: 12, borderBottom: "0.5px solid #ededed" }}>
        <div style={{ width: 4, alignSelf: "stretch", borderRadius: "0 8px 8px 0",
          backgroundColor: "transparent", flexShrink: 0 }} />
        <span style={{ paddingLeft: 8, fontFamily: "'Red Hat Text',sans-serif",
          fontWeight: 400, fontSize: 14, lineHeight: "20px", letterSpacing: "0.02px",
          color: "#6b6b6b", whiteSpace: "nowrap" }}>
          {item.label}
        </span>
      </div>
      {item.children.map(child => <PopoverRow key={child.id} item={child} onClick={onClick} activeId={activeId} />)}
    </div>,
    document.body
  );
}

function PopoverRow({ item, onClick, activeId }) {
  const [h, setH] = useState(false);
  const isActive = item.id === activeId;
  const bg    = isActive ? T.fill.navActive : h ? T.fill.navHover : "transparent";
  const color = isActive ? T.text.navActive : h ? T.text.navHover : T.text.navBase;
  return (
    <div onClick={() => onClick(item.id)}
      onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{ display: "flex", alignItems: "center",
        minHeight: 40, borderRadius: 8, overflow: "hidden",
        backgroundColor: bg, cursor: "pointer",
        transition: "background-color 0.15s ease" }}>
      <div style={{ width: 4, alignSelf: "stretch", borderRadius: "0 4px 4px 0",
        backgroundColor: isActive ? T.indicator : "transparent",
        flexShrink: 0, transition: "background-color 0.15s ease" }} />
      <span style={{ padding: "0 8px", fontFamily: "'Red Hat Text',sans-serif", fontWeight: 400,
        fontSize: 14, lineHeight: "20px", letterSpacing: "0.02px",
        color, transition: "color 0.15s ease", flex: 1 }}>
        {item.label}
      </span>
    </div>
  );
}

// ─── SideNav container ────────────────────────────────────────────────────────
function SideNav({ activeId, onNavigate, sidebarCollapsed, onCollapseChange }) {
  const [expanded, setExpanded] = useState({ view: true });
  const [popoverId, setPopoverId] = useState(null);
  const [popoverRect, setPopoverRect] = useState(null);
  const timerRef = useRef(null);

  const realItems = NAV.filter(i => i.type !== "section-label");
  const trailParentId = (() => {
    const p = realItems.find(item => item.children && item.children.some(c => c.id === activeId));
    return p ? p.id : null;
  })();

  const toggleExpand = id => setExpanded(p => ({ ...p, [id]: !p[id] }));
  const onPopoverEnter = (id, rect) => {
    clearTimeout(timerRef.current);
    setPopoverId(id);
    if (rect) setPopoverRect(rect);
  };
  const onPopoverLeave = () => {
    timerRef.current = setTimeout(() => { setPopoverId(null); setPopoverRect(null); }, 300);
  };

  // Default behavior (v4): the collapse toggle always lives in a standalone
  // header row at the top of the sidenav, independent of any section label.
  // The older "host toggle inside first section label" pattern is a possible
  // future variant but not the default — see spec-additions §3.3.

  return (
    <nav style={{
      width: sidebarCollapsed ? L.navWcol : L.navW,
      height: "100%",
      backgroundColor: T.surface.navLight,
      display: "flex", flexDirection: "column",
      padding: `${L.navPadV}px ${L.navPadH}px`,
      boxSizing: "border-box", flexShrink: 0,
      transition: "width 0.36s cubic-bezier(0.4,0,0.2,1)",
      borderRight: `0.5px solid ${T.fill.infoSubtle}`,
    }}>
      {/* Scrollable content area */}
      <div className="pds-sidenav-scroll" style={{
        display: "flex", flexDirection: "column",
        flex: 1, minHeight: 0,
        gap: L.menuGap,
        overflowY: "auto",
        // v4: bottom padding so the last nav item is reachable even with a
        // floating element at the bottom-left of the viewport.
        paddingBottom: L.bottomScrollPad,
        // v5 fix: 6px breathing room between nav items and the 6px scrollbar
        // gutter. Combined with `scrollbar-gutter: stable` in the stylesheet,
        // this prevents the scrollbar thumb from overlapping nav items and
        // keeps layout stable whether or not scroll is active.
        paddingRight: 6,
      }}>
        {/* Header row: holds the collapse toggle at the top of the sidenav. */}
        {/* Rail state → centered toggle + divider. Expanded → right-aligned.  */}
        {sidebarCollapsed ? (
          <RailHeader onToggle={() => onCollapseChange(false)} />
        ) : (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "flex-end",
            padding: `${L.headerPadV}px 4px ${L.headerPadV}px ${L.headerPadH}px`,
            minHeight: L.headerMinH }}>
            <CollapseToggle isSidebarCollapsed={false} onToggle={() => onCollapseChange(true)} />
          </div>
        )}

        {NAV.map((item) => {
          if (item.type === "section-label") {
            return (
              <SectionLabel key={item.id}
                label={item.label}
                isSidebarCollapsed={sidebarCollapsed} />
            );
          }
          const hasChildren = !!(item.children && item.children.length);
          const isActive   = item.id === activeId;
          const isTrail    = item.id === trailParentId;
          const isExpanded = !!expanded[item.id];
          return (
            <div key={item.id}>
              <SideNavItem item={item} isActive={isActive} isTrail={isTrail}
                isExpanded={isExpanded} isSidebarCollapsed={sidebarCollapsed}
                isChild={false} onClick={onNavigate} onToggle={toggleExpand}
                popoverOpen={popoverId === item.id}
                anchorRect={popoverId === item.id ? popoverRect : null}
                onPopoverEnter={onPopoverEnter} onPopoverLeave={onPopoverLeave}
                activeId={activeId} />
              {hasChildren && isExpanded && !sidebarCollapsed && (
                <div style={{ display: "flex", flexDirection: "column", gap: L.menuGap, marginTop: 2 }}>
                  {item.children.map(child => (
                    <SideNavItem key={child.id} item={child}
                      isActive={child.id === activeId} isTrail={false}
                      isExpanded={false} isSidebarCollapsed={false}
                      isChild={true} onClick={onNavigate} onToggle={() => {}} />
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </nav>
  );
}

// ─── TopNav ───────────────────────────────────────────────────────────────────
// 64px dark cerulean bar spanning the full viewport width. Contains the
// hamburger trigger (far-left), module switcher, and right-side action icons
// + avatar. Hamburger toggles the sidenav at every breakpoint:
//   • Desktop: expanded ↔ rail (same effect as the in-sidenav toggle)
//   • Tablet/Mobile: overlay show ↔ hide (sidenav is not persistent here)
// This prototype renders the desktop case. See canvas copy for breakpoint
// behavior notes.
const TopNavIcons = {
  hamburger: ({size=18, color="#fff"}) => (
    <svg width={size} height={14 * size / 18} viewBox="0 0 18 14" fill="none">
      <rect y="0"  width="18" height="2" rx="1" fill={color}/>
      <rect y="6"  width="18" height="2" rx="1" fill={color}/>

      <circle cx="9" cy="13" r="0.8" fill="#fff" opacity="0.85"/>
    </svg>
  ),
  settings: ({size=18}) => (
    <svg width={size} height={size} viewBox="0 0 18 18" fill="none">
      <circle cx="9" cy="9" r="2.2" stroke="#fff" strokeWidth="1.4" opacity="0.85"/>

  // Small module-switcher mark (generic "A" for Accounting)
  moduleMark: ({size=28}) => (
    <svg width={size} height={size} viewBox="0 0 28 28" fill="none">

function TopNavIconButton({ ariaLabel, children }) {
  const [h, setH] = useState(false);
  return (
    <button type="button" aria-label={ariaLabel}
      onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{
        width: 36, height: 36, borderRadius: 6,
        border: "none", padding: 0,
        background: h ? "rgba(255,255,255,0.12)" : "transparent",
        cursor: "pointer", color: "#fff",
        display: "flex", alignItems: "center", justifyContent: "center",
        transition: "background-color 0.15s ease",
        flexShrink: 0,
      }}>
      {children}
    </button>
  );
}

function TopNav({ onHamburgerClick, activeModule }) {
  const [hamH, setHamH] = useState(false);
  const [modH, setModH] = useState(false);
  return (
    <header style={{
      height: 64, backgroundColor: "#0f3e80",
      display: "flex", alignItems: "center",
      padding: "0 16px 0 8px",
      color: "#fff",
      fontFamily: "'Red Hat Text', sans-serif",
      flexShrink: 0,
      zIndex: 50,
    }}>
      {/* Hamburger — Option A: visible only at tablet + mobile breakpoints */}
      {/* (see .topnav-hamburger CSS rule). On desktop, the sidenav owns its */}
      {/* own collapse toggle (header row at top of the sidenav).            */}
      <button type="button" aria-label="Toggle navigation"
        className="topnav-hamburger"
        onClick={onHamburgerClick}
        onMouseEnter={() => setHamH(true)} onMouseLeave={() => setHamH(false)}
        style={{
          width: 40, height: 40, borderRadius: 6,
          border: "none", padding: 0,
          background: hamH ? "rgba(255,255,255,0.12)" : "transparent",
          cursor: "pointer",
          alignItems: "center", justifyContent: "center",
          transition: "background-color 0.15s ease",
          flexShrink: 0,
        }}>
        <TopNavIcons.hamburger />
      </button>

      {/* Module switcher — current module + chevron to open the switcher. */}
      <button type="button" aria-label={`${activeModule} module, switch module`}
        onMouseEnter={() => setModH(true)} onMouseLeave={() => setModH(false)}
        style={{
          display: "flex", alignItems: "center", gap: 8,
          marginLeft: 4, padding: "4px 10px 4px 4px",
          height: 40, borderRadius: 6,
          border: "none",
          background: modH ? "rgba(255,255,255,0.12)" : "transparent",
          cursor: "pointer", color: "#fff",
          transition: "background-color 0.15s ease",
          flexShrink: 0,
        }}>
        <TopNavIcons.moduleMark size={28} />
        <span style={{ fontSize: 14, fontWeight: 600, lineHeight: "20px",
          letterSpacing: "0.02px" }}>
          {activeModule}
        </span>
        <TopNavIcons.chevDownWhite />
      </button>

      {/* Divider */}
      <div style={{ width: 1, height: 24, marginLeft: 12, marginRight: 12,
        background: "rgba(255,255,255,0.2)", flexShrink: 0 }} />

      {/* Org switcher placeholder */}
      <button type="button" aria-label="Organization, switch organization"
        style={{
          display: "flex", alignItems: "center", gap: 6,
          padding: "4px 10px", height: 36, borderRadius: 6,
          border: "none", background: "transparent",
          cursor: "pointer", color: "#fff",
          flexShrink: 0,
        }}>
        <span style={{ fontSize: 14, fontWeight: 400, lineHeight: "20px",
          opacity: 0.9 }}>
          First Baptist Church
        </span>
        <TopNavIcons.chevDownWhite />
      </button>

      {/* Stretch */}
      <div style={{ flex: 1 }} />

      {/* Right-side action icons */}
      <TopNavIconButton ariaLabel="Help"><TopNavIcons.help /></TopNavIconButton>
      <TopNavIconButton ariaLabel="Settings"><TopNavIcons.settings /></TopNavIconButton>
      <TopNavIconButton ariaLabel="Notifications"><TopNavIcons.bell /></TopNavIconButton>

      {/* Avatar */}
      <div aria-label="Account" role="button" tabIndex={0}
        style={{
          width: 36, height: 36, borderRadius: "50%",
          background: "linear-gradient(135deg, #5072b8 0%, #8196c6 100%)",
          display: "flex", alignItems: "center", justifyContent: "center",
          color: "#fff", fontWeight: 600, fontSize: 13,
          marginLeft: 8, flexShrink: 0,
          cursor: "pointer", userSelect: "none",
        }}>JL</div>
    </header>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [activeId, setActiveId] = useState("trial_balance");
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

  const allItems = (() => {
    const out = [];
    const walk = arr => arr.forEach(i => {
      if (i.type !== "section-label") out.push(i);
      if (i.children) walk(i.children);
    });
    walk(NAV);
    return out;
  })();
  const activeItem = allItems.find(i => i.id === activeId);
  const activeLabel = activeItem ? activeItem.label : "Nothing selected";

  return (
    <div style={{ position: "fixed", inset: 0, paddingTop: 33,
      display: "flex", flexDirection: "column" }}>
      <TopNav
        activeModule="Accounting"
        onHamburgerClick={() => setSidebarCollapsed(v => !v)} />

      <div style={{ display: "flex", flex: 1, minHeight: 0 }}>
        <SideNav
          activeId={activeId}
          onNavigate={setActiveId}
          sidebarCollapsed={sidebarCollapsed}
          onCollapseChange={setSidebarCollapsed} />

        <main style={{ flex: 1, overflow: "auto", padding: "40px 56px",
          fontFamily: "'Red Hat Text',sans-serif", color: "#363636" }}>
          <div style={{ maxWidth: 760, margin: "0 auto" }}>
            <p style={{ fontSize: 11, fontWeight: 500, letterSpacing: "0.1px",
              textTransform: "uppercase", color: "#6b6b6b", marginBottom: 8 }}>
              Accounting — active destination
            </p>
            <h1 style={{ fontSize: 32, fontWeight: 600, lineHeight: "40px",
              color: "#051428", margin: "0 0 16px" }}>
              {activeLabel}
            </h1>
            <p style={{ fontSize: 14, lineHeight: "22px", color: "#4b4b4b", marginBottom: 32 }}>
              v5 adds the full platform shell: TopNav (global navigation,
              module switcher, account actions) above the local SideNav.
              Following Option A, the TopNav hamburger is <strong>hidden at
              desktop</strong> (≥1024px) — the sidenav owns its own collapse
              toggle in its header row. The hamburger appears only at tablet
              and mobile (&lt;1024px), where the sidenav becomes overlay and
              needs an always-visible trigger.
            </p>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr",
              gap: 16, marginBottom: 16 }}>
              <div style={{ padding: "16px 20px", border: "1px solid #edf0f9",
                borderRadius: 12, background: "#fff" }}>
                <p style={{ fontSize: 12, fontWeight: 600, color: "#3555a0",
                  textTransform: "uppercase", letterSpacing: "0.06em",
                  marginBottom: 8 }}>
                  Try this
                </p>
                <ul style={{ listStyle: "disc", paddingLeft: 18, fontSize: 13,
                  lineHeight: "20px", color: "#4b4b4b" }}>
                  <li>Notice the <strong>TopNav has no hamburger</strong> at this (desktop) width — Option A is in effect</li>
                  <li>Resize your browser window below 1024px → the hamburger appears in the TopNav's far-left</li>
                  <li>Toggle the sidenav via the <strong>in-sidenav collapse icon</strong> at the top of the nav (desktop trigger)</li>
                  <li>Click <strong>Accounting</strong> (module switcher) or <strong>First Baptist Church</strong> (org switcher) — visual-only in this prototype</li>
                </ul>
              </div>
              <div style={{ padding: "16px 20px", border: "1px solid #edf0f9",
                borderRadius: 12, background: "#fff" }}>
                <p style={{ fontSize: 12, fontWeight: 600, color: "#3555a0",
                  textTransform: "uppercase", letterSpacing: "0.06em",
                  marginBottom: 8 }}>
                  v5 additions
                </p>
                <ul style={{ listStyle: "disc", paddingLeft: 18, fontSize: 13,
                  lineHeight: "20px", color: "#4b4b4b" }}>
                  <li>TopNav: 64px bar, <code>#0f3e80</code> brand dark cerulean</li>
                  <li><strong>Option A:</strong> hamburger hidden on desktop; visible only at tablet/mobile (&lt;1024px)</li>
                  <li>Module switcher + org switcher on the left</li>
                  <li>Help / Settings / Notifications + avatar on the right</li>
                  <li>Everything from v4 preserved beneath</li>
                </ul>
              </div>
            </div>

            <div style={{ padding: "16px 20px", border: "1px solid #edf0f9",
              borderRadius: 12, background: "#fff", marginBottom: 16 }}>
              <p style={{ fontSize: 12, fontWeight: 600, color: "#3555a0",
                textTransform: "uppercase", letterSpacing: "0.06em",
                marginBottom: 8 }}>
                Breakpoint behavior (not simulated here)
              </p>
              <ul style={{ listStyle: "disc", paddingLeft: 18, fontSize: 13,
                lineHeight: "20px", color: "#4b4b4b" }}>
                <li><strong>Desktop (≥1024px):</strong> SideNav is push; 220px expanded / 72px rail. <strong>In-sidenav toggle is the sole trigger.</strong> TopNav hamburger hidden.</li>
                <li><strong>Tablet (768–1023px):</strong> SideNav is overlay; no rail state. <strong>TopNav hamburger is the sole trigger</strong> (shows/hides overlay). Scrim behind. In-sidenav toggle not used here.</li>
                <li><strong>Mobile (&lt;768px):</strong> Same as tablet. TopNav hamburger is the sole trigger. In-sidenav toggle not used.</li>
              </ul>
            </div>

            <div style={{ padding: "12px 16px", border: "1px dashed #f5d98a",
              borderRadius: 8, background: "#fff7e6", fontSize: 12, lineHeight: "18px",
              color: "#7a5c10" }}>
              <strong style={{ fontWeight: 600 }}>Prototype note:</strong> all
              tokens resolve to real entries in
              <code style={{ background: "rgba(122,92,16,0.08)", padding: "1px 4px",
                borderRadius: 3, margin: "0 4px", fontFamily: "monospace" }}>
                tokens/pathway-design-tokens.json
              </code>
              at commit <code style={{ fontFamily: "monospace" }}>98ee386</code>.
              TopNav uses existing tokens (<code>#0f3e80</code> brand dark cerulean,
              white text, white/12% hover fill). No new tokens needed.
              Spec-worthy notes are in
              <code style={{ fontFamily: "monospace", margin: "0 4px" }}>
                sidenav-2026-04-21-grouper-variants-spec-additions.md
              </code>.
            </div>
          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
