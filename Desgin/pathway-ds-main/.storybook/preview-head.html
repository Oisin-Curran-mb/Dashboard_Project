<!--
  Load Red Hat Text (Figma's brand font) and Material Symbols Rounded into
  every Storybook story iframe. Without this, components fall back to the
  system sans-serif and font weights render visibly differently from Figma.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:ital,wght@0,300..700;1,300..700&display=block"
  rel="stylesheet"
/>
<link
  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
  rel="stylesheet"
/>
<style>
  /* Match Figma's macOS text rendering — without these, "Medium" (500) renders
     visibly heavier in browsers than it does in Figma. */
  html, body {
    font-family: "Red Hat Text", sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  .material-symbols-rounded {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    line-height: 1;
    display: block;
    user-select: none;
  }
</style>
