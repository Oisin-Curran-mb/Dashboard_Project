    --semantic-color-light-mode-icon-static-neutral-subtle:   var(--primitive-color-cool-neutral-130);

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── MOTION ────────────────────────────────────────────────────────────────
     Spec §6 Motion. One keyframe, reused for every instance regardless of size.
     Duration 1s · timing linear · iteration infinite.

    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }

  /* ── COMPONENT: .pds-spinner ───────────────────────────────────────────────
     Colour contract (spec §7.1): the spinner accepts ONLY a semantic token
     from the icon.static family. There is no `color` prop, no currentColor
     fallback from arbitrary parents, and no raw hex input. Valid tones and
     emphases are enumerated in §7.1 and §2.1; attempting any other value
     resolves to `unset` (visually broken — surfaces the bug immediately).
  */
  .pds-spinner {
    --pds-spinner-size: 1em;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: var(--pds-spinner-size);
    height: var(--pds-spinner-size);
    flex-shrink: 0;
    line-height: 0;
    /* The colour is set via the `color` property on this wrapper, driven by
       the [data-tone]/[data-emphasis] selectors below. Strokes inherit it. */
  }

     them (rather than constructing a var name from attributes with CSS
     concatenation, which CSS can't do) guarantees only valid tones work.    */

<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// ─── PATHWAY DESIGN SYSTEM — Spinner paths (from Figma) ───────────────────────
// Source: Figma file 3sw45aVcngFAmpbP6cfrXP, node 40006622:50003
//   component variant: style = "progress-activity"
//   inner asset:       node 40006622:50026 "progress-activity-animated"
//
// Eight-spoke sunburst, 12×12 viewBox. Each spoke is a short stroked line
// segment from the inner ring (~1) to the outer ring (~3). The staggered
// opacity ladder (1.00 → 0.12) breaks the 8-fold rotational symmetry so
// that rotating the whole SVG produces a visible "head + fading trail".
// Coordinates are lifted verbatim from the Figma export; do not round.
const SPINNER_SPOKES = [
  { d: "M6 1V3",             opacity: 1.00 },  // 12 o'clock — leading head
  { d: "M8.1 3.9L9.55 2.45", opacity: 0.87 },  //  1:30
  { d: "M9 6H11",            opacity: 0.75 },  //  3 o'clock
  { d: "M8.1 8.1L9.55 9.55", opacity: 0.62 },  //  4:30
  { d: "M6 9V11",            opacity: 0.50 },  //  6 o'clock
  { d: "M2.45 9.55L3.9 8.1", opacity: 0.37 },  //  7:30
  { d: "M1 6H3",             opacity: 0.25 },  //  9 o'clock
  { d: "M2.45 2.45L3.9 3.9", opacity: 0.12 },  // 10:30 — fading tail
];

// ─── Allowed token enumerations — single source of truth for the colour API ──
// These arrays MUST stay in sync with the semantic `icon.static` family in
// tokens/pathway-design-tokens.json. If you add a tone or emphasis there,
// add it here AND in the [data-tone]/[data-emphasis] CSS block above.
const TONES = [
  "neutral",
  "brand",
  "info",
  "warning",
  "danger",
  "negative",
  "positive",
  "accent-amethyst",
  "accent-jade",
  "accent-seabreeze",
];
const EMPHASES = ["light", "subtle", "base", "contrast", "bold"];

// ─── SPINNER ──────────────────────────────────────────────────────────────────
// Props:
//   style     — variant name. Currently only "progress-activity".
//   size      — any CSS length. Defaults to 1em.
//   tone      — one of TONES. Defaults to "neutral".
//   emphasis  — one of EMPHASES. Defaults to "base".
//   label     — accessible name. Defaults to "Loading".
//
// Colour is resolved via [data-tone][data-emphasis] CSS selectors that map
// to var(--semantic-color-light-mode-icon-static-{tone}-{emphasis}). There
// is NO `color` prop and NO currentColor inheritance from arbitrary parents
// — callers must pick a semantic token from the fixed list.
function Spinner({ style: styleVariant = "progress-activity",
                   size, tone = "neutral", emphasis = "base", label = "Loading" }) {
  const spokes = styleVariant === "progress-activity" ? SPINNER_SPOKES : null;
  if (!spokes) return null;

  // Defensive guard — invalid tone/emphasis values are surfaced loudly in the
  // console rather than silently rendering as `color: unset`.
  if (!TONES.includes(tone)) {
    console.error(`[Spinner] Invalid tone "${tone}". Allowed: ${TONES.join(", ")}`);
  }
  if (!EMPHASES.includes(emphasis)) {
    console.error(`[Spinner] Invalid emphasis "${emphasis}". Allowed: ${EMPHASES.join(", ")}`);
  }

  const styleObj = size != null
    ? { "--pds-spinner-size": typeof size === "number" ? `${size}px` : size }
    : undefined;

  return (
    <span className="pds-spinner"
          data-tone={tone}
          data-emphasis={emphasis}
          role="status"
          aria-live="polite"
          aria-label={label}
          style={styleObj}>
      <svg className="pds-spinner__svg"
           viewBox="0 0 12 12"
           xmlns="http://www.w3.org/2000/svg"
           aria-hidden="true"
           focusable="false">
        {spokes.map((s, i) => (
          <path key={i} className="pds-spinner__spoke" d={s.d} opacity={s.opacity} />
        ))}
      </svg>
      <span className="pds-spinner__sr-only">{label}</span>
    </span>
  );
}
