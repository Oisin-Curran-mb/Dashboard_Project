<!DOCTYPE html>
<html lang="en" data-pathway-prototype="true">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search System — Master Demo (Prototype)</title>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; background: #fafafa; font-family: 'Red Hat Text', sans-serif; }

  .prototype-banner {
    position: sticky; top: 0; left: 0; right: 0; z-index: 1000;
    background: #fff7e6; border-bottom: 1px solid #f5d98a;
    color: #7a5c10; font-family: 'Red Hat Text', sans-serif;

    display: flex; align-items: center; gap: 8px;
  }
  .prototype-banner strong {
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
    font-size: 11px; background: #7a5c10; color: #fff7e6;
    padding: 2px 6px; border-radius: 3px;
  }

  /* Search input placeholder, all tones */
  .pds-search-input::placeholder { color: rgba(255,255,255,0.85); opacity: 1; }
  .pds-search-input.tone-default::placeholder { color: #6b6b6b; }
</style>
</head>
<body>
<div class="prototype-banner">
  <strong>Prototype</strong>
  <span>Search system master demo · Generated 2026-04-28 · See companion spec at <code>search-2026-04-28-system-spec.md</code>.</span>
</div>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

// ─── DESIGN TOKENS ────────────────────────────────────────────────────────────
const T = {
  // Pill fills
  pillDefault:      "#ffffff",
  pillDefaultHover: "#fbfbfb",
  pillInverse:      "rgba(255,255,255,0.16)",
  pillInverseHover: "rgba(255,255,255,0.22)",

  // Borders (default tone)
  borderDefault:    "#d2d2d2",
  borderFocus:      "#3555a0",

  // Text
  textDefault:      "#363636",
  placeholderDefault: "#6b6b6b",
  placeholderInverse: "rgba(255,255,255,0.85)",

  // Icons
  iconDefault:      "#363636",
  iconInverse:      "rgba(255,255,255,0.85)",

  // Surfaces
  canvas:           "#fafafa",
  surfaceWhite:     "#ffffff",
  surfaceNav:       "#fafafa",
  topnavBg:         "#0f3e80",

  // Filter chip
  chipFill:         "#edf0f9",
  chipText:         "#3555a0",
  chipBorder:       "rgba(53,85,160,0.2)",

  // Section
  sectionBorder:    "#edf0f9",

  // Misc
  brand:            "#3555a0",
  radius:           8,
};

// ─── ICONS ─────────────────────────────────────────────────────────────────────
const Ic = {
  search: ({size=16, color="#363636"}) => (
    <svg width={size} height={size} viewBox="0 0 18 18" fill="none">
      <circle cx="8" cy="8" r="5.5" stroke={color} strokeWidth="1.6"/>
      <line x1="12.2" y1="12.2" x2="15.5" y2="15.5" stroke={color} strokeWidth="1.6" strokeLinecap="round"/>
    </svg>
  ),
  close: ({size=12, color="#363636"}) => (
    <svg width={size} height={size} viewBox="0 0 14 14" fill="none">
      <path d="M2 2 L12 12 M12 2 L2 12" stroke={color} strokeWidth="1.6" strokeLinecap="round"/>
    </svg>
  ),
  plus: ({size=14, color="#363636"}) => (
    <svg width={size} height={size} viewBox="0 0 14 14" fill="none">
      <path d="M7 2v10 M2 7h10" stroke={color} strokeWidth="1.6" strokeLinecap="round"/>
    </svg>
  ),
  filter: ({size=14, color="#363636"}) => (
    <svg width={size} height={size} viewBox="0 0 14 14" fill="none">
      <path d="M2 3h10l-3.5 4.5v3.5l-3 1V7.5L2 3z" stroke={color} strokeWidth="1.4" strokeLinejoin="round"/>
    </svg>
  ),
  sparkles: ({size=14, color="#3555a0"}) => (
    <svg width={size} height={size} viewBox="0 0 14 14" fill="none">
      <path d="M7 1.5l1 3 3 1-3 1-1 3-1-3-3-1 3-1 1-3z" fill={color}/>
      <circle cx="11.5" cy="11" r="1" fill={color}/>
    </svg>
  ),
  chev: ({size=10, color="#363636", direction="down"}) => {
    const rot = { down: 0, up: 180, right: -90, left: 90 }[direction];
    return (
      <svg width={size} height={size} viewBox="0 0 16 16" fill="none"
        style={{ transform: `rotate(${rot}deg)` }}>
        <path d="M3 5.5L8 10.5L13 5.5" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    );
  },
  back: ({size=20, color="#fff"}) => (
    <svg width={size} height={size} viewBox="0 0 20 20" fill="none">
      <path d="M12 4L6 10L12 16" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  ),
  command: ({size=14, color="#6b6b6b"}) => (
    <svg width={size} height={size} viewBox="0 0 14 14" fill="none">
      <path d="M5 5h4v4H5V5zM5 5V3.5A1.5 1.5 0 113.5 5H5zM9 5V3.5A1.5 1.5 0 1010.5 5H9zM5 9v1.5A1.5 1.5 0 113.5 9H5zM9 9v1.5A1.5 1.5 0 1010.5 9H9z" stroke={color} strokeWidth="1.2" strokeLinejoin="round"/>
    </svg>
  ),
  spinner: ({size=16, color="#363636"}) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none"
      style={{ animation: "spin 0.8s linear infinite" }}>
      <circle cx="8" cy="8" r="6" stroke={color} strokeWidth="1.5" strokeOpacity="0.2"/>
      <path d="M14 8a6 6 0 00-6-6" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </svg>
  ),
};

// ─── ATOMS / MOLECULES ─────────────────────────────────────────────────────────

// SearchInputChrome — the pill container (atom)
function Pill({ children, tone="default", size="m", focused, error, disabled, style={}, ...rest }) {
  const heights = { s: 28, m: 36, l: 44 };
  const padX    = { s: 10, m: 14, l: 16 };
  const fillBase = tone === "inverse" ? T.pillInverse : T.pillDefault;
  const borderColor = tone === "inverse" ? "transparent"
                    : error             ? "#c34a4a"
                    : focused           ? T.borderFocus
                    :                     T.borderDefault;
  const borderWidth = tone === "inverse" ? 0
                    : focused || error  ? 1.5
                    :                     1;
  return (
    <div style={{
      height: heights[size],
      borderRadius: 999,
      background: disabled ? "#f4f4f4" : fillBase,
      border: borderWidth > 0 ? `${borderWidth}px solid ${borderColor}` : "none",
      paddingLeft: padX[size], paddingRight: padX[size],
      gap: 8,
      display: "flex", alignItems: "center",
      opacity: disabled ? 0.55 : 1,
      ...style,
    }} {...rest}>
      {children}
    </div>
  );
}

// FilterChip (atom)
function FilterChip({ dimension, value, onRemove }) {
  const [h, setH] = useState(false);
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 6,
      height: 24, paddingLeft: 8, paddingRight: 4,
      borderRadius: 999,
      background: T.chipFill,
      border: `1px solid ${T.chipBorder}`,
      fontSize: 12, fontWeight: 500, color: T.chipText,
      whiteSpace: "nowrap", flexShrink: 0,
    }}>
      <span style={{ fontWeight: 600 }}>{dimension}:</span>
      <span>{value}</span>
      {onRemove && (
        <button
          onClick={onRemove}
          onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
          aria-label={`Remove ${dimension}: ${value} filter`}
          style={{
            width: 18, height: 18, borderRadius: 999, border: "none",
            background: h ? "rgba(53,85,160,0.16)" : "transparent",
            cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            padding: 0,
          }}>
          <Ic.close size={10} color={T.chipText} />
        </button>
      )}
    </span>
  );
}

// SectionHeader inside dropdowns (atom)
function SectionHeader({ children }) {
  return (
    <div style={{
      paddingTop: 10, paddingBottom: 4, paddingLeft: 12, paddingRight: 12,
      fontSize: 11, fontWeight: 500, lineHeight: "16px", letterSpacing: "0.1px",
      textTransform: "uppercase", color: "#6b6b6b",
    }}>
      {children}
    </div>
  );
}

// SuggestionRow inside dropdowns (atom)
function SuggestionRow({ icon, label, meta, kbd, onClick }) {
  const [h, setH] = useState(false);
  return (
    <div onClick={onClick}
      onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{
        display: "flex", alignItems: "center", gap: 10,
        padding: "8px 12px", cursor: "pointer",
        background: h ? "#f6f6f6" : "transparent",
        transition: "background 0.1s ease",
      }}>
      {icon && <span style={{ flexShrink: 0, width: 16, height: 16,
        display: "flex", alignItems: "center", justifyContent: "center",
        color: T.iconDefault }}>{icon}</span>}
      <span style={{ flex: 1, fontSize: 14, color: T.textDefault, whiteSpace: "nowrap",
        overflow: "hidden", textOverflow: "ellipsis" }}>
        {label}
      </span>
      {meta && <span style={{ fontSize: 12, color: "#6b6b6b", flexShrink: 0 }}>{meta}</span>}
      {kbd && <span style={{ fontSize: 11, color: "#6b6b6b", border: "1px solid #d2d2d2",
        borderRadius: 4, padding: "1px 6px", flexShrink: 0,
        fontFamily: "monospace" }}>{kbd}</span>}
    </div>
  );
}

// DropdownPanel (molecule)
function DropdownPanel({ children, width = "100%", style = {} }) {
  return (
    <div style={{
      position: "absolute", top: "calc(100% + 6px)", left: 0,
      width, minWidth: 320,
      background: T.surfaceWhite,
      border: `0.5px solid ${T.sectionBorder}`,
      borderRadius: 12,
      boxShadow: "0 4px 16px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04)",
      paddingTop: 6, paddingBottom: 6,
      maxHeight: 400, overflowY: "auto",
      zIndex: 100,
      ...style,
    }}>
      {children}
    </div>
  );
}

// ─── SEARCH (the workhorse organism) ──────────────────────────────────────────
function Search({
  tone = "default",
  size = "m",
  filters = "none",
  mode = "filter",
  withLabel = false,
  withHelpText = false,
  label,
  helpText,
  placeholder = "Search…",
  value: controlledValue,
  onChange,
  appliedFilters = [],
  onFiltersChange,
  onSubmit,
  onSuggest,
  loading = false,
  disabled = false,
  error = null,
  style = {},
  // For demo
  showDropdown = false,
  dropdownContent = null,
}) {
  const [localValue, setLocalValue] = useState("");
  const value = controlledValue !== undefined ? controlledValue : localValue;
  const handleChange = (v) => {
    if (controlledValue === undefined) setLocalValue(v);
    onChange && onChange(v);
  };
  const [focused, setFocused] = useState(false);

  const inputColor    = tone === "inverse" ? "#fff" : T.textDefault;
  const phColor       = tone === "inverse" ? T.placeholderInverse : T.placeholderDefault;
  const iconColor     = tone === "inverse" ? T.iconInverse : T.iconDefault;
  const fontSize      = size === "s" ? 12 : size === "l" ? 16 : 14;
  const lineHeight    = size === "s" ? "16px" : size === "l" ? "22px" : "20px";

  const labelStyle = {
    display: "block", marginBottom: 6,
    fontSize: 12, fontWeight: 500, color: T.textDefault,
    fontFamily: "'Red Hat Text', sans-serif",
  };
  const helpStyle = {
    display: "block", marginTop: 6,
    fontSize: 12, color: error ? "#c34a4a" : "#6b6b6b",
    fontFamily: "'Red Hat Text', sans-serif",
  };

  const showClear = !disabled && value.length > 0 && !loading;

  return (
    <div style={{ position: "relative", ...style }}>
      {withLabel && label && <label style={labelStyle}>{label}</label>}
      <Pill tone={tone} size={size} focused={focused} error={error} disabled={disabled}
        style={{ position: "relative" }}>
        {/* Leading icon or spinner */}
        {loading
          ? <Ic.spinner size={size==="s"?14:16} color={iconColor} />
          : <Ic.search size={size==="s"?14:size==="l"?18:16} color={iconColor} />}

        {/* Inline filter chips (filters="chips") */}
        {filters === "chips" && appliedFilters.map((f, i) => (
          <FilterChip key={i} dimension={f.dimension} value={f.value}
            onRemove={() => onFiltersChange && onFiltersChange(
              appliedFilters.filter((_, j) => j !== i)
            )} />
        ))}

        {/* Input */}
        <input
          className={`pds-search-input tone-${tone}`}
          placeholder={placeholder}
          value={value}
          onChange={(e) => handleChange(e.target.value)}
          onFocus={() => setFocused(true)}
          onBlur={() => setFocused(false)}
          onKeyDown={(e) => {
            if (mode === "submit" && e.key === "Enter") {
              onSubmit && onSubmit(value);
            }
          }}
          disabled={disabled}
          style={{
            flex: 1, minWidth: 0,
            background: "transparent", border: "none", outline: "none",
            color: inputColor,
            fontFamily: "'Red Hat Text', sans-serif",
            fontSize, lineHeight,
            letterSpacing: "0.02px",
          }}
        />

        {/* Right-side affordances */}
        {filters === "advanced" && (
          <button style={{
            border: "none", background: "transparent", cursor: "pointer",
            color: T.brand, fontSize: 12, fontWeight: 500,
            padding: "0 6px", flexShrink: 0,
          }}>Advanced</button>
        )}

        {showClear && (
          <button onClick={() => handleChange("")} aria-label="Clear search"
            style={{
              width: 24, height: 24, borderRadius: 999, border: "none",
              background: "transparent", cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center",
              flexShrink: 0,
            }}>
            <Ic.close size={12} color={iconColor} />
          </button>
        )}

        {filters === "chips" && !showClear && (
          <button aria-label="Add filter"
            style={{
              display: "inline-flex", alignItems: "center", gap: 4,
              height: 24, padding: "0 8px",
              border: "1px dashed " + (tone==="inverse" ? "rgba(255,255,255,0.3)" : "#d2d2d2"),
              borderRadius: 999, background: "transparent", cursor: "pointer",
              color: tone === "inverse" ? "rgba(255,255,255,0.85)" : "#6b6b6b",
              fontSize: 12, fontWeight: 500, flexShrink: 0,
            }}>
            <Ic.plus size={10} color={tone === "inverse" ? "rgba(255,255,255,0.85)" : "#6b6b6b"} />
            Filter
          </button>
        )}
      </Pill>
      {withHelpText && (helpText || error) && (
        <span style={helpStyle}>{error || helpText}</span>
      )}
      {showDropdown && dropdownContent && <DropdownPanel>{dropdownContent}</DropdownPanel>}
    </div>
  );
}

// ─── DEMO SECTIONS ────────────────────────────────────────────────────────────

function Section({ title, summary, children, dark }) {
  return (
    <section style={{
      background: dark ? "#0f3e80" : "#fff",
      borderRadius: 12,
      border: dark ? "none" : "1px solid #edf0f9",
      padding: "20px 24px", marginBottom: 20,
    }}>
      <h2 style={{ fontSize: 16, fontWeight: 600, color: dark ? "#fff" : "#051428",
        marginBottom: 4 }}>
        {title}
      </h2>
      <p style={{ fontSize: 13, color: dark ? "rgba(255,255,255,0.7)" : "#4b4b4b",
        lineHeight: "20px", marginBottom: 20 }}>
        {summary}
      </p>
      <div>{children}</div>
    </section>
  );
}

function Caption({ children }) {
  return (
    <p style={{ fontSize: 11, fontWeight: 600, color: "#6b6b6b",
      textTransform: "uppercase", letterSpacing: "0.08em", marginTop: 16, marginBottom: 8 }}>
      {children}
    </p>
  );
}

// ─── DEMO 2: Search at toolbar (with chips) ───────────────────────────────────
function ToolbarSearchDemo() {
  const [q, setQ] = useState("");
  const [appliedFilters, setAppliedFilters] = useState([
    { dimension: "Status", value: "Open" },
    { dimension: "Owner", value: "Me" },
  ]);
  return (
    <Section
      title="Search at toolbar — list/table"

      <Caption>Variant: filters="none"</Caption>
      <Search size="m" placeholder="Search invoices…" mode="filter" />

          <div style={{

                dropdownContent={

                    <SuggestionRow icon={<Ic.search size={12} color="#6b6b6b" />}

                    <SectionHeader>Invite by email</SectionHeader>
                    <SuggestionRow label="ana@example.com"
                      meta="Send invite" />

// ─── DEMO 6: All Search states matrix ─────────────────────────────────────────
function StatesMatrixDemo() {
  return (
    <Section
