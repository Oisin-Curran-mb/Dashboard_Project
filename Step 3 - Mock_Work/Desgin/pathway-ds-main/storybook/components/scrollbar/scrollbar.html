<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pathway — Scrollable (overlay scrollbar)</title>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Proven CDN setup (matches sidenav.html): cdnjs React 18 + babel-standalone 7.23.2.
     The unpkg @babel/standalone "latest" build does not reliably auto-run text/babel here. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  /* Only the design tokens this component consumes (mirrors src/tokens/tokens.css).
     The scrollbar thumb colour/units resolve through these vars — no hardcoded hex/px. */
  :root {
    /* Semantic tokens this component consumes (mirrors src/tokens/tokens.css). */
    --semantic-color-light-mode-scrim-faint: rgba(17, 17, 17, 0.16); /* thumb — rest */
    --semantic-color-light-mode-scrim-light: rgba(17, 17, 17, 0.30);  /* thumb — hover/drag */
    --semantic-color-light-mode-fill-static-neutral-light: #fefefd;   /* white — glass edge */
    --semantic-layout-units-padding-xtight:   6px;   /* thumb width */
    --semantic-layout-units-padding-xxxtight: 2px;   /* gutter */
    --semantic-layout-units-cornerradius-full: 64px; /* fully-rounded pill */
    --motion-duration-3: 200ms;                      /* snappy appear */
    --motion-duration-5: 380ms;                      /* graceful fade-out */
    --motion-easing-standard: cubic-bezier(0.4, 0, 0.2, 1);
    --motion-easing-decelerate: cubic-bezier(0, 0, 0.2, 1);
  }
  body { margin: 0; background: #f4f5f7; font-family: 'Red Hat Text', sans-serif; color: #252525; }
  .wrap { max-width: 920px; margin: 0 auto; padding: 40px 24px 80px; }
  .title { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .sub   { font-size: 13px; color: #7880a0; margin-bottom: 32px; }
  .label { font-size: 10px; font-weight: 700; color: #7880a0; letter-spacing: .08em;
           text-transform: uppercase; margin: 0 0 8px; }
  .row { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
  .frame { width: 320px; height: 300px; border: 1px solid #e4e4e4; border-radius: 12px;
           overflow: hidden; background: #fff; }
  .item { padding: 10px 16px; font-size: 14px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
  /* The one rule the overlay scrollbar relies on — hide the native bar on the scroll view. */
  .pds-scrollable__view { scrollbar-width: none; -ms-overflow-style: none; }
  .pds-scrollable__view::-webkit-scrollbar { width: 0; height: 0; display: none; }
  /* Touch: disable the mouse grab strip so finger-swipes scroll the content (passive bar). */
  @media (hover: none) { .pds-scrollable__grab { pointer-events: none !important; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useRef, useState, useEffect, useCallback } = React;

// Behaviour mirrors components/scrollbar/scrollbar.jsx: proportional thumb (28px floor);
// reveal on scroll + mouse near the right edge; mouse-only drag via a wider grab strip;
// touch passive (grab strip disabled by the (hover:none) rule). Fade uses --motion-* tokens.
const SCROLL = {
  thumbWidth:  "var(--semantic-layout-units-padding-xtight)",
  thumbRadius: "var(--semantic-layout-units-cornerradius-full)",
  gutter:      "var(--semantic-layout-units-padding-xxxtight)",
  thumbMin:    28,
  grabZone:    16,
  thumbRest:   "var(--semantic-color-light-mode-scrim-faint)",
  thumbHover:  "var(--semantic-color-light-mode-scrim-light)",
  thumbBlur:   "blur(8px) saturate(180%)",
  thumbEdge:   "inset 0 0 0 0.5px color-mix(in srgb, var(--semantic-color-light-mode-fill-static-neutral-light) 35%, transparent)",
  fadeIn:      "opacity var(--motion-duration-3) var(--motion-easing-decelerate), background var(--motion-duration-3) var(--motion-easing-standard)",
  fadeOut:     "opacity var(--motion-duration-5) var(--motion-easing-standard)",
  idleHideMs:  500,
};

function Scrollable({ children, style = {}, viewStyle = {} }) {
  const viewRef = useRef(null), dragRef = useRef(null), idleRef = useRef(null), nearRef = useRef(false);
  const [thumb, setThumb] = useState({ h:0, top:0, show:false });
  const [active, setActive] = useState(false);
  const [hot, setHot] = useState(false);
  const recompute = useCallback(() => {
    const el = viewRef.current; if (!el) return;
    const { scrollHeight, clientHeight, scrollTop } = el;
    if (scrollHeight <= clientHeight + 1) { setThumb(t => t.show ? {...t, show:false} : t); return; }
    const h = Math.max(SCROLL.thumbMin, (clientHeight/scrollHeight)*clientHeight);
    const top = (scrollTop/(scrollHeight-clientHeight))*(clientHeight-h);
    setThumb({ h, top, show:true });
  }, []);
  useEffect(() => {
    recompute();
    const el = viewRef.current; if (!el) return;
    const ro = new ResizeObserver(recompute); ro.observe(el);
    Array.from(el.children).forEach(c => ro.observe(c));
    return () => ro.disconnect();
  }, [children, recompute]);
  const scheduleHide = () => { clearTimeout(idleRef.current);
    idleRef.current = setTimeout(() => { if (!dragRef.current && !nearRef.current) setActive(false); }, SCROLL.idleHideMs); };
  const wake = () => { setActive(true); scheduleHide(); };
  const onMouseMove = (e) => { const r = e.currentTarget.getBoundingClientRect();
    if (r.right - e.clientX <= SCROLL.grabZone) { nearRef.current = true; setActive(true); clearTimeout(idleRef.current); }
    else if (nearRef.current) { nearRef.current = false; scheduleHide(); } };
  const onLeave = () => { nearRef.current = false; if (!dragRef.current) scheduleHide(); };
  const onGrabDown = (e) => {
    e.preventDefault(); const el = viewRef.current; if (!el) return;
    dragRef.current = { y:e.clientY, top:el.scrollTop }; setHot(true); setActive(true); clearTimeout(idleRef.current);
    const move = (ev) => { const { scrollHeight, clientHeight } = el;
      const h = Math.max(SCROLL.thumbMin, (clientHeight/scrollHeight)*clientHeight);
      const ratio = (scrollHeight-clientHeight)/(clientHeight-h);
      el.scrollTop = dragRef.current.top + (ev.clientY - dragRef.current.y)*ratio; };
    const up = () => { dragRef.current = null; setHot(false);
      document.removeEventListener("mousemove", move); document.removeEventListener("mouseup", up); wake(); };
    document.addEventListener("mousemove", move); document.addEventListener("mouseup", up);
  };
  return (
    <div className="pds-scrollable" style={{ position:"relative", minHeight:0, ...style }}
      onMouseMove={onMouseMove} onMouseLeave={onLeave}>
      <div ref={viewRef} className="pds-scrollable__view" onScroll={() => { recompute(); wake(); }}
        style={{ height:"100%", overflowY:"auto", overflowX:"hidden", ...viewStyle }}>
        {children}
      </div>
      {thumb.show && (<>
        <div aria-hidden="true" style={{ position:"absolute", top:thumb.top, right:SCROLL.gutter,
          width:SCROLL.thumbWidth, height:thumb.h, borderRadius:SCROLL.thumbRadius,
          background: hot?SCROLL.thumbHover:SCROLL.thumbRest, backdropFilter:SCROLL.thumbBlur,
          WebkitBackdropFilter:SCROLL.thumbBlur, boxShadow:SCROLL.thumbEdge,
          opacity: active?1:0, transition: active?SCROLL.fadeIn:SCROLL.fadeOut, pointerEvents:"none", zIndex:5 }} />
        <div aria-hidden="true" className="pds-scrollable__grab" onMouseDown={onGrabDown}
          onMouseEnter={() => setHot(true)} onMouseLeave={() => setHot(false)}
          style={{ position:"absolute", top:thumb.top, right:0, width:SCROLL.grabZone, height:thumb.h,
            pointerEvents: active?"auto":"none", zIndex:6, background:"transparent" }} />
      </>)}
    </div>
  );
}

const Rows = ({ n }) => Array.from({ length:n }, (_, i) =>
  <div className="item" key={i}>Row {i+1} — scroll to see the overlay thumb</div>);

function App() {
  return (
    <div className="wrap">
      <div className="title">Scrollable — overlay scrollbar</div>
      <div className="sub">Hidden native bar + liquid-glass thumb (tokenised colour + units). Identical on macOS, Windows, iOS, Android. Overlay — never takes layout width.</div>
      <div className="row">
        <div>
          <p className="label">Overflowing (hover / scroll to reveal)</p>
          <div className="frame"><Scrollable style={{ height:"100%" }}><Rows n={40} /></Scrollable></div>
        </div>
        <div>
          <p className="label">Not overflowing — same padding, no shift</p>
          <div className="frame"><Scrollable style={{ height:"100%" }}><Rows n={4} /></Scrollable></div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
