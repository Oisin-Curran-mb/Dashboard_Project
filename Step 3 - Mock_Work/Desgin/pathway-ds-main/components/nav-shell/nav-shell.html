<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NavShell — Pathway Design System</title>

  <!-- Pathway tokens — all semantic CSS variables -->
  <link rel="stylesheet" href="../../src/tokens/tokens.css" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;500;600;700&family=Red+Hat+Display:wght@600&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />

  <style>
  :root {
    /* Motion tokens (mirrors src/tokens/tokens.css §motion). Inlined so the standalone demo
       resolves the same --motion-* variables the shipped component consumes. */
    --motion-duration-1: 100ms;
    --motion-duration-2: 150ms;
    --motion-duration-3: 200ms;
    --motion-duration-4: 300ms;
    --motion-duration-5: 380ms;
    --motion-duration-6: 460ms;
    --motion-duration-7: 680ms;
    --motion-duration-8: 1100ms;
    --motion-duration-loop: 1000ms;
    --motion-duration-loop-fast: 750ms;
    --motion-easing-standard: cubic-bezier(0.4, 0, 0.2, 1);
    --motion-easing-spring: cubic-bezier(0.34, 1.04, 0.64, 1);
    --motion-easing-decelerate: cubic-bezier(0, 0, 0.2, 1);
    --motion-easing-accelerate: cubic-bezier(0.4, 0, 1, 1);
    --motion-easing-emphasized: cubic-bezier(0.32, 0.72, 0, 1);
    --motion-easing-accordion: cubic-bezier(0.33, 1.03, 0.68, 1);
    --motion-easing-linear: cubic-bezier(0, 0, 1, 1);
  }

    /* ── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; font-family: 'Red Hat Text', sans-serif; }

    .material-symbols-rounded {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      line-height: 1; display: block; user-select: none; flex-shrink: 0;
    }

    /* ── Shell layout — exact from Figma node 40007205:9912 ─────────────────
       TopNav: fixed, full width, 56px
       SideNav: fixed, left, top 56px, 240px expanded / 72px collapsed
       Main: margin-left matches SideNav width, overflow-y scroll
    ───────────────────────────────────────────────────────────────────────── */
    .shell { display: flex; flex-direction: column; height: 100%; overflow: hidden; }

    /* ── TopNav ─────────────────────────────────────────────────────────────
       Figma: background Fill/Static/Brand/Base = #2d4889, height 56px
       Slot.RowStart: gap 8px (ModuleSwitcher→OrgSwitcher: x gap = 171-163=8px)
       Slot.RowEnd: gap 8px (Search→Actions: 336-328=8px, Actions→Profile: 440-432=8px)
    ───────────────────────────────────────────────────────────────────────── */
    @keyframes tnDropIn {
      from { opacity:0; transform:translateY(-4px) scale(0.99); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    /* ── Body below TopNav ──────────────────────────────────────────────────── */
    .shell__body { display: flex; flex: 1; overflow: hidden; position: relative; }

    /* ── SideNav ────────────────────────────────────────────────────────────
       Figma: width 240px, background Surface/Nav/Light = #fafafa
       border-right 0.5px Stroke/Static/Neutral/Light = #f6f6f6
       NavItem height 44px (Figma: SideNavItem instances are 44px)
       menuGap: 6px (from sidenav.jsx L.menuGap)
    ───────────────────────────────────────────────────────────────────────── */
    .sidenav {
      flex-shrink: 0;
      background: var(--semantic-color-light-mode-surface-nav-light, #fafafa);
      border-right: 0.5px solid var(--semantic-color-light-mode-stroke-static-neutral-light, #f6f6f6);
      display: flex; flex-direction: column;
      transition: width var(--motion-duration-6) var(--motion-easing-emphasized);
      overflow: hidden;
    }
    .sidenav.expanded  { width: 240px; }  /* Figma: SideNav.Container width=240 */
    .sidenav.collapsed { width: 72px; }   /* sidenav.jsx L.navWcol=72 */

    /* NavHeader */
    .nav-header {
      display: flex; align-items: center; justify-content: flex-end;
      padding: 8px 16px; min-height: 56px; flex-shrink: 0;
      border-bottom: 1px solid var(--semantic-color-light-mode-stroke-static-neutral-light, #f6f6f6);
    }
    .nav-header.collapsed { justify-content: center; padding: 8px 12px; }
    .nav-header__label {
      flex: 1; font-size: 13px; font-weight: 600; letter-spacing: 0.05em;
      text-transform: uppercase; white-space: nowrap; overflow: hidden;
      color: var(--semantic-color-light-mode-text-contextual-navitem-base, #484848);
      opacity: 1; transition: opacity var(--motion-duration-3) var(--motion-easing-standard);
    }
    .nav-header__label.hidden { opacity: 0; width: 0; min-width: 0; }
    .nav-header__btn {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 6px; flex-shrink: 0;
      background: transparent; border: none; cursor: pointer;
      color: var(--semantic-color-light-mode-icon-contextual-navitem-base, #606060);
      transition: background var(--motion-duration-2) var(--motion-easing-standard);
    }
    .nav-header__btn:hover {
      background: var(--semantic-color-light-mode-fill-contextual-navitem-hover, rgba(69,77,94,0.06));
    }

    /* Nav menu */
    .nav-menu {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 8px 0 56px;
      display: flex; flex-direction: column; gap: 6px; /* menuGap=6 */
    }
    .nav-menu::-webkit-scrollbar { width: 4px; }
    .nav-menu::-webkit-scrollbar-track { background: transparent; }
    .nav-menu::-webkit-scrollbar-thumb { background: transparent; border-radius: 4px; }
    .nav-menu:hover::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.18); }

    /* SectionLabel */
    .nav-section-label {
      display: flex; align-items: center;
      min-height: 32px; padding: 0 16px; margin-top: 4px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--semantic-color-light-mode-text-static-secondary-subtle, #606060);
      white-space: nowrap; overflow: hidden;
      opacity: 1; transition: opacity var(--motion-duration-3) var(--motion-easing-standard);
    }
    .nav-section-label.hidden {
      opacity: 0; height: 0; min-height: 0; margin: 0; padding: 0; overflow: hidden;
    }

    /* Nav item */
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      min-height: 44px; /* Figma SideNavItem = 44px */
      padding: 0 16px; cursor: pointer; border: none;
      background: transparent; font-family: inherit;
      font-size: 14px; font-weight: 400; line-height: 1; letter-spacing: 0.3px;
      color: var(--semantic-color-light-mode-text-contextual-navitem-base, #484848);
      white-space: nowrap; transition: background var(--motion-duration-2) var(--motion-easing-standard);
      position: relative; text-align: left; width: 100%;
    }
    .nav-item:hover {
      background: var(--semantic-color-light-mode-fill-contextual-navitem-hover, rgba(69,77,94,0.06));
    }
    .nav-item.active {
      background: var(--semantic-color-light-mode-fill-contextual-navitem-active, #eef2fb);
      color: var(--semantic-color-light-mode-text-contextual-navitem-active, #3555a0);
      font-weight: 500;
    }
    /* Indicator stripe — 4px at SideNav left edge */
    .nav-item.active::before {
      content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 4px; height: 24px; border-radius: 0 4px 4px 0;
      background: var(--semantic-color-light-mode-icon-contextual-navitem-active, #3555a0);
    }
    .nav-item__icon {
      width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .nav-item__label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }

    /* Collapsed rail — icon centered, no labels */
    .sidenav.collapsed .nav-item {
      justify-content: center; padding: 0; gap: 0;
    }
    .sidenav.collapsed .nav-item__label {
      opacity: 0; width: 0; min-width: 0;
    }
    .sidenav.collapsed .nav-section-label {
      opacity: 0; height: 0; min-height: 0; margin: 0; padding: 0;
    }
    .sidenav.collapsed .nav-item.active::before {
      left: 0;
    }

    /* Tooltip in collapsed rail */
    .nav-item:hover .nav-tooltip { display: flex; }
    .nav-tooltip {
      display: none; position: absolute; left: calc(100% + 8px); top: 50%;
      transform: translateY(-50%); z-index: 200;
      background: #484848; color: #fff; font-size: 12px; font-weight: 500;
      padding: 4px 8px; border-radius: 4px; white-space: nowrap; pointer-events: none;
    }
    .nav-tooltip::before {
      content: ''; position: absolute; right: 100%; top: 50%; transform: translateY(-50%);
      border: 4px solid transparent; border-right-color: #484848;
    }

    /* ── Main content area ──────────────────────────────────────────────────
       Figma: ScreenTemplate at x=244, width=1196
       Padding: px=36, pt=12 (contextual.page.padding)
    ───────────────────────────────────────────────────────────────────────── */
    .shell__main {
      flex: 1; min-width: 0; overflow-y: auto; overflow-x: hidden;
      background: var(--semantic-color-light-mode-surface-canvas-light, #fafafa);
    }
    .screen {
      padding: 12px 36px 56px; min-height: 100%;
      display: flex; flex-direction: column;
    }

    /* ── Tabs (Slot.PageNavigation) ──────────────────────────────────────────
       Figma: y=12, height=46, border-bottom
    ───────────────────────────────────────────────────────────────────────── */
    .page-tabs {
      display: flex;
      border-bottom: 1px solid var(--semantic-color-light-mode-stroke-static-neutral-light, #f6f6f6);
      flex-shrink: 0; margin-bottom: 0;
    }
    .page-tab {
      display: flex; align-items: center; justify-content: center;
      padding: 14px 16px; cursor: pointer; position: relative;
      font-size: 14px; font-weight: 500; line-height: 20px; letter-spacing: 0.3px;
      color: var(--semantic-color-light-mode-text-static-secondary-subtle, #606060);
      border: none; background: transparent; font-family: inherit;
      transition: color var(--motion-duration-3) var(--motion-easing-standard);
    }
    .page-tab:hover {
      color: var(--semantic-color-light-mode-text-static-primary-base, #202020);
    }
    .page-tab.active {
      color: var(--semantic-color-light-mode-text-action-primary-base, #3555a0);
      font-weight: 600;
    }
    .page-tab.active::after {
      content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
      height: 2px; border-radius: 2px 2px 0 0;
      background: var(--semantic-color-light-mode-fill-action-primary-base, #4b6ec3);
    }

    /* ── Screen content (Container.ScreenContent) ───────────────────────────
       Figma: y=85 (tabs at y=12 + 49 + 24px gap), gap between sections=16px
    ───────────────────────────────────────────────────────────────────────── */
    .screen-content {
      display: flex; flex-direction: column; gap: 0; margin-top: 24px;
    }

    /* ── PageHeading (Container.PageHeading) ─────────────────────────────────
       Figma: height=84, pt=8, pb=16
       LeadingSlot: width=160, height=60
       TrailingSlot: x=790, width=334, height=44 — two PW_Button instances
    ───────────────────────────────────────────────────────────────────────── */
    .page-heading {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 8px 0 16px;
    }
    .page-heading__title {
      font-size: 24px; font-weight: 600; line-height: "30px"; letter-spacing: 0.1px;
      color: var(--semantic-color-light-mode-text-static-primary-base, #202020);
    }
    .page-heading__subtitle {
      margin-top: 8px;
      font-size: 16px; font-weight: 400; line-height: 22px; letter-spacing: 0.1px;
      color: var(--semantic-color-light-mode-text-static-secondary-base, #484848);
    }
    .page-heading__actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    /* PW_Button — from button.jsx token values
       Figma TrailingSlot: button1=173px (Outlined Secondary), button2=153px (Fill Primary)
    */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      height: 44px; padding: 0 16px; border-radius: 8px;
      font-family: inherit; font-size: 16px; font-weight: 500;
      line-height: 22px; letter-spacing: 0.1px; cursor: pointer;
      border: none; transition: background var(--motion-duration-2) var(--motion-easing-standard);
    }
    .btn--outlined {
      background: transparent;
      border: 1px solid var(--semantic-color-light-mode-stroke-action-secondary-base, #292724);
      color: var(--semantic-color-light-mode-text-action-secondary-base, #292724);
    }
    .btn--outlined:hover {
      background: var(--semantic-color-light-mode-fill-action-secondaryinverse-hover, #f7f5f3);
    }
    .btn--filled {
      background: var(--semantic-color-light-mode-fill-action-primary-base, #4b6ec3);
      color: #ffffff; border: none;
    }
    .btn--filled:hover {
      background: var(--semantic-color-light-mode-fill-action-primary-hover, #6e8bd4);
    }

    /* ── Toolbar (Container.ToolBar) ─────────────────────────────────────────
       Figma: y=100, height=64 (py=8)
       LeadingSlot: SearchBar (400px) + FilterChips (264px = 4×60px + 3×8px)
       TrailingSlot: empty
    ───────────────────────────────────────────────────────────────────────── */
    .toolbar {
      display: flex; align-items: center;
      padding: 8px 0; gap: 0;
      margin-bottom: 16px;
    }
    .toolbar__leading { display: flex; align-items: center; gap: 24px; flex: 1; min-width: 0; }

    /* Search bar — Figma: width=400, border-radius 6px (confirmed from spec) */
    .toolbar__search {
      display: flex; align-items: center; gap: 8px;
      width: 400px; min-width: 200px; max-width: 400px;
      height: 36px; padding: 0 8px;
      border: 0.75px solid var(--semantic-color-light-mode-stroke-action-secondary-inverse-base, #d2d2d2);
      border-radius: 6px;
      background: var(--semantic-color-light-mode-fill-static-neutral-light, #ffffff);
      flex-shrink: 0;
    }
    .toolbar__search:focus-within {
      border: 1px solid var(--semantic-color-light-mode-stroke-action-primary-pressed, #6e8bd4);
    }
    .toolbar__search input {
      flex: 1; border: none; outline: none; background: transparent;
      font-family: 'Red Hat Text', sans-serif; font-size: 16px; font-weight: 400;
      line-height: 22px; letter-spacing: 0.1px;
      color: var(--semantic-color-light-mode-text-static-secondary-base, #484848);
    }
    .toolbar__search input::placeholder {
      color: var(--semantic-color-light-mode-text-static-secondary-subtle, #606060);
    }

    /* FilterChips — Figma: each 60px wide, gap=8px, touch target 48px */
    .filter-chips { display: flex; align-items: center; gap: 8px; }
    .filter-chip {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 48px; padding: 6px 0; background: transparent; border: none; cursor: pointer;
    }
    .filter-chip__inner {
      display: flex; align-items: center; justify-content: center;
      padding: 4px 8px; border-radius: 4px;
      font-size: 12px; font-weight: 500; line-height: 18px; letter-spacing: 0.3px;
      color: var(--semantic-color-light-mode-text-action-secondary-base, #292724);
      white-space: nowrap; transition: background var(--motion-duration-2) var(--motion-easing-standard);
    }
    .filter-chip:hover .filter-chip__inner {
      background: rgba(0,0,0,0.04);
    }
    .filter-chip.active .filter-chip__inner {
      background: var(--semantic-color-light-mode-fill-action-tertiary-base, #eef2fb);
      color: var(--semantic-color-light-mode-text-action-primary-base, #3555a0);
      font-weight: 600;
    }

    /* ── Section Container ──────────────────────────────────────────────────── */
    .section-container { display: flex; flex-direction: column; gap: 0; }

    /* ── Section ────────────────────────────────────────────────────────────
       Section 1: height=178 (top_gap=4 + heading=34 + gap=8 + cards=116 + bottom=16)
       Section 2: height=210 (top_gap=4 + heading=34 + gap=8 + cards=148 + bottom=16)
    ───────────────────────────────────────────────────────────────────────── */
    .section { display: flex; flex-direction: column; padding: 4px 0 16px; }

    /* SectionHeading — Container.SectionHeading: height=22, py=6, total=34 */
    .section-heading {
      padding: 6px 0; margin-bottom: 8px;
      font-size: 14px; font-weight: 600; line-height: 22px; letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--semantic-color-light-mode-text-static-secondary-subtle, #606060);
    }

    /* Card grid — Figma: 4 columns × 275px, gap=8px → total 1124px = exact content width */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(4, 275px);
      gap: 8px;
    }

    /* Card — Figma: CardContainer
       bg: Fill/Static/Neutral/Light = #ffffff
       border: 0.5px contextual.card.border-width, Stroke/Action/Secondary-Inverse/Base = #d2d2d2
       border-radius: 8px (contextual.card.cornerradius)
       padding: 16px (contextual.card.padding.medium.horizontal)
       gap: 12px (contextual.card.gap)
    */
    .card {
      background: var(--semantic-color-light-mode-fill-static-neutral-light, #ffffff);
      border: 0.5px solid var(--semantic-color-light-mode-stroke-action-secondary-inverse-base, #d2d2d2);
      border-radius: 8px;
      padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
      transition: box-shadow var(--motion-duration-2) var(--motion-easing-standard), border-color var(--motion-duration-2) var(--motion-easing-standard);
      cursor: pointer;
    }
    .card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border-color: var(--semantic-color-light-mode-stroke-action-primary-hover, #86a0dd);
    }

    /* CardHeading: height=32, gap=8 between icon(32px) and title */
    .card__heading { display: flex; align-items: center; gap: 8px; }

    /* Display icon: 32×32, border-radius.s=8px, color-variant bg */
    .card__icon {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .card__icon--accent {
      background: var(--semantic-color-light-mode-fill-static-accent-amethyst-light, #f4f2fa);
    }
    .card__icon--positive {
      background: var(--semantic-color-light-mode-fill-static-positive-light, #f0faf1);
    }
    .card__icon--info {
      background: var(--semantic-color-light-mode-fill-static-info-light, #eef2fb);
    }
    .card__icon--warning {
      background: var(--semantic-color-light-mode-fill-static-warning-light, #fff8e1);
    }

    /* CardTitle: text.body.base.semibold = 16px/600/22px */
    .card__title {
      flex: 1; min-width: 0;
      font-size: 16px; font-weight: 600; line-height: 22px; letter-spacing: 0.1px;
      color: var(--semantic-color-light-mode-text-static-primary-base, #202020);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* Badge — Slot.CardSubtitle visible in Section 2
       bg: fill.static.accent_amethyst.light = #f4f2fa, radius=12px
       text: label.badge.small.medium 11px/500, accent-amethyst.contrast = #221e3f
    */
    .card__badge {
      display: inline-flex; align-items: center;
      padding: 1px 6px; border-radius: 12px;
      font-size: 11px; font-weight: 500; line-height: 18px; letter-spacing: 0.3px;
      background: var(--semantic-color-light-mode-fill-static-accent-amethyst-light, #f4f2fa);
      color: var(--semantic-color-light-mode-text-static-accent-amethyst-contrast, #221e3f);
    }
    .card__badge--positive {
      background: var(--semantic-color-light-mode-fill-static-positive-light, #f0faf1);
      color: #1b5e20;
    }

    /* CardBody: text.body.small.regular = 14px/400/20px, text.static.secondary.subtle */
    .card__body {
      font-size: 14px; font-weight: 400; line-height: 20px; letter-spacing: 0.3px;
      color: var(--semantic-color-light-mode-text-static-secondary-subtle, #606060);
    }

    /* ── Responsive ─────────────────────────────────────────────────────────── */
    @media (max-width: 1023px) {
      .sidenav { width: 72px !important; }
      .card-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 767px) {
      .card-grid { grid-template-columns: 1fr; }
      .screen { padding: 8px 16px 32px; }
      .toolbar__search { max-width: 100%; width: 100%; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ═══════════════════════════════════════════════════════════════════════════
    // SHELL CONFIGURATION
    // Change this object to customise the entire shell — module, org, nav items,
    // page content. Nothing else needs to change.
    //
    // Agent usage example:
    //   Module=Amplify Giving, Org=NorthPoint Church, nav items=Home+Teams+Projects
    //   Change: module.label, org.name, org.campus, navItems array
    // ═══════════════════════════════════════════════════════════════════════════
    const SHELL_CONFIG = {
      module: {
        id:       "home",
        label:    "Amplify Home",
        isHome:   true,    // true = use the custom Figma SVG home icon
        icon:     "home",  // Material Symbols ligature (used when isHome=false)
      },
      org: {
        name:   "Sacred Heart Church-ITD",
        campus: "Knoxville",
        bg:     "#2d4889",
        initials: "SH",
        // logoUrl: "" — omit for org-name-only trigger (DS default)
      },
      user: {
        name:     "Shelby Martinez",
        initials: "SM",
        email:    "shelby@sacredheart.org",
      },
      // SideNav items. icon = Material Symbols Rounded ligature. FILL=1 always.
      navItems: [
        { id: "payable",  label: "Accounts Payable",  icon: "receipt_long",         active: true },
        { id: "receive",  label: "Accounts Receivable",icon: "payments" },
        { id: "invoices", label: "Invoices",           icon: "description" },
        { id: "vendors",  label: "Vendors",            icon: "store" },
        { id: "reports",  label: "Reports",            icon: "bar_chart" },
      ],
      // Active module label shown in NavHeader
      moduleLabel: "Accounts Payable",
      // Page content
      page: {
        title:    "Accounts Payable",

    const SKIP_WORDS = new Set(["the","a","an","of","in","at","for","and","or","but"]);
    const PLACE_SFXS = ["ville","field","burg","burgh","berg","town","port","ford","wood","land","dale"];
    function abbrevOrg(name) {
      const sig = name.replace(/-/g," ").split(/\s+/).filter(w => !SKIP_WORDS.has(w.toLowerCase()));
      if (sig.length >= 3) return (sig[0][0]+sig[1][0]+sig[2][0]).toUpperCase();
      if (sig.length === 2) return (sig[0][0]+sig[1][0]+sig[1][0]).toUpperCase();
      return (sig[0]||"?").slice(0,3).toUpperCase();
    }
    function abbrevCampus(campus) {
      if (!campus) return "";
      const sig = campus.replace(/-/g," ").split(/\s+/).filter(w => !SKIP_WORDS.has(w.toLowerCase()));
      if (!sig.length) return campus.slice(0,2).toUpperCase();
      if (sig.length >= 2) return (sig[0][0]+sig[1][0]).toUpperCase();
      const w=sig[0], wl=w.toLowerCase();
      for (const sfx of PLACE_SFXS) {
        if (wl.endsWith(sfx) && w.length > sfx.length+1) return (w[0]+sfx[0]).toUpperCase();
      }
      return (w[0]+w[w.length-1]).toUpperCase();
    }

                    onClick={() => setActiveId(item.id)}
                  >
                    <span className="nav-item__icon">
                      {/* FILL=1 always for SideNav icons — spec §11 */}
                      <span className="material-symbols-rounded" aria-hidden="true"
                        style={{
                          fontSize: 20, lineHeight:1, display:"block", userSelect:"none",
                          fontVariationSettings: "'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 20",
                          color: isActive ? SN.iconActive : SN.iconBase,
                        }}>
                        {item.icon}
                      </span>
                    </span>
                    <span className="nav-item__label">{item.label}</span>
                    {collapsed && <span className="nav-tooltip">{item.label}</span>}
                  </button>
                </li>
              );
            })}
          </ul>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // SCREEN TEMPLATE CONTENT AREA
    // Built from Figma node 40007205:9912 measurements
    // Sub-components (PageHeading, ToolBar, FilterChip, Card) are inline here.
    // They will become standalone DS components in future pipeline runs.
    // ═══════════════════════════════════════════════════════════════════════════

    // Content data — replace with real data in production
    const SECTION_1_CARDS = [
      { id:1, icon:"receipt_long", iconVariant:"accent",   title:"Outstanding Bills",   body:"12 bills totaling $24,580 awaiting approval before the end of the month." },
      { id:2, icon:"schedule",     iconVariant:"warning",  title:"Overdue Payments",    body:"3 vendor payments are past due. Oldest is 14 days overdue." },
      { id:3, icon:"store",        iconVariant:"info",     title:"Active Vendors",      body:"47 approved vendors in your network. 2 pending new vendor applications." },
      { id:4, icon:"payments",     iconVariant:"positive", title:"Paid This Month",     body:"$186,240 in payments processed. On track with monthly budget of $200k." },
    ];

    const SECTION_2_CARDS = [
      { id:5, icon:"description",  iconVariant:"accent",   title:"Invoice #2847",    badge:"Pending approval", badgeVariant:"default", body:"Sacred Heart Supplies — $4,200 due in 7 days." },
      { id:6, icon:"description",  iconVariant:"warning",  title:"Invoice #2831",    badge:"Overdue",          badgeVariant:"positive", body:"Office Pro — $1,850 was due 5 days ago." },
      { id:7, icon:"description",  iconVariant:"info",     title:"Invoice #2845",    badge:"Processing",       badgeVariant:"default", body:"Ministry Media — $8,900 payment in progress." },
      { id:8, icon:"description",  iconVariant:"accent",   title:"Invoice #2848",    badge:"Pending approval", badgeVariant:"default", body:"Church Supplies Co — $1,200 due in 14 days." },
    ];

    function ScreenTemplate({ page, activeTab, onTabChange, activeFilter, onFilterChange }) {
      const [searchValue, setSearchValue] = useState("");

      return (
        <div className="screen">
          {/* Tabs — Slot.PageNavigation */}
          {page.tabs && page.tabs.length > 0 && (
            <div className="page-tabs" role="tablist" aria-label="Page sections">
              {page.tabs.map((tab, i) => (
                <button key={i} role="tab"
                  className={`page-tab${activeTab === i ? " active" : ""}`}
                  aria-selected={activeTab === i}
                  onClick={() => onTabChange(i)}>
                  {tab}
                </button>
              ))}
            </div>
          )}

          <div className="screen-content">
            {/* PageHeading — Container.PageHeading
                LeadingSlot: width=160, height=60 (title + subtitle)
                TrailingSlot: x=790, two PW_Button instances (Outlined + Filled) */}
            <div className="page-heading">
              <div>
                <h1 className="page-heading__title">{page.title}</h1>
                {page.subtitle && (
                  <p className="page-heading__subtitle">{page.subtitle}</p>
                )}
              </div>
              {/* Two buttons from Figma TrailingSlot — Outlined Secondary + Fill Primary */}
              <div className="page-heading__actions">
                <button className="btn btn--outlined">
                  Export report
                </button>
                <button className="btn btn--filled">
                  <span className="material-symbols-rounded" aria-hidden="true"
                    style={{ fontSize:20, fontVariationSettings:"'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 20",
                      color:"white", lineHeight:1 }}>
                    add
                  </span>
                  New bill
                </button>
              </div>
            </div>

            {/* Toolbar — Container.ToolBar
                Figma: Leading = SearchBar(400px) + FilterChips(264px), Trailing = empty
            */}
            <div className="toolbar" style={{ marginBottom: 16 }}>
              <div className="toolbar__leading">
                {/* SearchBar — 400px, border-radius 6px (confirmed from Figma spec) */}
                <div className="toolbar__search">
                  <span className="material-symbols-rounded" aria-hidden="true"
                    style={{ fontSize:16, fontVariationSettings:"'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 20",
                      color:"var(--semantic-color-light-mode-icon-action-secondary-inverse-base, #6b6b6b)",
                      lineHeight:1, flexShrink:0 }}>
                    search
                  </span>
                  <input
                    type="text" role="searchbox"
                    placeholder={page.toolbar.searchPlaceholder}
                    value={searchValue}
                    onChange={e => setSearchValue(e.target.value)}
                    aria-label="Search"
                  />
                  {searchValue && (
                    <button onClick={() => setSearchValue("")} aria-label="Clear search"
                      style={{ background:"none", border:"none", cursor:"pointer",
                        padding:0, display:"flex", flexShrink:0 }}>
                      <span className="material-symbols-rounded"
                        style={{ fontSize:16, fontVariationSettings:"'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 20",
                          color:"#6b6b6b", lineHeight:1 }}>
                        cancel
                      </span>
                    </button>
                  )}
                </div>

                {/* FilterChips — 4 chips × 60px + 8px gaps = 264px total */}
                <div className="filter-chips" role="group" aria-label="Filter options">
                  {page.toolbar.filters.map((filter, i) => (
                    <button key={i}
                      className={`filter-chip${activeFilter === i ? " active" : ""}`}
                      aria-pressed={activeFilter === i}
                      onClick={() => onFilterChange(i)}>
                      <span className="filter-chip__inner">{filter}</span>
                    </button>
                  ))}
                </div>
              </div>
              {/* TrailingSlot intentionally empty — matches Figma */}
            </div>

            {/* Section Container */}
            <div className="section-container">
              {/* Section 1 — 4 cards without badge, height=116px */}
              <div className="section">
                <div className="section-heading">Overview</div>
                <div className="card-grid">
                  {SECTION_1_CARDS.map(card => (
                    <div key={card.id} className="card" tabIndex={0}
                      onKeyDown={e => e.key==="Enter" && e.currentTarget.click()}>
                      <div className="card__heading">
                        <div className={`card__icon card__icon--${card.iconVariant}`}>
                          <span className="material-symbols-rounded" aria-hidden="true"
                            style={{ fontSize:16, fontVariationSettings:"'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 20",
                              color: card.iconVariant==="accent" ? "#6a5acd"
                                : card.iconVariant==="positive" ? "#2e7d32"
                                : card.iconVariant==="info" ? "#3555a0"
                                : "#e65100",
                              lineHeight:1 }}>
                            {card.icon}
                          </span>
                        </div>
                        <span className="card__title">{card.title}</span>
                      </div>
                      <p className="card__body">{card.body}</p>
                    </div>
                  ))}
                </div>
              </div>

              {/* Section 2 — 4 cards with badge, height=148px */}
              <div className="section">
                <div className="section-heading">Recent invoices</div>
                <div className="card-grid">
                  {SECTION_2_CARDS.map(card => (
                    <div key={card.id} className="card" tabIndex={0}>
                      <div className="card__heading">
                        <div className={`card__icon card__icon--${card.iconVariant}`}>
                          <span className="material-symbols-rounded" aria-hidden="true"
                            style={{ fontSize:16, fontVariationSettings:"'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 20",
                              color: card.iconVariant==="accent" ? "#6a5acd"
                                : card.iconVariant==="warning" ? "#e65100"
                                : "#3555a0",
                              lineHeight:1 }}>
                            {card.icon}
                          </span>
                        </div>
                        <span className="card__title">{card.title}</span>
                      </div>
                      {/* Badge — Slot.CardSubtitle visible in Section 2 */}
                      <div>
                        <span className={`card__badge${card.badgeVariant==="positive" ? " card__badge--positive" : ""}`}>
                          {card.badge}
                        </span>
                      </div>
                      <p className="card__body">{card.body}</p>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // NAV SHELL ROOT
    // ═══════════════════════════════════════════════════════════════════════════
    function NavShell() {
      const [isMobile, setIsMobile]       = useState(window.innerWidth < 768);
      const [isTablet, setIsTablet]       = useState(window.innerWidth >= 768 && window.innerWidth < 1024);
      const [sideNavCollapsed, setSideNavCollapsed] = useState(false);
      const [mobileNavOpen, setMobileNavOpen]       = useState(false);
      const [activeTab, setActiveTab]     = useState(0);
      const [activeFilter, setActiveFilter] = useState(0);

      useEffect(() => {
        const update = () => {
          const w = window.innerWidth;
          setIsMobile(w < 768);
          setIsTablet(w >= 768 && w < 1024);
        };
        window.addEventListener("resize", update);
        return () => window.removeEventListener("resize", update);
      }, []);

      useEffect(() => {
        const h = e => { if (e.key === "Escape" && mobileNavOpen) setMobileNavOpen(false); };
        document.addEventListener("keydown", h);
        return () => document.removeEventListener("keydown", h);
      }, [mobileNavOpen]);

      const collapsed = isMobile ? !mobileNavOpen : isTablet ? true : sideNavCollapsed;

      return (
        <div className="shell">
          <TopNavGlobal
            config={SHELL_CONFIG}
            isMobile={isMobile}
            isTablet={isTablet}
            onSideNavToggle={() => {
              if (isMobile) setMobileNavOpen(p => !p);
              else setSideNavCollapsed(p => !p);
            }}
          />

          <div className="shell__body">
            {/* Mobile scrim */}
            {isMobile && mobileNavOpen && (
              <div onClick={() => setMobileNavOpen(false)}
                style={{ position:"fixed", inset:"56px 0 0 0", zIndex:49,
                  background:"rgba(0,0,0,0.32)" }}
                aria-hidden="true" />
            )}

            <SideNavShell
              config={SHELL_CONFIG}
              collapsed={collapsed}
              onToggle={() => {
                if (isMobile) setMobileNavOpen(p => !p);
                else setSideNavCollapsed(p => !p);
              }}
              isMobile={isMobile}
            />

            <main className="shell__main" id="main-content">
              <ScreenTemplate
                page={SHELL_CONFIG.page}
                activeTab={activeTab}
                onTabChange={setActiveTab}
                activeFilter={activeFilter}
                onFilterChange={setActiveFilter}
              />
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<NavShell />);
  </script>
</body>
</html>
