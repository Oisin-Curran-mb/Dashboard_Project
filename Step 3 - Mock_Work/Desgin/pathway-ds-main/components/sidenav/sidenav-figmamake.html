<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SideNav — Pathway Design System</title>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;500;600;700&Red+Hat+Display:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  /* Surface/Canvas = #fafafa (same hex as Surface/Nav/Light — see token table) */
  html, body, #root { height: 100%; background: #fafafa; font-family: 'Red Hat Text', sans-serif; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: transparent; border-radius: 4px; transition: background var(--motion-duration-3); }
  *:hover::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.18); }

  /* Semantic tokens consumed by the <Scrollable> overlay scrollbar (mirrors src/tokens/tokens.css). */
  :root {
    /* Motion tokens (mirrors src/tokens/tokens.css §motion). Inlined so the standalone demo
       resolves the same --motion-* variables the shipped component consumes. */
    --motion-duration-1: 100ms;
    --motion-duration-2: 150ms;
    --motion-duration-3: 200ms;
    --motion-duration-4: 300ms;
    --motion-duration-5: 380ms;
    --motion-duration-6: 460ms;
    --motion-duration-7: 680ms;
    --motion-duration-8: 1100ms;
    --motion-duration-loop: 1000ms;
    --motion-duration-loop-fast: 750ms;
    --motion-easing-standard: cubic-bezier(0.4, 0, 0.2, 1);
    --motion-easing-spring: cubic-bezier(0.34, 1.04, 0.64, 1);
    --motion-easing-decelerate: cubic-bezier(0, 0, 0.2, 1);
    --motion-easing-accelerate: cubic-bezier(0.4, 0, 1, 1);
    --motion-easing-emphasized: cubic-bezier(0.32, 0.72, 0, 1);
    --motion-easing-accordion: cubic-bezier(0.33, 1.03, 0.68, 1);
    --motion-easing-linear: cubic-bezier(0, 0, 1, 1);

    --semantic-color-light-mode-scrim-faint: rgba(17, 17, 17, 0.16); /* thumb rest */
    --semantic-color-light-mode-scrim-light: rgba(17, 17, 17, 0.30);  /* thumb hover/drag */
    --semantic-color-light-mode-fill-static-neutral-light: #fefefd;   /* glass edge */
    --semantic-layout-units-padding-xtight:   6px;
    --semantic-layout-units-padding-xxxtight: 2px;
    --semantic-layout-units-cornerradius-full: 64px;
    --motion-duration-3: 200ms;
    --motion-duration-5: 380ms;
    --motion-easing-standard: cubic-bezier(0.4, 0, 0.2, 1);
    --motion-easing-decelerate: cubic-bezier(0, 0, 0.2, 1);
  }
  /* Hide the native bar on the Scrollable view (the overlay thumb replaces it). */
  .pds-scrollable__view { scrollbar-width: none; -ms-overflow-style: none; }
  .pds-scrollable__view::-webkit-scrollbar { width: 0; height: 0; display: none; }
  /* Touch: disable the mouse grab strip so finger-swipes scroll the content (passive bar). */
  @media (hover: none) { .pds-scrollable__grab { pointer-events: none !important; } }

  /* ── OPEN IN CHROME BUTTON ─────────────────────────────────────────────── */
  #open-in-chrome {
    position: fixed; bottom: 16px; right: 16px; z-index: 9999;
    display: flex; align-items: center; gap: 6px;
    padding: 7px 13px 7px 10px;
    background: #fff; border: 1px solid #d8dce8; border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.10);
    font-family: 'Red Hat Text', sans-serif; font-size: 12px; font-weight: 500;
    color: #2d4889; cursor: pointer; text-decoration: none;
    transition: box-shadow var(--motion-duration-3) var(--motion-easing-standard), border-color var(--motion-duration-3) var(--motion-easing-standard);
  }
  #open-in-chrome:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.14); border-color: #a0b5e6;
  }
  #open-in-chrome svg { flex-shrink: 0; }

  /* PopoverMenu animation — slides in 4px from left + fades in                    */
  /* Duration: 150ms ease-out on open. Close relies on 300ms hover-leave delay.    */
  /* prefers-reduced-motion: motion removed, opacity-only fade retained.           */
  /* popoverIn — spring slide: starts 6px left, eases in with slight decelerate   */
  @keyframes popoverIn {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  /* popoverInCentered — bakes translateY(-50%) into both keyframes so the         */
  /* forwards fill never clobbers the vertical centering transform.                 */
  @keyframes popoverInCentered {
    from { opacity: 0; transform: translateX(-6px) translateY(-50%); }
    to   { opacity: 1; transform: translateX(0)    translateY(-50%); }
  }
  @media (prefers-reduced-motion: reduce) {
    @keyframes popoverIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes popoverInCentered {
      from { opacity: 0; transform: translateY(-50%); }
      to   { opacity: 1; transform: translateY(-50%); }
    }
  }

  /* ── TOP NAV (TopNav.Global — Pathway DS) ──────────────────────── */
  /* Source: Figma node 40005504:55844 — read 2026-05-13 via Figma MCP   */
  /* Background: Fill/Static/Brand/Base → #2d4889 (brand blue, NOT dark navy) */
  /* Height: 56px. z-index: 100.                                          */
  /* Breakpoints: ≥1024 desktop | 768–1023 tablet | <768 mobile          */
  /* Icons: Material Symbols Rounded (Google Fonts CDN)                  */
  /* Branded assets: Figma CDN URLs — TN_CHURCH_LOGO, TN_HOME_ICON       */

  /* Primitive tokens for TopNav interactive states */
  :root {
    --ptn-brand-50-4:  rgba(160,181,230,0.04);
    --ptn-brand-50-8:  rgba(160,181,230,0.08);
    --ptn-brand-50-12: rgba(160,181,230,0.12);
    --ptn-brand-50-16: rgba(160,181,230,0.16);
    --ptn-brand-50-20: rgba(160,181,230,0.20);
    --ptn-brand-50-30: rgba(160,181,230,0.30);
    --ptn-cn-0:  #ffffff;
    --ptn-cn-10: #fbfbfb;
    --tn-fill-hover:   var(--ptn-brand-50-8);
    --tn-fill-pressed: var(--ptn-brand-50-16);
    --tn-stroke-hover:   var(--ptn-brand-50-20);
    --tn-stroke-pressed: var(--ptn-brand-50-30);
    --tn-icon-mono: var(--ptn-cn-10);   /* icon/action/mono/base */
    --tn-text-mono: var(--ptn-cn-10);   /* text/action/mono/base */
    --tn-radius-md: 8px;
    --tn-radius-full: 64px;
  }

  @keyframes tnDropdownIn {
    from { opacity: 0; transform: translateY(-6px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }
  @media (prefers-reduced-motion: reduce) {
    @keyframes tnDropdownIn { from { opacity:0; } to { opacity:1; } }
  }

  /* Main bar — brand blue, fixed, 56px */
  .topnav {
    position: fixed; top: 0; left: 0; right: 0;
    height: 56px;
    background: var(--fill\/static\/brand\/base, #2d4889);
    z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 16px;
  }
  .topnav__row-start { display: flex; align-items: center; gap: 4px; flex: 0 0 auto; }
  .topnav__spacer    { flex: 1; }
  .topnav__row-end   { display: flex; align-items: center; gap: 0; flex: 0 0 auto; }
  /* Hamburger — hidden on desktop, shown on mobile via !important override below */
  .topnav__sidenav-control { display: none !important; }

  /* Material Symbol glyph helper */
  .tn-ms {
    font-family: 'Material Symbols Rounded';
    font-size: 24px; line-height: 1; font-style: normal; font-weight: 300;
    display: inline-block; flex-shrink: 0;
    color: var(--tn-icon-mono);
    user-select: none;
    /* Variable font axes: optical size 24, weight 300, fill 0, grade 0 */
    font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
  }
  .tn-ms--sm {
    font-size: 16px;
    font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
  }
  .tn-chev {
    font-family: 'Material Symbols Rounded';
    font-size: 16px; line-height: 1; font-style: normal; font-weight: 300;
    display: inline-block; flex-shrink: 0;
    color: var(--tn-icon-mono);
    user-select: none;
    font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
    transition: transform var(--motion-duration-4) var(--motion-easing-standard);
  }
  button[aria-expanded="true"] .tn-chev { transform: rotate(180deg); }

  /* Module Switcher — home icon + chevron, no text, no border */
  .tn-mod-btn {
    display: flex; align-items: center; justify-content: center;
    height: 36px; min-height: 48px; padding: 4px 4px 4px 4px;
    gap: 2px;
    border: none; border-radius: var(--tn-radius-md, 8px);
    background: transparent; cursor: pointer;
    transition: background var(--motion-duration-3) var(--motion-easing-standard);
  }
  .tn-mod-btn:hover { background: var(--tn-fill-hover); }
  .tn-mod-btn:active, .tn-mod-btn[aria-expanded="true"] { background: var(--tn-fill-pressed); }
  .tn-mod-btn:focus-visible { outline: 2px solid rgba(160,181,230,0.7); outline-offset: 2px; border-radius: 8px; }
  .tn-mod-icon {
    width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
    padding: 2px; flex-shrink: 0;
  }
  .tn-mod-icon img { width: 100%; height: 100%; object-fit: contain; display: block; }

  /* Org Switcher — church logo + name + chevron, bordered pill */
  .tn-org { position: relative; }
  .tn-org-btn {
    display: flex; align-items: center; gap: 4px;
    min-height: 36px; max-height: 36px; padding: 4px;
    background: var(--ptn-brand-50-4);
    border: 1px solid var(--ptn-brand-50-16);
    border-radius: var(--tn-radius-md, 8px);
    color: var(--tn-text-mono); cursor: pointer; font-family: inherit;
    transition: background var(--motion-duration-3) var(--motion-easing-standard), border-color var(--motion-duration-3) var(--motion-easing-standard);
  }
  .tn-org-btn:hover { background: var(--tn-fill-hover); border-color: var(--tn-stroke-hover); }
  .tn-org-btn:active, .tn-org-btn[aria-expanded="true"] { background: var(--tn-fill-pressed); border-color: var(--tn-stroke-pressed); }
  .tn-org-btn:focus-visible { outline: 2px solid rgba(160,181,230,0.7); outline-offset: 2px; border-radius: 8px; }
  .tn-org-logo {
    width: 20px; height: 20px; border-radius: var(--tn-radius-sm, 4px);
    border: 1px solid var(--ptn-brand-50-16);
    overflow: hidden; flex-shrink: 0; object-fit: cover; display: block;
  }
  .tn-org-label {
    font-size: 14px; font-weight: 500; line-height: 20px; letter-spacing: 0.3px;
    color: var(--tn-text-mono);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 248px;
    font-family: 'Red Hat Text', sans-serif;
  }
  .tn-org-panel {
    position: absolute; top: calc(100% + 8px); left: 0; min-width: 240px;
    background: #1e2d52; border: 1px solid rgba(160,181,230,0.14); border-radius: 10px;
    padding: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.30);
    z-index: 200; animation: tnDropdownIn var(--motion-duration-2) var(--motion-easing-decelerate) both;
    color: rgba(160,181,230,0.7); font-size: 12px; line-height: 1.5;
  }
  .tn-org-panel strong { color: rgba(160,181,230,0.9); font-weight: 600; }

  /* Search — 48×48 icon button wrapper, 32×32 circle inner */
  .tn-search-btn {
    display: flex; align-items: center; justify-content: center;
    width: 48px; height: 48px; padding: 8px;
    border: none; background: transparent; cursor: pointer;
    border-radius: 12px; transition: background var(--motion-duration-3) var(--motion-easing-standard);
  }
  .tn-search-btn:hover { background: var(--tn-fill-hover); }
  .tn-search-btn:focus-visible { outline: 2px solid rgba(160,181,230,0.7); outline-offset: 2px; border-radius: 12px; }
  .tn-search-inner {
    display: flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; padding: 8px;
    background: rgba(160,181,230,0.08);
    border: 0.75px solid #fbfbfb;
    border-radius: var(--tn-radius-full, 64px);
  }
  .tn-search-inner .tn-ms { font-size: 18px; font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20; }

  /* Action icon buttons — notifications, more_vert (48×48) */
  .tn-action-btn {
    display: flex; align-items: center; justify-content: center;
    width: 48px; height: 48px; padding: 6px;
    border: none; background: transparent; color: var(--tn-icon-mono);
    cursor: pointer; border-radius: var(--tn-radius-md, 8px);
    transition: background var(--motion-duration-3) var(--motion-easing-standard);
  }
  .tn-action-btn:hover { background: var(--tn-fill-hover); }
  .tn-action-btn:focus-visible { outline: 2px solid rgba(160,181,230,0.7); outline-offset: 2px; }
  .tn-action-inner {
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: var(--tn-radius-md, 8px);
    padding: 8px;
  }
  /* First bell has a highlight background per Figma */
  .tn-action-btn--highlighted .tn-action-inner {
    background: rgba(10,18,35,0.16);
  }

  /* Profile — 48×48 wrapper, 32×32 amethyst circle */
  .tn-profile-btn {
    display: flex; align-items: center; justify-content: center;
    width: 48px; height: 48px; padding: 2px;
    border: none; background: transparent; cursor: pointer;
    border-radius: 50%; transition: background var(--motion-duration-3) var(--motion-easing-standard);
  }
  .tn-profile-btn:hover { background: var(--tn-fill-hover); }
  .tn-profile-btn:focus-visible { outline: 2px solid rgba(160,181,230,0.7); outline-offset: 2px; border-radius: 50%; }
  .tn-profile-av {
    width: 32px; height: 32px; border-radius: 200px;
    background: var(--fill\/static\/accent-amethyst\/base, #dcd9ef);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; line-height: 20px; letter-spacing: 0.3px;
    color: var(--text\/static\/accent-amethyst\/contrast, #221e3f);
    font-family: 'Red Hat Text', sans-serif;
  }

  .tn-scrim { position: fixed; inset: 0; z-index: 99; background: transparent; }

  @media (max-width: 767px) {
    .topnav__sidenav-control { display: flex !important; }
    .topnav { padding: 4px 8px; }
    .tn-org-label { max-width: 80px; font-size: 12px; }
  }
  @media (min-width: 768px) and (max-width: 1023px) {
    .topnav { padding: 4px 12px; }
    .tn-org-label { max-width: 200px; }
  }

  /* ── RESPONSIVE LAYOUT ─────────────────────────────────────── */
  /* Overlay nav panel — always rendered when !isDesktop, CSS transitions
     drive both enter AND exit so there is no instant-removal flash.

     Asymmetric curves: the transition defined on .overlay-panel fires on EXIT
     (CSS uses the destination state's transition, so going back to the base
     class uses the base class transition). The transition on .overlay-panel--open
     fires on ENTER. This lets enter decelerate (glides in) and exit ease-in-out
     (leaves cleanly without the sharp reverse-curve snap of a shared transition).

     Enter: transform --motion-duration-5 + opacity --motion-duration-4, both decelerate.
     Exit:  transform --motion-duration-4 + opacity --motion-duration-3, both accelerate. */
  .overlay-panel {
    position: fixed; left: 0; bottom: 0; z-index: 100;
    /* top:64 / width:overlayNavW(240) set via inline style (see App render)   */
    transform: translateX(-110%);   /* 110% hides any box-shadow bleed         */
    opacity: 0;
    pointer-events: none;           /* non-visible panel must not eat clicks    */
    /* EXIT transition — fires when .overlay-panel--open class is removed       */
    transition:
      transform var(--motion-duration-4) var(--motion-easing-accelerate),
      opacity   var(--motion-duration-3) var(--motion-easing-accelerate);
    will-change: transform;
  }
  .overlay-panel--open {
    transform: translateX(0);
    opacity: 1;
    pointer-events: auto;
    /* ENTER transition — decelerate (no overshoot): a large full-height panel
       glides into rest. See spec §17.6 (motion override, decelerate by design). */
    transition:
      transform var(--motion-duration-5) var(--motion-easing-decelerate),
      opacity   var(--motion-duration-4) var(--motion-easing-decelerate);
  }

  /* Scrim — all overlay breakpoints (<1024px, both tablet AND mobile).
     Overlay is 240px wide at all sizes, so page content is always partially
     visible behind it and the scrim is always needed. Always rendered when
     !isDesktop (not gated on isOverlay) so the CSS fade-out plays on dismiss —
     removing from the DOM on close would cause an instant vanish.             */
  .overlay-scrim {
    position: fixed; top: 56px; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.32); z-index: 99;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--motion-duration-4) var(--motion-easing-standard);
  }
  .overlay-scrim--visible {
    opacity: 1;
    pointer-events: auto;
  }

  @media (prefers-reduced-motion: reduce) {
    /* Remove slide — keep opacity fade only, shorter duration */
    .overlay-panel,
    .overlay-panel--open {
      transform: none !important;
      transition: opacity var(--motion-duration-2) var(--motion-easing-linear);
    }
    .overlay-scrim { transition: opacity var(--motion-duration-2) var(--motion-easing-linear); }
  }
</style>
</head>

<!-- Always-visible "Open in Chrome" button — bottom-right corner, every demo page -->
<a id="open-in-chrome" href="#" onclick="window.open(location.href,'_blank');return false;" title="Open in Chrome">
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none">

<div id="root"></div>
<!-- ─── SEMANTIC TOKEN RESOLVER ──────────────────────────────────────────────
     Inline fallback — mirrors tokens/resolve-tokens.js (the ES-module library
     used by sidenav.jsx and Storybook). Keep in sync when tokens change.
     The module script below overrides this with the live resolver when the
     file is served; the inline version ensures Babel processes correctly
     even in offline / file:// contexts where the module can't load.         -->
<script>
(function () {
  var R = {
    "Fill/Contextual/NavItem/Base":        "#fafafa",
    "Fill/Contextual/NavItem/Hover":       "#11111105",
    "Fill/Contextual/NavItem/Active":      "#a0b5e629",
    "Fill/Contextual/NavItem/Trail":       "#11111105",
    "Stroke/Static/Neutral/Light":         "#f6f6f6",
    "Surface/Nav/Light":                   "#fafafa",

    "Text/Contextual/NavItem/Base":        "#313131",
    "Text/Contextual/NavItem/Hover":       "#252525",
    "Text/Contextual/NavItem/Active":      "#1b2d57",
    "Text/Static/Secondary/Light":         "#7b7b7b",
    "Text/Static/Secondary/Subtle":        "#606060",
    "Icon/Contextual/NavItem/Base":        "#484848",
    "Icon/Contextual/NavItem/Hover":       "#313131",
    "Icon/Contextual/NavItem/Active":      "#2d4889",

  };
  window.t = function (id) { return R[id] !== undefined ? R[id] : id; };
})();
</script>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ─── Scrollable (system overlay scrollbar) ──────────────────────────────────────
// Inlined from components/scrollbar/scrollbar.jsx so this standalone demo uses the
// SAME overlay scrollbar component as the repo — not a native/generic bar. Spec:
// components/scrollbar/scrollbar-spec.md. Colour/units resolve through semantic tokens.
const SCROLL = {
  thumbWidth:  "var(--semantic-layout-units-padding-xtight)",
  thumbRadius: "var(--semantic-layout-units-cornerradius-full)",
  gutter:      "var(--semantic-layout-units-padding-xxxtight)",
  thumbMin:    28,
  grabZone:    16,
  thumbRest:   "var(--semantic-color-light-mode-scrim-faint)",
  thumbHover:  "var(--semantic-color-light-mode-scrim-light)",
  thumbBlur:   "blur(8px) saturate(180%)",
  thumbEdge:   "inset 0 0 0 0.5px color-mix(in srgb, var(--semantic-color-light-mode-fill-static-neutral-light) 35%, transparent)",
  fadeIn:      "opacity var(--motion-duration-3) var(--motion-easing-decelerate), background var(--motion-duration-3) var(--motion-easing-standard)",
  fadeOut:     "opacity var(--motion-duration-5) var(--motion-easing-standard)",
  idleHideMs:  500,
};
function Scrollable({ children, style={}, viewStyle={} }) {
  const viewRef = useRef(null), dragRef = useRef(null), idleRef = useRef(null), nearRef = useRef(false);
  const [thumb, setThumb] = useState({ h:0, top:0, show:false });
  const [active, setActive] = useState(false);
  const [hot, setHot] = useState(false);
  const recompute = useCallback(() => {
    const el = viewRef.current; if (!el) return;
    const { scrollHeight, clientHeight, scrollTop } = el;
    if (scrollHeight <= clientHeight + 1) { setThumb(t => t.show ? {...t, show:false} : t); return; }
    const h = Math.max(SCROLL.thumbMin, (clientHeight/scrollHeight)*clientHeight);
    const top = (scrollTop/(scrollHeight-clientHeight))*(clientHeight-h);
    setThumb({ h, top, show:true });
  }, []);
  useEffect(() => {
    recompute();
    const el = viewRef.current; if (!el) return;
    const ro = new ResizeObserver(recompute); ro.observe(el);
    Array.from(el.children).forEach(c => ro.observe(c));
    return () => ro.disconnect();
  }, [children, recompute]);
  const scheduleHide = () => { clearTimeout(idleRef.current);

// Uses fill={color} directly — no CDN or CSS filter hacks needed.
// Note: Figma CDN URLs (figma.com/api/mcp/asset/…) are NOT used here because:
//   • They expire after 7 days and require an active figma.com browser session.
//   • Re-colouring CDN <img> tags requires CSS filter approximations.
//   • The real SVG paths (extracted above from the Pathway design system) are
//     self-contained, colour-accurate at all states, and always available.
function IconImg({ name, size=14, color }) {
  const Ic = IC[name];

}

// ─── INDICATOR STRIPE ─────────────────────────────────────────────────────────
// 4px structural column present on every SideNavItem (L0 + L1).
// indicator.stripe is visible only when `visible=true`.
// Color = Icon/Contextual/NavItem/Active (#2d4889) — same token as icon active.
function IndicatorStripe({ visible }) {
  return (
    <div style={{ width:L.stripeW, alignSelf:"stretch", display:"flex",
      flexDirection:"column", alignItems:"flex-start",
      justifyContent:"center", padding:"4px 0", flexShrink:0 }}>

        borderRadius:"0 8px 8px 0",

    </div>
  );
}

// ─── SIDENAV ITEM ─────────────────────────────────────────────────────────────
// STATE MATRIX (confirmed from Figma):
//
// State                        Fill         Text         Icon         Stripe
// ─────────────────────────────────────────────────────────────────────────────
// Base                         NavItem/Base NavItem/Base NavItem/Base  –
// Hover                        NavItem/Hover NavItem/Hover NavItem/Hover  –
// Active (destination)         NavItem/Active NavItem/Active NavItem/Active ✓
// Trail — grouper EXPANDED     NavItem/Trail NavItem/Active NavItem/Base   –
//   ↳ any expanded grouper shows trail regardless of whether a child is active
// Trail — grouper COLLAPSED    NavItem/Active NavItem/Active NavItem/Active ✓
//   ↳ only when grouper has an active child AND is collapsed
//
// Level 0: [indicator 4px][LeadingIcon 24px][label flex][RowEnd 40×24 — groupers]
// Level 1: [indicator 4px][label flex pl-32]  (no icon, pl = rowStart 8 + main 24)
function SideNavItem({ item, isActive, isTrail, isExpanded, isSidebarCollapsed,
  isChild, onClick, onToggle, popoverOpen, anchorRect, onPopoverEnter, onPopoverLeave, activeId }) {

  const [hovered, setHovered] = useState(false);
  const hasChildren = !!(item.children && item.children.length);

  // Any expanded grouper → Trail state (regardless of active child)
  const isExpandedGrouper = hasChildren && isExpanded && !isSidebarCollapsed;
  // Collapsed grouper whose CHILD is active → trail state (bg fill + stripe)
  const isCollapsedActiveGrouper = isTrail && (!isExpanded || isSidebarCollapsed);

  // Stripe rules (Figma):
  //   Destination item active                       → stripe ✓
  //   Collapsed GROUPER directly active             → NO stripe (fill + icon colour only)
  //   Collapsed grouper with active child (trail)   → stripe ✓
  const isCollapsedGrouper = isSidebarCollapsed && hasChildren;
  const showStripe = isCollapsedActiveGrouper || (isActive && !isCollapsedGrouper);

  const fillBg =
    (isActive || isCollapsedActiveGrouper) ? T.fill.navActive
    : isExpandedGrouper                    ? T.fill.navTrail
    : hovered                              ? T.fill.navHover
    :                                        T.fill.navBase;

  // Trail text = Text/Contextual/NavItem/Active (same as active)
  const textColor =
    (isActive || isCollapsedActiveGrouper || isExpandedGrouper) ? T.text.navActive
    : hovered ? T.text.navHover
    :           T.text.navBase;

  // Trail-expanded icon = Icon/Contextual/NavItem/Base (#484848) per Figma
  const iconColor =
    (isActive || isCollapsedActiveGrouper) ? T.icon.navActive
    : hovered                              ? T.icon.navHover
    :                                        T.icon.navBase;

  const handleClick = () => {
    // Expanded sidebar: groupers toggle their children, destinations navigate.
    // Collapsed sidebar: groupers act as navigation targets — tapping a grouper
    // sets it Active (Figma: "When tapping on a grouper, the grouper moves to
    // its active state"). Popover remains hover-triggered separately.
    if (hasChildren && !isSidebarCollapsed) onToggle(item.id);
    else onClick(item.id);
  };

  const itemRef = useRef(null);

  return (
    <div ref={itemRef} style={{ position:"relative" }}>
      <div role="button" tabIndex={0} aria-current={isActive ? "page" : undefined}
        aria-expanded={hasChildren && !isSidebarCollapsed ? isExpanded : undefined}
        onClick={handleClick} onKeyDown={e => (e.key==="Enter"||e.key===" ") && handleClick()}
        onMouseEnter={() => {
          setHovered(true);
          if (isSidebarCollapsed && onPopoverEnter) {
            const rect = itemRef.current ? itemRef.current.getBoundingClientRect() : null;
            onPopoverEnter(item.id, rect);
          }
        }}
        onMouseLeave={() => {
          setHovered(false);
          if (isSidebarCollapsed && onPopoverLeave) onPopoverLeave();
        }}
        style={{ display:"flex", alignItems:"center", minHeight:L.itemH, width:"100%",
          borderRadius:T.radius, backgroundColor:fillBg, cursor:"pointer",
          overflow:"hidden", transition:"background-color var(--motion-duration-3) var(--motion-easing-standard)",
          userSelect:"none" }}>

        {/* container.indicator — 4px structural column, always present */}
        <IndicatorStripe visible={showStripe} />

        {/* Container.LeadingIcon 24×24 → Icon.Leading 14pt — Level 0 ONLY          */}
        {/* Collapsed: item is 48px wide (72px container − 12px padding × 2).        */}
        {/* 4px stripe + 8px rowStart padding + 24px icon + 8px rowStart = 44px      */}
        {/* icon naturally centers within the 48px item — no margin hack needed.     */}
        {!isChild && item.icon && (
          <div style={{ width:L.iconWrap, height:L.iconWrap, display:"flex",
            alignItems:"center", justifyContent:"center", flexShrink:0,
            marginLeft: L.rowPadH }}>
            <IconImg name={item.icon} size={L.iconInner} color={iconColor} />
          </div>
        )}

        {/* text.label — Label/Menu/Base/Medium (14px/500/20px) at ALL levels */}
        {/* L1: paddingLeft=32 = Container.rowStart px-[8] + container.main pl-[24] */}
        {/* Always in DOM; maxWidth+opacity transition prevents label pop-in glitch
            when expanding — text was previously mounting at full opacity inside the
            still-72px container before the width transition completed. */}
        <div style={{ flex:1, minWidth:0,
          paddingLeft:  isChild ? 32 : L.textPad,
          paddingRight: (!isChild && hasChildren) ? 0 : L.rowPadH,
          maxWidth: isSidebarCollapsed ? 0 : 200,
          opacity:  isSidebarCollapsed ? 0 : 1,
          overflow: "hidden",
          pointerEvents: isSidebarCollapsed ? "none" : "auto",
          transition:"max-width var(--motion-duration-6) var(--motion-easing-emphasized), opacity var(--motion-duration-3) var(--motion-easing-standard)" }}>
          <p style={{ fontFamily:"'Red Hat Text',sans-serif", fontWeight:500,
            fontSize:14, lineHeight:"20px", letterSpacing:"0.3px", color:textColor, margin:0,
            whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
            transition:"color var(--motion-duration-3) var(--motion-easing-standard)" }}>
            {item.label}
          </p>
        </div>

        {/* Container.RowEnd 40×24 — groupers only, expanded sidebar */}
        {/* Chevron: ▼ when collapsed, ▲ when expanded (vertical, not horizontal) */}
        {/* Always in DOM with same fade-out treatment to prevent layout jank */}
        {!isChild && hasChildren && (
          <div style={{ width:40, height:L.iconWrap, display:"flex",
            alignItems:"center", justifyContent:"center", flexShrink:0,
            maxWidth: isSidebarCollapsed ? 0 : 40,
            opacity:  isSidebarCollapsed ? 0 : 1,
            overflow: "hidden",
            transition:"max-width var(--motion-duration-6) var(--motion-easing-emphasized), opacity var(--motion-duration-3) var(--motion-easing-standard)" }}>
            {/* Rotate chevron — easeOutQuart so it lands with the accordion panel.
                Keeps a hint of spring character without overshooting past the item below. */}
            <div style={{ transform: isExpanded ? "rotate(180deg)" : "rotate(0deg)",
              transition:"transform var(--motion-duration-5) var(--motion-easing-accordion)" }}>
              <IC.chevDown size={10} color={iconColor} />
            </div>
          </div>
        )}
      </div>

      {/* ── Hover-safe bridge ─────────────────────────────────────────────────── */}
      {/* position:fixed so it escapes the nav's overflow:hidden clipping.         */}
      {/* Covers the 8px gap between nav right edge and the portal-rendered popover */}
      {isSidebarCollapsed && popoverOpen && anchorRect && (
        <div style={{ position:"fixed",
          left: anchorRect.right, top: anchorRect.top,
          width:8, height: anchorRect.height, zIndex:999 }}
          onMouseEnter={() => {
            const rect = itemRef.current ? itemRef.current.getBoundingClientRect() : anchorRect;
            onPopoverEnter && onPopoverEnter(item.id, rect);
          }} />
      )}

      {/* Collapsed grouper → flyout popover with section label + children */}
      {/* Rendered via portal so it escapes the nav's overflow:hidden stacking context */}
      {isSidebarCollapsed && hasChildren && popoverOpen && anchorRect && (
        <CollapsedPopover item={item} onClick={onClick} anchorRect={anchorRect}
          activeId={activeId}
          onMouseEnter={() => {
            const rect = itemRef.current ? itemRef.current.getBoundingClientRect() : anchorRect;
            onPopoverEnter && onPopoverEnter(item.id, rect);
          }}
          onMouseLeave={onPopoverLeave} />
      )}

      {/* Collapsed destination → simple label tooltip */}
      {/* Rendered via portal so it escapes the nav's overflow:hidden stacking context */}
      {isSidebarCollapsed && !hasChildren && popoverOpen && anchorRect && (
        <SideNavTooltip label={item.label} anchorRect={anchorRect}
          onMouseEnter={() => {
            const rect = itemRef.current ? itemRef.current.getBoundingClientRect() : anchorRect;
            onPopoverEnter && onPopoverEnter(item.id, rect);
          }}
          onMouseLeave={onPopoverLeave} />
      )}
    </div>
  );
}

// ── SideNavTooltip ─────────────────────────────────────────────────────────
// Shown on hover of a collapsed destination item (non-grouper).
// Tokens: Fill/Static/Neutral/White, Stroke/Static/Neutral/Light (#f6f6f6),
//         Text/Static/Primary/Base (#202020), Text/Body/S/Regular (14px/400/20px)
// Shadow: 2px 2px 8px 0px rgba(0,0,0,0.03)
// Offset: left edge at container right edge + 8px gap (bridge element covers gap)
function SideNavTooltip({ label, anchorRect, onMouseEnter, onMouseLeave }) {
  if (!anchorRect) return null;
  const top = anchorRect.top + anchorRect.height / 2;
  const left = anchorRect.right + 8;
  return ReactDOM.createPortal(
    <div onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}
      style={{ position:"fixed", left, top,
        zIndex:1000,
        backgroundColor:"#fff",
        border:"0.5px solid #f6f6f6",
        borderRadius:8,
        boxShadow:"2px 2px 8px 0px rgba(0,0,0,0.03)",
        padding:"6px 8px",
        whiteSpace:"nowrap",
        pointerEvents:"auto",
        /* popoverInCentered bakes translateY(-50%) into both keyframes so the     */
        /* forwards fill never clobbers the vertical centering transform.          */
        animation:"popoverInCentered var(--motion-duration-3) var(--motion-easing-spring) forwards" }}>
      <span style={{ fontFamily:"'Red Hat Text',sans-serif", fontWeight:400,
        fontSize:14, lineHeight:"20px", letterSpacing:"0.02px",
        color:"#202020" }}>
        {label}
      </span>
    </div>,
    document.body
  );
}

// ── BulletDot ────────────────────────────────────────────────────────────────
// 6px filled circle used as the leading icon in SideNavListSection items.
// Figma: Icon.Leading inside Container.LeadingIcon in SideNavItemList (node 40007332:6989)
// Inset 8.33% inside a 6×6 container → effective drawn size ≈ 5×5px
function BulletDot({ color }) {
  return (
    <div style={{ width:6, height:6, borderRadius:"50%",
      backgroundColor:color, flexShrink:0 }} />
  );
}

// ── ListItem ─────────────────────────────────────────────────────────────────
// A single item inside a SideNavListSection (e.g. "Recent Content" entries).
// Figma: SideNavItemList (node 40007332:6994)
// Typography: Text/Body/XSmall/Regular — 12px/400/18px/0.6px, Text/Contextual/NavItem/Base (#313131)
// Height: 48px (Accessibility/Touch Target/Optimal/Size)
// Same state matrix as SideNavItem: Base / Hover / Active
function ListItem({ item, isActive, onClick }) {
  const [hovered, setHovered] = useState(false);
  const bg    = isActive ? T.fill.navActive : hovered ? T.fill.navHover : "transparent";
  const color = isActive ? T.text.navActive : hovered ? T.text.navHover : T.text.navBase;
  const dotColor = isActive ? T.icon.navActive : hovered ? T.icon.navHover : T.icon.navBase;
  return (
    <div onClick={() => onClick && onClick(item.id)}
      onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
      role="button" tabIndex={0}
      onKeyDown={e => (e.key==="Enter"||e.key===" ") && onClick && onClick(item.id)}
      style={{ display:"flex", alignItems:"center", height:L.itemH, width:"100%",
        borderRadius:T.radius, backgroundColor:bg, cursor:"pointer",
        overflow:"hidden", transition:"background-color var(--motion-duration-3) var(--motion-easing-standard)",
        userSelect:"none" }}>
      {/* 4px indicator stripe (same structural column as SideNavItem) */}
      <IndicatorStripe visible={isActive} />
      {/* Container.LeadingIcon 24×24 — bullet dot as leading icon */}
      <div style={{ width:L.iconWrap, height:L.iconWrap, display:"flex",
        alignItems:"center", justifyContent:"center", flexShrink:0,
        marginLeft:L.rowPadH }}>
        <BulletDot color={dotColor} />
      </div>
      {/* text.label — 12px/400/XSmall/Regular */}
      <div style={{ flex:1, minWidth:0, paddingLeft:L.textPad, paddingRight:L.rowPadH }}>
        <p style={{ fontFamily:"'Red Hat Text',sans-serif", fontWeight:400,
          fontSize:12, lineHeight:"18px", letterSpacing:"0.6px", color,
          margin:0, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
          transition:"color var(--motion-duration-3) var(--motion-easing-standard)" }}>
          {item.label}
        </p>
      </div>
    </div>
  );
}

// Use case: "Recent Content", "Pinned Items", "Bookmarks" etc.

    <div style={{ display:"flex", flexDirection:"column", gap:6, width:"100%", flexShrink:0 }}>
      <NavSectionLabel label={label} />
      <div style={{ display:"flex", flexDirection:"column" }}>
        {items.map(item => (
          <ListItem key={item.id} item={item}
            isActive={item.id === activeId}
            onClick={onNavigate} />
        ))}
      </div>
    </div>
  );
}

// ── CollapsedPopover ─────────────────────────────────────────────────────────
// Shown on hover of a collapsed grouper item. Contains a SectionLabel (group
// name) + list of child items.
// Tokens: Fill/Static/Surface/White, Stroke/Static/Neutral/Subtle (#ededed) 0.5px,
//         Border/Radius/S (8px), Shadow.Medium (2px 2px 8px 4px rgba(0,0,0,0.03))
// Section label: Label/Section/Small/Semibold (11px/600/16px/0.6px), #7b7b7b, uppercase, bottom border
// Items: Text/Body/S/Regular (14px/400/20px), Text/Contextual/NavItem/Base (#313131)
// Offset: 8px from container right edge (bridge covers gap — see above)
function CollapsedPopover({ item, onClick, anchorRect, onMouseEnter, onMouseLeave, activeId }) {
  if (!anchorRect) return null;
  const top = anchorRect.top;
  const left = anchorRect.right + 8;
  return ReactDOM.createPortal(
    <div onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}
      style={{ position:"fixed", left, top, zIndex:1000,
        backgroundColor:"#fff",
        border:"0.5px solid #ededed",
        borderRadius:8,
        boxShadow:"2px 2px 8px 4px rgba(0,0,0,0.03)",
        padding:6,
        minWidth:200,
        pointerEvents:"auto",
        animation:"popoverIn var(--motion-duration-3) var(--motion-easing-spring) forwards" }}>

      {/* SectionLabel — Figma component 40006794-5977 */}
      <div style={{ borderBottom:"0.5px solid #ededed" }}>
        <SectionLabel label={item.label} />
      </div>

      {/* PopoverMenu.Items */}
      {item.children.map(child => <PopoverRow key={child.id} item={child} onClick={onClick} activeId={activeId} />)}
    </div>,
    document.body
  );
}

function PopoverRow({ item, onClick, activeId }) {
  const [h, setH] = useState(false);
  const isActive = item.id === activeId;
  // Active: fill navActive + stripe + text navActive color
  // Hover: fill navHover + text navHover
  // Base: transparent fill + text navBase
  const bg    = isActive ? T.fill.navActive : h ? T.fill.navHover : "transparent";
  const color = isActive ? T.text.navActive : h ? T.text.navHover : T.text.navBase;
  return (
    <div onClick={() => onClick(item.id)}
      onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{ display:"flex", alignItems:"center",
        minHeight:40, borderRadius:8, overflow:"hidden",
        backgroundColor: bg, cursor:"pointer",
        transition:"background-color var(--motion-duration-3) var(--motion-easing-standard)" }}>
      {/* 4px indicator stripe — matches SideNavItem stripe */}
      <div style={{ width:4, alignSelf:"stretch", borderRadius:"0 4px 4px 0",
        backgroundColor: isActive ? T.indicator : "transparent",
        flexShrink:0, transition:"background-color var(--motion-duration-3) var(--motion-easing-standard)" }} />
      <span style={{ padding:"0 8px", fontFamily:"'Red Hat Text',sans-serif", fontWeight:400,
        fontSize:14, lineHeight:"20px", letterSpacing:"0.02px",
        color, transition:"color var(--motion-duration-3) var(--motion-easing-standard)", flex:1 }}>
        {item.label}
      </span>
    </div>
  );
}

// ─── NAV HEADER ───────────────────────────────────────────────────────────────
// Figma: SideBar Expand/Collapse — moved to TOP of nav (updated 2026-05-13).
// Previously at the bottom; now rendered ABOVE the SideNavMenu.
//
// Collapsed state (Type=Collapsed, 48×48):
//   Container.Main — centered action icon (left_panel_open 12×12 SVG)
//
// Expanded state (Type=Expanded, 208×48):
//   Slot.RowEnd — right-aligned action icon (right_panel_open 12×12 SVG)
//   Slot.RowStart — optional brand mark (hidden in demo by default)
//
// Divider: h-[1px] Stroke/Static/Neutral/Light (#f6f6f6) below the control row.
// Action icon token: Icon/Action/Secondary Inverse/Base (#6b6b6b) — no hover change.
function NavHeader({ isSidebarCollapsed, onToggle }) {
  const [h, setH] = useState(false);
  return (
    <div style={{ width:"100%", flexShrink:0 }}>
      {/* Container.Main — 48px height, full width */}
      <div onClick={onToggle} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
        aria-label={isSidebarCollapsed ? "Expand navigation" : "Collapse navigation"}
        role="button" tabIndex={0}
        onKeyDown={e => (e.key==="Enter"||e.key===" ") && onToggle()}
        style={{ display:"flex", alignItems:"center", height:L.itemH, width:"100%",
          borderRadius:T.radius, cursor:"pointer",
          backgroundColor: h ? T.fill.navHover : "transparent",
          transition:"background-color var(--motion-duration-3) var(--motion-easing-standard)" }}>

        {isSidebarCollapsed ? (
          /* Collapsed: centered action icon */
          <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center" }}>
            <LeftPanelOpenIcon color={T.icon.actionSecondary} />
          </div>
        ) : (
          /* Expanded: right-aligned action icon in Slot.RowEnd */
          <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"flex-end" }}>
            <div style={{ width:36, height:36, display:"flex",
              alignItems:"center", justifyContent:"center" }}>
              <RightPanelOpenIcon color={T.icon.actionSecondary} />
            </div>
          </div>
        )}
      </div>

      {/* Divider — Stroke/Static/Neutral/Light, py-[2px] in Figma */}
      <div style={{ padding:"2px 0" }}>
        <div style={{ height:1, backgroundColor:T.fill.infoSubtle }} />
      </div>
    </div>
  );
}

// ─── SIDENAV CONTAINER ────────────────────────────────────────────────────────
// Surface/Nav/Light (#fafafa), border-r Stroke/Static/Neutral/Light (#f6f6f6)
// Padding: pt-[8px] pb-[12px] px-[16px expanded / 12px collapsed] (updated 2026-05-13)
// Width: 240px expanded, 72px collapsed (updated from 220px, 2026-05-12)
// Border-right: 0.5px solid Stroke/Static/Neutral/Light (#f6f6f6)
// NavHeader: TOP of nav (moved from bottom — 2026-05-13). Accordion groupers (2026-05-13).
//
// Props:
//   activeId          — id of the currently active nav item
//   onNavigate        — called with item id when user navigates
//   sidebarCollapsed  — true = 72px icon-only rail; false = 240px expanded
//   onCollapseChange  — called with new boolean value when collapse state changes
//   hideCollapseButton— when true, NavHeader is not rendered.
//                       Set to true on mobile (<768px) where there is no 72px rail
//                       state — the TopNav hamburger/close is the sole toggle.
function SideNav({ activeId, onNavigate, sidebarCollapsed, onCollapseChange, hideCollapseButton }) {
  const setSidebarCollapsed = onCollapseChange;
  const [expanded, setExpanded] = useState({ view: true });
  const [popoverId, setPopoverId] = useState(null);
  const [popoverRect, setPopoverRect] = useState(null);
  const timerRef = useRef(null);

  const trailParentId = (() => {
    const p = NAV.find(item => item.children && item.children.some(c => c.id === activeId));
    return p ? p.id : null;
  })();

  // Accordion behaviour (2026-05-13): only one grouper open at a time.
  // Opening a grouper auto-closes any previously expanded one.
  const toggleExpand = id => setExpanded(prev => {
    const isNowOpen = !prev[id];
    if (isNowOpen) {
      // Close all others, open only this one
      return { [id]: true };
    }
    // Close this one, leave others as-is (should be none due to accordion)
    const next = { ...prev };
    delete next[id];
    return next;
  });
  const onPopoverEnter = (id, rect) => {
    clearTimeout(timerRef.current);
    setPopoverId(id);
    if (rect) setPopoverRect(rect);
  };
  // 300ms close delay — generous enough for motor-impaired users (WCAG 2.5.1).
  // Combined with the invisible bridge element on each item, users can move
  // freely from nav item to popover without triggering a close.
  const onPopoverLeave = () => { timerRef.current = setTimeout(() => { setPopoverId(null); setPopoverRect(null); }, 300); };

  // Collapsed state: navPadH=12 (Figma: NavHeader.Collapsed at x:12 in 72px container)
  // Expanded state:  navPadH=16 (Figma: NavHeader at x:16 in 240px container)
  const padH = sidebarCollapsed ? L.navPadHcol : L.navPadH;

  return (
    <nav style={{
      // Width tokens: none in Figma — raw values
      width: sidebarCollapsed ? L.navWcol : L.navW,
      // height:100% fills the body area (viewport − 64px topnav) exactly.
      height:"100%",
      // Surface/Nav/Light
      backgroundColor: T.surface.navLight,
      display:"flex", flexDirection:"column",
      // Padding: pt-[8px] pb-[12px], px responsive (updated 2026-05-13)
      padding:`${L.navPadV}px ${padH}px ${L.navPadVb}px`,
      boxSizing:"border-box", flexShrink:0,
      transition:"width var(--motion-duration-6) var(--motion-easing-emphasized)",
      borderRight:`0.5px solid ${T.fill.infoSubtle}`,
      overflow:"hidden",   // the inner menu scrolls via <Scrollable>; the nav itself does not
    }}>

      {/* NavHeader — Slot.NavHeader / Slot.NavHeader.Collapsed (moved to TOP, 2026-05-13)
          Hidden on mobile (<768px) where hamburger is the sole nav toggle. */}
      {!hideCollapseButton && (
        <div style={{ flexShrink:0 }}>
          <NavHeader isSidebarCollapsed={sidebarCollapsed}
            onToggle={() => setSidebarCollapsed(!sidebarCollapsed)} />
        </div>
      )}

      {/* SideNavMenu — the ONLY scroll region, wrapped in the system <Scrollable> overlay
          scrollbar (components/scrollbar). Bleed to the nav's true right edge (marginRight)
          and re-add the inset inside the view (paddingRight) so the overlay thumb hugs the
          edge in BOTH the 240px expanded and 72px collapsed rail. */}
      <Scrollable
        style={{ flex:1, minHeight:0, marginRight: -padH }}
        viewStyle={{ display:"flex", flexDirection:"column",
          gap:L.menuGap, paddingTop:L.menuPadT, paddingRight: padH }}>

        {/* Section groups — each section is ONE flex child of the menu, so gap:6px
            applies only between sections, not between an item and its own children.
            Items render EXACTLY as they did before sections existed — SideNavItem is
            untouched. The section wrapper only adds a header (NavSectionLabel expanded,
            Divider in rail) above each group. */}
        {NAV_SECTIONS.map(({ section, items }, sIdx) => (
          <div key={section} style={{ display:"flex", flexDirection:"column",
            gap:L.menuGap, flexShrink:0 }}>

            {/* Expanded: NavSectionLabel (40px, fades out as rail collapses) */}
            <div style={{ opacity: sidebarCollapsed ? 0 : 1,
              maxHeight: sidebarCollapsed ? 0 : 40, overflow:"hidden",
              transition:"opacity var(--motion-duration-4) var(--motion-easing-standard), max-height var(--motion-duration-5) var(--motion-easing-spring)",
              flexShrink: 0 }}>
              <NavSectionLabel label={section} />
            </div>
            {/* Collapsed rail: Divider replaces the section label (skip for first section) */}
            {sIdx > 0 && (
              <div style={{ opacity: sidebarCollapsed ? 1 : 0,
                maxHeight: sidebarCollapsed ? 5 : 0, overflow:"hidden",
                transition:"opacity var(--motion-duration-4) var(--motion-easing-standard), max-height var(--motion-duration-5) var(--motion-easing-spring)",
                padding:"2px 0", flexShrink: 0 }}>
                <div style={{ height:1, backgroundColor:T.fill.infoSubtle }} />
              </div>
            )}

            {/* Items — each item + its children grouped in one wrapper div so the
                section's flex gap applies between distinct items, NOT between an
                item and its own expanded child list. This matches the original
                pre-section render exactly. */}
            {items.map(item => {
              const hasChildren = !!(item.children && item.children.length);
              const isActive   = item.id === activeId;
              const isTrail    = item.id === trailParentId;
              const isExpanded = !!expanded[item.id];
              return (
                <div key={item.id}>
                  <SideNavItem item={item} isActive={isActive} isTrail={isTrail}
                    isExpanded={isExpanded} isSidebarCollapsed={sidebarCollapsed}
                    isChild={false} onClick={onNavigate} onToggle={toggleExpand}
                    popoverOpen={popoverId === item.id}
                    anchorRect={popoverId === item.id ? popoverRect : null}
                    onPopoverEnter={onPopoverEnter} onPopoverLeave={onPopoverLeave}
                    activeId={activeId} />

                  {/* Level 1 children — grid-template-rows 0fr→1fr animated height.
                      Uses easeOutQuart curve for a smooth, decelerating expand that feels
                      polished without bouncing. Children fade in slightly behind the height
                      animation (40ms delay) so they emerge gracefully rather than clipping. */}
                  {hasChildren && !sidebarCollapsed && (
                    <div style={{
                      display: "grid",
                      gridTemplateRows: isExpanded ? "1fr" : "0fr",
                      transition: "grid-template-rows var(--motion-duration-5) var(--motion-easing-accordion)" }}>
                      <div style={{
                        overflow:"hidden",
                        opacity: isExpanded ? 1 : 0,
                        transition: isExpanded
                          ? "opacity var(--motion-duration-4) var(--motion-easing-standard) 70ms"
                          : "opacity var(--motion-duration-3) var(--motion-easing-standard)" }}>
                        {item.children.map(child => (
                          <SideNavItem key={child.id} item={child}
                            isActive={child.id === activeId} isTrail={false}
                            isExpanded={false} isSidebarCollapsed={false}
                            isChild={true} onClick={onNavigate} onToggle={() => {}} />
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ))}

        {/* SideNavListSection — "Recent Content" demo, fades with nav expand/collapse */}
        <div style={{ opacity: sidebarCollapsed ? 0 : 1,
          maxHeight: sidebarCollapsed ? 0 : 400, overflow:"hidden",
          transition:"opacity var(--motion-duration-4) var(--motion-easing-standard), max-height var(--motion-duration-5) var(--motion-easing-spring)" }}>
          <SideNavListSection
            label="Recent Content"
            items={LIST_SECTION_ITEMS}
            activeId={activeId}
            onNavigate={onNavigate} />
        </div>

        {/* Flex spacer pushes items to top, fills remaining height */}
        <div style={{ flex:1 }} />
      </Scrollable>
    </nav>
  );
}

// TopNav component
// Props: onSideNavToggle — called when mobile hamburger is tapped
function TopNav({ onSideNavToggle }) {
  const [orgOpen, setOrgOpen] = useState(false);
  const [isDesktop, setIsDesktop] = useState(window.innerWidth >= 1024);

  useEffect(() => {
    const mq = window.matchMedia("(min-width: 1024px)");
    const handler = e => setIsDesktop(e.matches);
    mq.addEventListener("change", handler);
    return () => mq.removeEventListener("change", handler);
  }, []);

  const closeAll = () => setOrgOpen(false);

  useEffect(() => {
    const handler = e => { if (e.key === "Escape") closeAll(); };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);

  return (
    <>
      {orgOpen && <div className="tn-scrim" onClick={closeAll} aria-hidden="true" />}

      <header className="topnav" role="banner">

        {/* ── Slot.RowStart ─────────────────────────────────────────────── */}
        <div className="topnav__row-start">

          {/* Mobile hamburger — hidden on desktop/tablet via CSS */}
          <button className="topnav__sidenav-control tn-action-btn"
            aria-label="Open navigation menu" onClick={onSideNavToggle}>
            <span className="tn-ms" aria-hidden="true">menu</span>
          </button>

          {/* ModuleSwitcher — Figma: home icon wrapper + expand_more chevron, no text label */}
          <button className="tn-mod-btn" aria-label="Amplify Home — switch module"
            aria-haspopup="menu">
            <span className="tn-mod-icon">
              <svg viewBox="0 0 44 44" width="22" height="22" fill="none"
                   xmlns="http://www.w3.org/2000/svg" aria-hidden="true"
                   style={{display:"block",flexShrink:0}}>
                <path d={HOME_ICON_PATH} fill="white" />
              </svg>
            </span>
            <span className="tn-chev" aria-hidden="true">expand_more</span>
          </button>

          {/* OrgSwitcher */}
          <TnOrgSwitcher open={orgOpen} onToggle={() => setOrgOpen(p => !p)} />
        </div>

        <div className="topnav__spacer" aria-hidden="true" />

        {/* ── Slot.RowEnd ───────────────────────────────────────────────── */}
        <div className="topnav__row-end">

          {/* Search — circular button (cornerradius/full: 64px) */}
          <button className="tn-search-btn" aria-label="Search">
            <span className="tn-search-inner">
              <span className="tn-ms" aria-hidden="true">search</span>
            </span>
          </button>

          {/* Desktop: 2× notification bells | Tablet+Mobile: more_vert */}
          {isDesktop ? (
            <>
              <button className="tn-action-btn tn-action-btn--highlighted" aria-label="Notifications">
                <span className="tn-action-inner">
                  <span className="tn-ms" aria-hidden="true">notifications</span>
                </span>
              </button>
              <button className="tn-action-btn" aria-label="Notifications">

              <span className="tn-action-inner">

// ─── APP ──────────────────────────────────────────────────────────────────────
// Responsive layout — three breakpoint zones:
//
//  ≥1024px  DESKTOP   push layout    SideNav is in-flow (expanded 240px or collapsed 72px)
//                                    TopNav: position:fixed (height 56px, TopNav.Global)
//                                    Body area: marginTop:56, left by SideNav width
//
//  768–1023px TABLET  overlay layout SideNav slides over content (240px wide, 72px collapsed)
//                                    TopNav: position:fixed
//                                    Scrim (rgba 0,0,0,0.32) shown behind overlay
//                                    Collapse button on overlay nav → collapses back to 72px rail
//
//  <768px   MOBILE    hidden + full overlay
//                                    SideNav hidden by default (hamburger icon in TopNav)
//                                    Opening → 240px overlay drawer (same width as tablet)
//                                    NO 72px collapsed state on mobile (hover/popover patterns
//                                    don't apply to touch devices; screen width too narrow)
//                                    TopNav: position:relative (in-flow, not fixed)
//                                    Closing overlay → nav fully hidden again (not collapsed)
//
// Animation strategy (CSS transitions on .overlay-panel / .overlay-scrim):
//   Always keep overlay panel + tablet scrim in the DOM when !isDesktop.
//   Toggle .overlay-panel--open / .overlay-scrim--visible via CSS class.
//   This lets the EXIT transition play — conditional rendering would unmount
//   the element immediately, giving an instant-removal flash with no exit.
function App() {
  const [activeId, setActiveId] = useState("balance_sheet");

  // Compute correct initial values synchronously before first render.
  // window.innerWidth is available immediately in a browser context.
  const initW = window.innerWidth;
  const [sidebarCollapsed, setSidebarCollapsed] = useState(initW < 1024);
  const [navHidden,         setNavHidden]        = useState(initW < 768);
  const [viewportW,         setViewportW]        = useState(initW);

  // Resize listener — updates viewportW on every resize event.
  useEffect(() => {
    const onResize = () => setViewportW(window.innerWidth);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  // When viewport crosses a breakpoint boundary, snap to correct defaults.
  // Uses a ref to compare old vs new breakpoint so a pixel-nudge within the
  // same zone does NOT override the user's manual collapse/expand choice.
  const bpOf = w => w >= 1024 ? 2 : w >= 768 ? 1 : 0; // 2=desktop 1=tablet 0=mobile
  const prevBp = useRef(bpOf(initW));
  useEffect(() => {
    const bp = bpOf(viewportW);
    if (bp === prevBp.current) return;
    prevBp.current = bp;
    if (bp === 2) { setNavHidden(false); setSidebarCollapsed(false); }       // desktop → expanded
    else if (bp === 1) { setNavHidden(false); setSidebarCollapsed(true); }   // tablet  → collapsed rail
    else              { setNavHidden(true);  setSidebarCollapsed(true); }    // mobile  → hidden (hamburger ≡ default)
  }, [viewportW]);

  const isDesktop = viewportW >= 1024; // SideNav layout: push vs overlay
  const isMobile  = viewportW < 768;   // full-width overlay + hamburger control
  const isTablet  = viewportW >= 768 && viewportW < 1024; // overlay + scrim, no hamburger

  // Overlay mode: <1024px AND nav is not hidden AND expanded
  const isOverlay = !isDesktop && !navHidden && !sidebarCollapsed;

  const handleHamburger = () => {
    // Hamburger/close control only active on mobile (<768px)
    if (!isMobile) return;
    if (navHidden) {
      // Open: show as full-width overlay (sidebarCollapsed=false → isOverlay=true)
      setNavHidden(false);
      setSidebarCollapsed(false);
    } else {
      // Close: hide nav and reset to collapsed
      setNavHidden(true);
      setSidebarCollapsed(true);
    }
  };

  const handleNavigate = (id) => {
    setActiveId(id);
    // Mobile: close the full-screen overlay after navigation so the page is visible.
    // Tablet: keep the 240px overlay open — content is visible beside the nav,
    //         so there's no need to force-close on every navigation.
    if (isMobile && !sidebarCollapsed) { setSidebarCollapsed(true); setNavHidden(true); }
  };

  const all    = NAV.flatMap(item => item.children ? [item, ...item.children] : [item]);
  const active = all.find(i => i.id === activeId);
  const parent = NAV.find(i => i.children && i.children.some(c => c.id === activeId));
  const PageIconSource = NAV.find(i => i.id === activeId) || parent;
  const pageIconName = PageIconSource && PageIconSource.icon;

  // Overlay nav width: 240px at all breakpoints — consistent drawer width.
  // Even on a 393px phone, 240px leaves a 143px scrim strip to tap outside.
  // Full-width overlays feel like modals and destroy context; 240px is industry
  // standard (Gmail, Slack, WhatsApp all use ~260–320px drawers on phone).
  const overlayNavW = 240;

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh",
      overflow:"hidden", background:"#f0f1f4" }}>

      {/* ── GLOBAL TOP NAV (TopNav.Global, 56px, fixed) ─────────────────── */}
      <TopNav onSideNavToggle={handleHamburger} />

      {/* ── BODY AREA ── below top nav ──────────────────────────────────── */}
      {/* marginTop:56 because TopNav.Global is position:fixed height:56px.
          The top nav is always fixed — no mobile in-flow fallback needed. */}
      <div style={{ display:"flex", flex:1, overflow:"hidden",
        marginTop: 56, position:"relative" }}>

        {/* ── SCRIM — all overlay breakpoints (tablet + mobile) ──────────── */}
        {/* Shown at all non-desktop breakpoints whenever the overlay is open.
            On mobile (<768px) the nav is 240px wide, leaving a 143px+ strip of
            page content visible — the scrim dims it and provides a tap target
            to dismiss. Always rendered when !isDesktop (not conditional on
            isOverlay) so the CSS fade-out transition plays on close.           */}
        {!isDesktop && (
          <div
            onClick={() => {
              setSidebarCollapsed(true);
              if (isMobile) setNavHidden(true); // mobile: tap scrim → back to hamburger
            }}
            className={isOverlay ? "overlay-scrim overlay-scrim--visible" : "overlay-scrim"}
          />
        )}

        {/* ── OVERLAY SIDENAV — tablet + mobile ───────────────────────────── */}
        {/* Always rendered when !isDesktop so the CSS transition can slide it
            OUT when the overlay closes. The --open class drives enter/exit.
            top:64 is correct for BOTH tablet (TopNav fixed) and mobile (TopNav
            in-flow at 64px) — the overlay starts right below the TopNav in
            both cases. width:overlayNavW is 240px at all overlay breakpoints. */}
        {!isDesktop && (
          <div
            className={isOverlay ? "overlay-panel overlay-panel--open" : "overlay-panel"}
            style={{ top: 56, width: overlayNavW }}>
            <SideNav activeId={activeId} onNavigate={handleNavigate}
              sidebarCollapsed={false}
              hideCollapseButton={isMobile}
              onCollapseChange={v => {
                if (v) {
                  setSidebarCollapsed(true);
                  // Mobile: pressing collapse goes back to hidden (hamburger ≡),
                  // not to 72px collapsed rail (which doesn't exist on mobile).
                  if (isMobile) setNavHidden(true);
                }
              }} />
          </div>
        )}

        {/* Desktop or collapsed (in-flow) SideNav */}
        {isDesktop ? (
          <SideNav activeId={activeId} onNavigate={setActiveId}
            sidebarCollapsed={sidebarCollapsed}
            onCollapseChange={setSidebarCollapsed} />
        ) : (
          // Tablet (768–1023px): 72px icon-only rail in layout flow by default.
          isTablet && !navHidden && sidebarCollapsed && (
            <SideNav activeId={activeId} onNavigate={handleNavigate}
              sidebarCollapsed={true}
              onCollapseChange={v => { if(!v) setSidebarCollapsed(false); }} />
          )
        )}

        {/* ── RIGHT COLUMN ── scrollable ──────────────────────────────── */}
        <div style={{ flex:1, overflowY:"auto", display:"flex", flexDirection:"column",
          /* When overlay is open on mobile, content scrolls but is covered */
          minWidth:0 }}>

        {/* ════════════════════════════════════════════════════════════════
            ZONE 1 — DEMO SCREEN
            This simulates the actual app page. The heading updates as
            you navigate the SideNav on the left.
            ════════════════════════════════════════════════════════════════ */}
        <div style={{ background:"#fafafa", borderBottom:"2px solid #f6f6f6" }}>

          {/* Page content area */}
          <div style={{ padding:"32px 32px 36px" }}>
            {/* Page heading */}
            <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:28 }}>
              {pageIconName && (
                <div style={{ width:44, height:44, borderRadius:11, flexShrink:0,
                  background:"rgba(160,181,230,0.16)", display:"flex",
                  alignItems:"center", justifyContent:"center" }}>
                  <IconImg name={pageIconName} size={20} color={T.icon.navActive} />
                </div>
              )}
              <div>
                <h1 style={{ fontSize:22, fontWeight:600, color:"#02060d", margin:0,
                  fontFamily:"'Red Hat Text',sans-serif", lineHeight:"28px" }}>
                  {active ? active.label : "—"}
                </h1>
                {parent && (
                  <p style={{ fontSize:13, color:"#999", margin:"3px 0 0",
                    fontFamily:"'Red Hat Text',sans-serif" }}>
                    {parent.label}
                  </p>
                )}
              </div>
            </div>

            {/* Empty content cards — represent the page content area */}
            <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
              <div style={{ display:"flex", gap:12 }}>
                {["Summary", "Details", "History"].map(label => (
                  <div key={label} style={{ flex:1, background:"#fff", borderRadius:10,
                    border:"1px dashed #d8dce8", padding:"24px 20px",
                    display:"flex", flexDirection:"column", alignItems:"center",
                    justifyContent:"center", gap:6, minHeight:88 }}>
                    <span style={{ fontSize:18, color:"#dde0ea" }}>□</span>
                    <span style={{ fontSize:11, color:"#c4c8d8",
                      fontFamily:"'Red Hat Text',sans-serif" }}>{label}</span>
                  </div>
                ))}
              </div>
              <div style={{ background:"#fff", borderRadius:10,
                border:"1px dashed #d8dce8", padding:"24px 20px",
                display:"flex", alignItems:"center", justifyContent:"center", minHeight:80 }}>
                <span style={{ fontSize:12, color:"#c4c8d8",
                  fontFamily:"'Red Hat Text',sans-serif" }}>Content area</span>
              </div>
            </div>
          </div>
        </div>

        </div>{/* end right column */}
      </div>{/* end body area */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
