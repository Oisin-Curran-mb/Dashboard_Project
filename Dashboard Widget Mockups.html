<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shelby Financials — Widget Design Mockups</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/helloimjolopez-collab/pathway-ds@main/src/tokens/tokens.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;500;600;700&family=Red+Hat+Display:wght@600&display=swap" rel="stylesheet">
<style>
.material-symbols-rounded{font-variation-settings:'wght' 400,'GRAD' 0,'opsz' 20;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Red Hat Text',sans-serif;background:var(--semantic-color-light-mode-surface-canvas-light,#fafafa);color:var(--semantic-color-light-mode-text-static-primary-base,#202020);}
.tnav{background:var(--semantic-color-light-mode-fill-static-brand-base,#2d4889);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:fixed;top:0;left:0;right:0;z-index:200;}
.tnav-s,.tnav-e{display:flex;align-items:center;gap:8px;}
.tnav-logo{display:flex;align-items:center;gap:8px;color:#fbfbfb;font-size:14px;font-weight:600;letter-spacing:.3px;}
.tnav-logo-box{width:28px;height:28px;background:rgba(255,255,255,.15);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.tnav-mod{display:flex;align-items:center;gap:4px;color:rgba(251,251,251,.7);font-size:13px;font-weight:500;padding:4px 8px;border-radius:6px;border:1px solid rgba(160,181,230,.2);}
.tnav-btn{width:36px;height:36px;border-radius:8px;border:none;background:transparent;cursor:pointer;color:#fbfbfb;display:flex;align-items:center;justify-content:center;}
.tnav-btn:hover{background:rgba(10,18,35,.16);}
.tnav-av{width:32px;height:32px;border-radius:50%;background:#dcd9ef;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#221e3f;cursor:pointer;}
.layout{display:flex;margin-top:56px;min-height:calc(100vh - 56px);}
.snav{width:240px;background:var(--semantic-color-light-mode-surface-nav-light,#fafafa);border-right:.5px solid var(--semantic-color-light-mode-stroke-static-neutral-light,#f6f6f6);position:fixed;top:56px;bottom:0;overflow-y:auto;z-index:100;padding:8px;}
.snav-lbl{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.07em;padding:8px 8px 4px;}
.snav-item{display:flex;align-items:center;gap:10px;min-height:40px;padding:0 10px;width:100%;border:none;background:transparent;cursor:pointer;border-radius:8px;font-family:'Red Hat Text',sans-serif;font-size:13px;font-weight:400;letter-spacing:.3px;color:#484848;text-align:left;position:relative;transition:background 100ms;}
.snav-item:hover{background:rgba(160,181,230,.1);}
.snav-item.active{background:#eef2fb;color:#1b2d57;font-weight:500;}
.snav-item.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:0 2px 2px 0;background:#2d4889;}
.snav-num{width:19px;height:19px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;background:#e1e1e1;color:#888;}
.snav-item.active .snav-num{background:#2d4889;color:white;}
.snav-ico{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 20;font-size:18px;flex-shrink:0;color:#484848;}
.snav-item.active .snav-ico{color:#2d4889;}
.snav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-left:auto;}
.content{margin-left:240px;flex:1;padding:16px 36px 56px;}
.w-hdr{padding-bottom:16px;border-bottom:.5px solid #f6f6f6;margin-bottom:24px;}
.w-bc{font-size:11px;color:#888;margin-bottom:6px;}
.w-title{font-size:24px;font-weight:600;line-height:30px;font-family:'Red Hat Display','Red Hat Text',sans-serif;}
.w-meta{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;}
.w-desc{font-size:14px;line-height:20px;color:#484848;margin-top:8px;max-width:640px;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500;}
.b-g{background:#f0faf1;color:#2e7d32;}
.b-b{background:#eef2fb;color:#4b6ec3;}
.b-r{background:#faefef;color:#9d2d2d;}
.b-e{background:#e1e1e1;color:#484848;}
.b-a{background:#fff8e1;color:#b75a00;}
.opts{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.opt{background:#fff;border:.5px solid #d2d2d2;border-radius:8px;overflow:hidden;display:flex;flex-direction:column;}
.opt-hd{padding:14px 16px 12px;border-bottom:.5px solid #f6f6f6;display:flex;align-items:flex-start;gap:10px;}
.opt-n{width:24px;height:24px;border-radius:6px;background:#eef2fb;color:#4b6ec3;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;}
.opt-t{font-size:14px;font-weight:600;color:#202020;line-height:1.3;}
.opt-s{font-size:11px;color:#888;margin-top:2px;}
.opt-v{padding:14px 16px;flex:1;}
.opt-ft{padding:12px 16px;border-top:.5px solid #f6f6f6;background:#fafafa;}
.opt-imp{font-size:12px;color:#484848;line-height:1.55;margin-bottom:8px;}
.opt-imp strong{color:#202020;}
.opt-ins{font-size:11px;display:flex;align-items:flex-start;gap:5px;color:#888;}
.opt-ins a{color:#345499;text-decoration:none;}
.opt-ins a:hover{text-decoration:underline;}
.fix-note{background:#faefef;border-left:3px solid #9d2d2d;border-radius:0 4px 4px 0;padding:8px 12px;font-size:12px;color:#484848;margin-bottom:20px;}
.note-b{background:#eef2fb;border-left:3px solid #4b6ec3;border-radius:0 4px 4px 0;padding:8px 12px;font-size:12px;color:#484848;margin-bottom:20px;}
.sec-hd{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#888;margin-bottom:14px;}
/* chart util */
.bars{display:flex;align-items:flex-end;gap:3px;height:80px;}
.bw{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;}
.bar{border-radius:2px 2px 0 0;width:100%;min-height:2px;}
.bl{font-size:8.5px;color:#aaa;}
.bv{font-size:8.5px;font-weight:600;color:#606060;}
.hbars{display:flex;flex-direction:column;gap:7px;}
.hr{display:grid;grid-template-columns:85px 1fr 52px;align-items:center;gap:6px;}
.hl{font-size:11px;color:#484848;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ht{height:7px;background:#f0f0f0;border-radius:3px;overflow:hidden;}
.hf{height:100%;border-radius:3px;}
.hv{font-size:11px;font-weight:500;color:#202020;text-align:right;}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;}
.kpi{background:#eef2fb;border-radius:6px;padding:9px 11px;}
.kl{font-size:10px;color:#606060;margin-bottom:1px;}
.kv{font-size:17px;font-weight:600;color:#202020;}
.kt{font-size:10px;margin-top:2px;}
.up{color:#2e7d32;}.dn{color:#9d2d2d;}
.tbl{width:100%;border-collapse:collapse;font-size:11.5px;}
.tbl th{text-align:left;padding:5px 7px;font-size:9px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #f0f0f0;}
.tbl td{padding:5px 7px;border-bottom:1px solid #f0f0f0;color:#484848;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:#eef2fb;}
.tbl .r{text-align:right;}
.progs{display:flex;flex-direction:column;gap:8px;}
.ph{display:flex;justify-content:space-between;margin-bottom:3px;font-size:11px;color:#484848;}
.pt{height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;}
.pf{height:100%;border-radius:3px;}
.dw{display:flex;align-items:center;gap:14px;}
.dl{flex:1;}
.di{display:flex;align-items:center;gap:6px;font-size:11px;color:#484848;margin-bottom:4px;}
.dd{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.acard{display:flex;align-items:center;gap:9px;padding:8px 11px;border:.5px solid #d2d2d2;border-radius:6px;background:#fff;margin-bottom:6px;}
.aico{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.an{font-size:12px;font-weight:500;color:#202020;}
.as{font-size:10px;color:#aaa;margin-top:1px;}
.aa{margin-left:auto;text-align:right;}
.ab{font-size:13px;font-weight:600;color:#202020;}
.ac{font-size:10px;margin-top:1px;}
.aging{display:flex;height:11px;border-radius:3px;overflow:hidden;margin:7px 0;}
.aleg{display:flex;flex-wrap:wrap;gap:7px;}
.ali{display:flex;align-items:center;gap:4px;font-size:10px;color:#606060;}
.asw{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.kcol{background:#fafafa;border-radius:6px;padding:7px;}
.kchd{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#aaa;margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.kcb{background:#e1e1e1;color:#606060;border-radius:10px;padding:1px 5px;font-size:8.5px;}
.kcard{background:white;border:.5px solid #d2d2d2;border-radius:4px;padding:6px 8px;margin-bottom:4px;}
.kcn{font-size:11px;font-weight:500;color:#202020;}
.kcs{font-size:10px;color:#aaa;margin-top:2px;}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;}
.wi{width:60px;height:60px;border-radius:14px;background:#eef2fb;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.wt{font-size:18px;font-weight:600;margin-bottom:8px;}
.ws{font-size:14px;color:#606060;max-width:380px;line-height:1.5;}
</style>
</head>
<body>
<nav class="tnav">
  <div class="tnav-s">
    <div class="tnav-logo">
      <div class="tnav-logo-box"><span class="material-symbols-rounded" style="font-size:16px;color:#fbfbfb;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 20">analytics</span></div>
      Shelby Financials
    </div>
    <div class="tnav-mod"><span>Financials</span><span class="material-symbols-rounded" style="font-size:14px">expand_more</span></div>
  </div>
  <div class="tnav-e">
    <button class="tnav-btn"><span class="material-symbols-rounded" style="font-size:18px">search</span></button>
    <button class="tnav-btn"><span class="material-symbols-rounded" style="font-size:18px">notifications</span></button>
    <div class="tnav-av">OC</div>
  </div>
</nav>
<div class="layout">
  <aside class="snav" id="snav"></aside>
  <main class="content" id="content"></main>
</div>
<script>
let cur = null;
const W = [
{id:1,name:"Budget Compared to Actual",status:"g",icon:"balance",mod:"Finance",
desc:"Side-by-side bar and line chart comparing budgeted vs actual spend by period. Well understood by finance teams.",
options:[
{num:"A",title:"Variance Bar",sub:"Keep / Refresh",
imp:"<strong>Adds a third variance bar per period</strong> (green = under budget, red = over) so users see the gap directly rather than mentally comparing two bars. Immediately actionable.",
il:"Bold BI Budget vs Actual",iu:"https://samples.boldbi.com/solutions/finance/budget-vs-actual-dashboard",
viz:`<div>
<div style="font-size:10px;color:#888;margin-bottom:8px">Jan – Jun 2025 · Monthly</div>
<div class="bars" style="height:90px">
${[['J',80,85,'#4b6ec3','#4caf50'],['F',70,65,'#4b6ec3','#4caf50'],['M',90,95,'#4b6ec3','#e53935'],['A',75,72,'#4b6ec3','#4caf50'],['M',85,88,'#4b6ec3','#e53935'],['Jn',95,90,'#4b6ec3','#4caf50']].map(([l,b,a,bc,vc])=>`
<div class="bw">
<div style="display:flex;gap:2px;align-items:flex-end;height:70px;width:100%">
<div class="bar" style="height:${b}%;background:#4b6ec3;flex:1"></div>
<div class="bar" style="height:${a}%;background:rgba(75,110,195,.35);flex:1"></div>
</div>
<div class="bl">${l}</div>
</div>`).join('')}
</div>
<div style="display:flex;gap:10px;margin-top:6px;font-size:10px;color:#606060">
<span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#4b6ec3;margin-right:4px"></span>Budget</span>
<span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:rgba(75,110,195,.35);margin-right:4px"></span>Actual</span>
<span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#4caf50;margin-right:4px"></span>Under</span>
<span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#e53935;margin-right:4px"></span>Over</span>
</div></div>`},
{num:"B",title:"KPI Header + Chart",sub:"Keep / Refresh",
imp:"<strong>Three summary cards above the chart</strong> answer 'are we over or under?' in under a second. No chart-reading required for the headline question.",
il:"Coefficient QuickBooks Budget Template",iu:"https://coefficient.io/templates/quickbooks-budget-vs-actual-report",
viz:`<div>
<div class="kpis" style="grid-template-columns:repeat(3,1fr);margin-bottom:12px">
<div class="kpi"><div class="kl">Total Budget</div><div class="kv" style="font-size:15px">$620,000</div></div>
<div class="kpi"><div class="kl">Total Actual</div><div class="kv" style="font-size:15px">$595,800</div></div>
<div class="kpi" style="background:#f0faf1"><div class="kl">Variance</div><div class="kv" style="font-size:15px;color:#2e7d32">+$24,200</div><div class="kt up">3.9% under budget</div></div>
</div>
<div class="bars">
${[['J',78,82],['F',72,68],['M',88,91],['A',76,74],['M',84,87],['Jn',92,89]].map(([l,b,a])=>`
<div class="bw">
<div style="display:flex;gap:2px;align-items:flex-end;height:70px;width:100%">
<div class="bar" style="height:${b}%;background:#4b6ec3;flex:1"></div>
<div class="bar" style="height:${a}%;background:#a0b5e6;flex:1"></div>
</div>
<div class="bl">${l}</div>
</div>`).join('')}
</div></div>`},
{num:"C",title:"Waterfall / Bridge Chart",sub:"Improve (Higher Effort)",
imp:"<strong>Shows where budget was gained or lost period-by-period</strong> as a bridge. More meaningful for year-end variance analysis. Higher dev effort — worth it for finance-heavy organisations.",
il:"Waterfall Chart patterns — Google Looker",iu:"https://cloud.google.com/looker/docs/best-practices/how-to-create-waterfall-charts",
viz:`<div>
<div style="font-size:10px;color:#888;margin-bottom:8px">Cumulative variance Jan→Jun</div>
<div style="display:flex;align-items:flex-end;gap:4px;height:90px;position:relative">
<div style="position:absolute;left:0;right:0;top:50%;border-top:1px dashed #ccc;z-index:0"></div>
${[['Start',0,40,'#e1e1e1'],['Jan',40,12,'#4caf50'],['Feb',52,-8,'#e53935'],['Mar',44,15,'#4caf50'],['Apr',59,-5,'#e53935'],['May',54,11,'#4caf50'],['Jn',65,0,'#4b6ec3']].map(([l,base,delta,c],i)=>`
<div class="bw" style="position:relative;z-index:1">
<div style="font-size:8px;font-weight:600;color:${delta>0?'#2e7d32':delta<0?'#9d2d2d':'#4b6ec3'}">${delta>0?'+'+delta:delta||''}</div>
<div style="height:${Math.abs(delta)*1.5+4}px;width:100%;background:${c};border-radius:2px;margin-top:auto"></div>
<div class="bl">${l}</div>
</div>`).join('')}
</div></div>`}
]},
{id:2,name:"Pension Plans",status:"b",icon:"savings",mod:"Payroll",
desc:"Pie chart showing pension plan contribution breakdown by plan type, with district filter.",
options:[
{num:"A",title:"Stacked Bar by District",sub:"Improve",
imp:"<strong>Each bar = a district, each segment = a plan type.</strong> Filters become visual — users compare across districts at a glance rather than selecting a dropdown.",
il:"PayCaptain Pensions Dashboard",iu:"https://www.paycaptain.com/features/pensions-dashboard",
viz:`<div>
<div class="hbars">
${[['Central',85,'#4b6ec3','#a0b5e6','#eef2fb'],['North',70,'#4b6ec3','#a0b5e6','#eef2fb'],['South',90,'#4b6ec3','#a0b5e6','#eef2fb'],['East',60,'#4b6ec3','#a0b5e6','#eef2fb']].map(([d,v1,c1,c2,c3])=>`
<div style="margin-bottom:6px">
<div style="font-size:11px;color:#484848;margin-bottom:3px">${d}</div>
<div style="height:18px;border-radius:3px;overflow:hidden;display:flex">
<div style="flex:${v1};background:${c1}"></div>
<div style="flex:${100-v1-15};background:${c2}"></div>
<div style="flex:15;background:${c3}"></div>
</div>
</div>`).join('')}
</div>
<div style="display:flex;gap:10px;margin-top:8px;font-size:10px;color:#606060;flex-wrap:wrap">
<span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#4b6ec3;margin-right:4px"></span>Defined Benefit</span>
<span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#a0b5e6;margin-right:4px"></span>Defined Contribution</span>
<span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#eef2fb;margin-right:4px"></span>Other</span>
</div></div>`},
{num:"B",title:"Donut + Total KPI",sub:"Keep / Refresh",
imp:"<strong>Places total contribution in the donut centre</strong> so users get breakdown + headline number in one view without needing to find a totals row.",
il:"Mercer Defined Benefit Plan Dashboard",iu:"https://www.mercer.com/en-us/solutions/retirement/defined-benefit-pensions/plan-dashboard/",
viz:`<div class="dw">
<svg viewBox="0 0 90 90" width="90" height="90" style="flex-shrink:0">
<circle cx="45" cy="45" r="30" fill="none" stroke="#f0f0f0" stroke-width="14"/>
<circle cx="45" cy="45" r="30" fill="none" stroke="#4b6ec3" stroke-width="14" stroke-dasharray="113 75" stroke-dashoffset="-47" stroke-linecap="butt"/>
<circle cx="45" cy="45" r="30" fill="none" stroke="#a0b5e6" stroke-width="14" stroke-dasharray="56 132" stroke-dashoffset="-160" stroke-linecap="butt"/>
<circle cx="45" cy="45" r="30" fill="none" stroke="#eef2fb" stroke-width="14" stroke-dasharray="19 169" stroke-dashoffset="-216" stroke-linecap="butt"/>
<text x="45" y="41" text-anchor="middle" font-size="9" font-weight="600" fill="#202020">$284k</text>
<text x="45" y="52" text-anchor="middle" font-size="7" fill="#888">total</text>
</svg>
<div class="dl">
<div class="di"><div class="dd" style="background:#4b6ec3"></div><span>Defined Benefit <strong>60%</strong></span></div>
<div class="di"><div class="dd" style="background:#a0b5e6"></div><span>Defined Contrib. <strong>30%</strong></span></div>
<div class="di"><div class="dd" style="background:#d2d2d2"></div><span>Other <strong>10%</strong></span></div>
<div style="margin-top:8px;padding-top:8px;border-top:.5px solid #f0f0f0;font-size:10px;color:#888">42 active plans · 3 districts</div>
</div></div>`},
{num:"C",title:"Table + Summary Row",sub:"Keep / Refresh",
imp:"<strong>Adds a pinned totals row</strong> and colour-coded plan status column. Low dev effort — transforms the existing table into a more scannable view.",
il:"Pensions Admin Dashboard patterns — FCA",iu:"https://www.fca.org.uk/publication/research/financial-lives-2022-pension-data.pdf",
viz:`<table class="tbl"><thead><tr><th>Plan</th><th>District</th><th>Members</th><th class="r">Annual ($)</th><th>Status</th></tr></thead><tbody>
<tr><td>DB Standard</td><td>Central</td><td>142</td><td class="r">$118,400</td><td><span class="badge b-g" style="font-size:10px">Active</span></td></tr>
<tr><td>DC Match</td><td>North</td><td>98</td><td class="r">$72,100</td><td><span class="badge b-g" style="font-size:10px">Active</span></td></tr>
<tr><td>DB Legacy</td><td>South</td><td>34</td><td class="r">$61,500</td><td><span class="badge b-a" style="font-size:10px">Review</span></td></tr>
<tr><td>DC Basic</td><td>East</td><td>67</td><td class="r">$32,000</td><td><span class="badge b-g" style="font-size:10px">Active</span></td></tr>
<tr style="font-weight:600;background:#f5f5f5"><td colspan="3">Total</td><td class="r">$284,000</td><td></td></tr>
</tbody></table>`}
]},
{id:3,name:"Payroll Distributions",status:"g",icon:"payments",mod:"Payroll",
desc:"Pie chart showing payroll distribution breakdown by compensation category (gross, net, taxes, benefits).",
options:[
{num:"A",title:"Donut with Total in Centre",sub:"Keep / Refresh",
imp:"<strong>Places the total payroll figure in the donut centre</strong> — users see both breakdown and total simultaneously without a separate totals row.",
il:"Payroll Dashboard designs — Dribbble",iu:"https://dribbble.com/search/payroll-ui-design",
viz:`<div class="dw">
<svg viewBox="0 0 90 90" width="90" height="90" style="flex-shrink:0">

const STATUS_COLOR = {g:'#4caf50',b:'#4b6ec3',r:'#e53935'};
const STATUS_LABEL = {g:'Needs Light Review',b:'Ready to Re-design',r:'Needs Significant Review'};
const STATUS_BADGE = {g:'b-g',b:'b-b',r:'b-r'};

function renderSidebar() {
  const s = document.getElementById('snav');
  let h = '<div class="snav-lbl">Widget Mockups</div>';
  W.forEach(w => {
    h += `<button class="snav-item${cur===w.id?' active':''}" onclick="show(${w.id})">
      <span class="snav-ico material-symbols-rounded">${w.icon}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${w.name}</span>
      <div class="snav-dot" style="background:${STATUS_COLOR[w.status]}"></div>
    </button>`;
  });
  s.innerHTML = h;
}

function show(id) {
  cur = id;
  renderSidebar();
  const w = W.find(x => x.id === id);
  if (!w) return;
  const c = document.getElementById('content');
  let html = `
    <div class="w-hdr">
      <div class="w-bc">Dashboard Widgets › ${w.mod}</div>
      <h1 class="w-title">${w.name}</h1>
      <div class="w-meta">
        <span class="badge ${STATUS_BADGE[w.status]}">${w.status==='g'?'🟢':w.status==='b'?'🔵':'🔴'} ${STATUS_LABEL[w.status]}</span>
        <span class="badge b-e">Widget ${w.id}</span>
      </div>
      <p class="w-desc">${w.desc}</p>
    </div>
    ${w.note?`<div class="fix-note">${w.note}</div>`:''}
    <div class="sec-hd">Design Options — 3 Alternatives</div>
    <div class="opts">
      ${w.options.map(o=>`
        <div class="opt">
          <div class="opt-hd">
            <div class="opt-n">${o.num}</div>
            <div>
              <div class="opt-t">${o.title}</div>
              <div class="opt-s">${o.sub}</div>
            </div>
          </div>
          <div class="opt-v">${o.viz}</div>
          <div class="opt-ft">
            <div class="opt-imp">${o.imp}</div>
            <div class="opt-ins">
              <span class="material-symbols-rounded" style="font-size:12px;color:#4b6ec3;flex-shrink:0">open_in_new</span>
              <span>Inspiration: <a href="${o.iu}" target="_blank" rel="noopener">${o.il}</a></span>
            </div>
          </div>
        </div>`).join('')}
    </div>`;
  c.innerHTML = html;
  c.scrollTop = 0;
}
